        <TierLineChart rep={r} r30Data={r30Data} ytdData={ytdData}/>

        {/* ── FULL RAW STATS ── */}
        <div style={{marginTop:14}}>
          <SectionHeader icon="📋" title={`Full Stats (${r30R?"Rolling 30":"Year to Date"})`} description="Raw numbers underlying all calculations above" color="#475569" compact/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:5}}>
            {[
              ["Demos Sat",fN(r.demo),"Appointments sat"],
              ["Gross Issued",fN(r.gross_iss),"Total closes"],
              ["OTD Closes",fN(r.otd_cnt),"Same-day closes"],
              ["Net Closes",fN(r.num_net),"Net issued closes"],
              ["NetStk%",fP(r.net_issue_rate),"Stick rate"],
              ["Close Vol",f$(r.close_vol),"Gross close volume"],
              ["Net Vol",f$(r.net_vol),"Net revenue"],
              ["Avg Deal",f$(r.avg_deal),"Revenue per close"],
              ["NSLI/NCP",f$(r.nsli),"Service & install rev"],
              ["Cancels",fN(r.cancel_cnt),"Post-close cancels"],
              ["Holds",fN(r.hold_cnt),"Deals on hold"],
              ["Cr Declines",fN(r.crdecline_cnt),"Credit declines"],
              ["Working",fN(r.working_cnt),"In-flight deals"],
            ].map(([l,v,tip])=>(
              <div key={l} style={{background:"var(--bg-base)",borderRadius:"var(--radius-sm)",padding:"8px 11px",border:"1px solid var(--border)"}} title={tip}>
                <div style={{fontSize:9,color:"var(--text-muted)",marginBottom:3,letterSpacing:".04em",textTransform:"uppercase"}}>{l}</div>
                <div style={{fontWeight:700,color:"var(--text-primary)",fontSize:13,fontFamily:"var(--font-mono)"}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── MARKET SNAPSHOT TAB ─────────────────────────────────────────────────────
function MarketSnapshotTab({r30Data,ytdData,markets,marketList}){
  const [snapWin,setSnapWin]=useState("r30");
  const src=snapWin==="r30"?r30Data:ytdData;

  const marketCards=useMemo(()=>{
    if(!src?.reps||!marketList.length)return[];
    return marketList.map(mkt=>{
      const reps=src.reps.filter(r=>markets[r.rep]===mkt&&r.tier!=="⛔ Excluded");
      if(!reps.length)return null;
      const sum=f=>reps.reduce((a,r)=>a+(r[f]??0),0);
      const avg=f=>sum(f)/reps.length;
      const netVol=sum("net_vol");
      const stdPct=avg("std_pct");
      const otdPct=avg("otd_pct");
      const avgDeal=avg("avg_deal");
      const topRep=reps.slice().sort((a,b)=>b.net_vol-a.net_vol)[0];
      const eliteCount=reps.filter(r=>r.tier==="🥇 Elite"||r.tier==="🥈 Strong").length;
      const atRiskCount=reps.filter(r=>r.tier==="⚠ Below Avg"||r.tier==="🔴 Low").length;
      // momentum vs other window
      const otherSrc=snapWin==="r30"?ytdData:r30Data;
      let volTrend=null;
      if(otherSrc?.reps){
        const otherReps=otherSrc.reps.filter(r=>markets[r.rep]===mkt&&r.tier!=="⛔ Excluded");
        if(otherReps.length){
          const otherVol=otherReps.reduce((a,r)=>a+(r.net_vol??0),0);
          volTrend=otherVol>0?((netVol-otherVol)/otherVol):null;
        }
      }
      return{name:mkt,repCount:reps.length,netVol,stdPct,otdPct,avgDeal,topRep,eliteCount,atRiskCount,volTrend};
    }).filter(Boolean).sort((a,b)=>b.netVol-a.netVol);
  },[src,markets,marketList,snapWin,r30Data,ytdData]);

  // Company-wide rollup
  const company=useMemo(()=>{
    if(!r30Data?.reps&&!ytdData?.reps)return null;
    const r30Active=(r30Data?.reps||[]).filter(r=>r.tier!=="⛔ Excluded");
    const ytdActive=(ytdData?.reps||[]).filter(r=>r.tier!=="⛔ Excluded");
    const calc=arr=>arr.length?{
      netVol:arr.reduce((a,r)=>a+(r.net_vol??0),0),
      stdPct:arr.reduce((a,r)=>a+(r.std_pct??0),0)/arr.length,
      otdPct:arr.reduce((a,r)=>a+(r.otd_pct??0),0)/arr.length,
      avgDeal:arr.reduce((a,r)=>a+(r.avg_deal??0),0)/arr.length,
      repCount:arr.length,
    }:null;
    return{r30:calc(r30Active),ytd:calc(ytdActive)};
  },[r30Data,ytdData]);

  const noData=!r30Data&&!ytdData;
  if(noData)return(
    <div className="empty-state" style={{padding:"60px 0"}}>
      <div className="empty-icon">🏙</div>
      <div className="empty-title">No data yet</div>
      <div className="empty-sub">Upload a CSV to see market standings</div>
    </div>
  );

  const trendColor=v=>v==null?"#64748b":v>=.1?"#34d399":v>=0?"#86efac":v>-.1?"#fb923c":"#f87171";
  const trendIcon=v=>v==null?"➡":v>=.1?"🔥":v>=0?"↑":v>-.1?"↓":"❄";
  const trendLabel=v=>v==null?"—":((v>=0?"+":"")+((v*100).toFixed(1))+"%");

  return(
    <div style={{padding:"20px 24px",animation:"fadeUp .2s ease both"}}>

      {/* ── HEADER + WINDOW TOGGLE ── */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div>
          <div style={{fontWeight:800,fontSize:18,color:"var(--text-primary)",fontFamily:"var(--font-display)",letterSpacing:"-.01em"}}>Market Snapshot</div>
          <div style={{fontSize:11,color:"var(--text-muted)",marginTop:3}}>Current standing by market · CEO-level view</div>
        </div>
        <div style={{display:"flex",gap:6,background:"var(--bg-elevated)",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:4}}>
          {[["r30","Rolling 30"],["ytd","Year to Date"]].map(([v,l])=>(
            <button key={v} onClick={()=>setSnapWin(v)} style={{padding:"6px 14px",borderRadius:"var(--radius-sm)",border:"none",fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer",transition:"all .15s",background:snapWin===v?"#38bdf8":"transparent",color:snapWin===v?"#000":"var(--text-muted)"}}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {/* ── COMPANY ROLLUP BANNER ── */}
      {company&&(
        <div style={{background:"var(--bg-surface)",border:"1px solid var(--border-strong)",borderRadius:"var(--radius-lg)",padding:"16px 22px",marginBottom:22,display:"grid",gridTemplateColumns:"auto 1fr 1fr 1fr 1fr",gap:"0 28px",alignItems:"center"}}>
          <div style={{paddingRight:24,borderRight:"1px solid var(--border)"}}>
            <div style={{fontSize:10,color:"var(--text-muted)",letterSpacing:".08em",textTransform:"uppercase",fontWeight:700,marginBottom:4}}>Company</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {r30Data&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:3,background:"rgba(56,189,248,.12)",color:"#38bdf8",fontWeight:700,border:"1px solid rgba(56,189,248,.2)"}}>R30</span>}
              {ytdData&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:3,background:"rgba(52,211,153,.10)",color:"#34d399",fontWeight:700,border:"1px solid rgba(52,211,153,.2)"}}>YTD</span>}
            </div>
          </div>
          {[
            ["Net Volume","netVol",v=>f$(Math.round(v)),"#34d399"],
            ["STD%","stdPct",v=>fP(v),"#38bdf8"],
            ["OTD%","otdPct",v=>fP(v),"#a78bfa"],
            ["Avg Deal","avgDeal",v=>f$(Math.round(v)),"#fbbf24"],
          ].map(([label,key,fmt,color])=>{
            const r30v=company.r30?.[key];
            const ytdv=company.ytd?.[key];
            return(
              <div key={key}>
                <div style={{fontSize:10,color:"var(--text-muted)",letterSpacing:".06em",textTransform:"uppercase",fontWeight:700,marginBottom:6}}>{label}</div>
                <div style={{display:"flex",gap:14,alignItems:"baseline"}}>
                  {r30Data&&<div><div style={{fontSize:9,color:"#38bdf8",marginBottom:1}}>R30</div><div style={{fontSize:15,fontWeight:800,color,fontFamily:"var(--font-mono)"}}>{fmt(r30v??0)}</div></div>}
                  {ytdData&&<div><div style={{fontSize:9,color:"#34d399",marginBottom:1}}>YTD</div><div style={{fontSize:15,fontWeight:800,color:ytdData?"var(--text-secondary)":color,fontFamily:"var(--font-mono)"}}>{fmt(ytdv??0)}</div></div>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── MARKET CARDS ── */}
      {marketCards.length===0?(
        <div style={{textAlign:"center",padding:"40px 0",color:"var(--text-muted)",fontSize:13}}>
          No markets configured — assign reps to markets in the Dispatch tab first.
        </div>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:14}}>
          {marketCards.map((mkt,idx)=>(
            <div key={mkt.name} className="metric-card fade-up" style={{animationDelay:`${idx*.05}s`,background:"var(--bg-surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",padding:18,position:"relative",overflow:"hidden"}}>
              {/* rank badge */}
              <div style={{position:"absolute",top:14,right:14,width:26,height:26,borderRadius:"50%",background:"rgba(56,189,248,.08)",border:"1px solid rgba(56,189,248,.18)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#38bdf8",fontFamily:"var(--font-mono)"}}>{idx+1}</div>

              {/* market name + rep count */}
              <div style={{marginBottom:14}}>
                <div style={{fontWeight:800,fontSize:15,color:"var(--text-primary)",fontFamily:"var(--font-display)",marginBottom:3}}>{mkt.name}</div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{fontSize:10,color:"var(--text-muted)"}}>{mkt.repCount} active rep{mkt.repCount!==1?"s":""}</span>
                  {mkt.eliteCount>0&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:3,background:"rgba(245,158,11,.12)",color:"#f59e0b",fontWeight:700,border:"1px solid rgba(245,158,11,.2)"}}>🥇 {mkt.eliteCount} top tier</span>}
                  {mkt.atRiskCount>0&&<span style={{fontSize:9,padding:"1px 6px",borderRadius:3,background:"rgba(248,113,113,.10)",color:"#f87171",fontWeight:700,border:"1px solid rgba(248,113,113,.2)"}}>⚠ {mkt.atRiskCount} at risk</span>}
                </div>
              </div>

              {/* 4 key metrics grid */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                {[
                  {label:"Net Volume",val:f$(Math.round(mkt.netVol)),color:"#34d399",key:"netVol"},
                  {label:"STD%",val:fP(mkt.stdPct),color:"#38bdf8",key:"stdPct"},
                  {label:"OTD%",val:fP(mkt.otdPct),color:"#a78bfa",key:"otdPct"},
                  {label:"Avg Deal",val:f$(Math.round(mkt.avgDeal)),color:"#fbbf24",key:"avgDeal"},
                ].map(({label,val,color})=>(
                  <div key={label} style={{background:"var(--bg-elevated)",borderRadius:"var(--radius-sm)",padding:"10px 12px",border:"1px solid var(--border)"}}>
                    <div style={{fontSize:9,color:"var(--text-muted)",letterSpacing:".06em",textTransform:"uppercase",fontWeight:700,marginBottom:4}}>{label}</div>
                    <div style={{fontSize:15,fontWeight:800,color,fontFamily:"var(--font-mono)"}}>{val}</div>
                  </div>
                ))}
              </div>

              {/* volume trend vs other window */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",borderTop:"1px solid var(--border)",paddingTop:12}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:11}}>{trendIcon(mkt.volTrend)}</span>
                  <div>
                    <div style={{fontSize:9,color:"var(--text-muted)",letterSpacing:".04em"}}>Vol vs {snapWin==="r30"?"YTD":"R30"}</div>
                    <div style={{fontSize:12,fontWeight:700,color:trendColor(mkt.volTrend),fontFamily:"var(--font-mono)"}}>{trendLabel(mkt.volTrend)}</div>
                  </div>
                </div>
                {mkt.topRep&&(
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:9,color:"var(--text-muted)",marginBottom:2}}>Top Producer</div>
                    <div style={{fontSize:11,fontWeight:700,color:"var(--text-primary)",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{mkt.topRep.rep}</div>
                    <div style={{fontSize:9,color:"#34d399",fontFamily:"var(--font-mono)"}}>{f$(mkt.topRep.net_vol)}</div>
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── TRENDS TAB ──────────────────────────────────────────────────────────────
function TrendsTab({r30Data,ytdData,history,onOpenScorecard}){
  const trendRows=useMemo(()=>{
    if(!r30Data||!ytdData)return[];
    const rows=[];
    for(const r30R of r30Data.reps.filter(r=>r.tier!=="⛔ Excluded"&&r.demo>=3)){
      const ytdR=ytdData.reps.find(x=>x.rep===r30R.rep);
      if(!ytdR)continue;
      const sigs={};let composite=0;
      for(const m of SIGNAL_METRICS){
        const r30v=m.key==="_gap"?gapPts(r30R):r30R[m.key];
        const ytdv=m.key==="_gap"?gapPts(ytdR):ytdR[m.key];
        const sig=signal(r30v,ytdv,m.higherBetter);
        sigs[m.key]={...sig,r30:r30v,ytd:ytdv};composite+=sig.s;
      }
      const rankDelta=(ytdR.rank==="-"||r30R.rank==="-")?null:ytdR.rank-r30R.rank;
      rows.push({rep:r30R.rep,tier:r30R.tier,r30R,ytdR,sigs,composite,rankDelta});
    }
    rows.sort((a,b)=>b.composite-a.composite);
    return rows;
  },[r30Data,ytdData]);

  const historyRows=useMemo(()=>{
    const r30Snaps=history.filter(h=>h.win==="r30").sort((a,b)=>new Date(a.sdate||a.updated)-new Date(b.sdate||b.updated));
    if(r30Snaps.length<2)return[];
    const repNames=new Set(r30Snaps.flatMap(s=>s.reps?.map(r=>r.rep)||[]));
    const rows=[];
    for(const name of repNames){
      const pts=r30Snaps.map(s=>{const r=s.reps?.find(x=>x.rep===name);return r?{date:s.sdate||s.updated,std:r.std_pct,net_vol:r.net_vol,score:r.score,fallout:r.fallout_rate}:null;}).filter(Boolean);
      if(pts.length<2)continue;
      const first=pts[0],last=pts[pts.length-1];
      rows.push({rep:name,pts,first,last,stdDelta:last.std-first.std,volDelta:last.net_vol-first.net_vol,snapCount:pts.length});
    }
    rows.sort((a,b)=>b.stdDelta-a.stdDelta);
    return rows;
  },[history]);

  const compositeLabel=c=>{
    if(c>=8) return{text:"🔥 On Fire",    color:"#34d399"};
    if(c>=4) return{text:"📈 Heating Up", color:"#86efac"};
    if(c>=1) return{text:"↗ Improving",   color:"#94a3b8"};
    if(c===0)return{text:"➡ Stable",      color:"#64748b"};
    if(c>=-3)return{text:"↘ Softening",   color:"#fb923c"};
    if(c>=-6)return{text:"📉 Slipping",   color:"#f87171"};
    return{text:"❄ Cooling",color:"#38bdf8"};
  };

  const top5=trendRows.slice(0,5),bot5=[...trendRows].reverse().slice(0,5);

  if(!r30Data||!ytdData){
    return(
      <div className="empty-state">
        <div className="empty-icon">📊</div>
        <div className="empty-title">Upload both R30 and YTD data</div>
        <div className="empty-sub">Trends require two windows of data to compare</div>
      </div>
    );
  }

  return(
    <div style={{padding:"18px 22px"}}>
      {/* TOP/BOTTOM CARDS */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:24}}>
        {/* HEATING UP */}
        <div className="section-block" style={{margin:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
            <span style={{fontSize:14}}>🔥</span>
            <span style={{fontWeight:800,fontSize:13,color:"#34d399",fontFamily:"var(--font-display)",letterSpacing:".04em"}}>HEATING UP</span>
            <span style={{fontSize:10,color:"var(--text-muted)",marginLeft:2}}>Top 5 by momentum</span>
          </div>
          {top5.map((r,i)=>{
            const cl=compositeLabel(r.composite);
            const stdDelta=r.r30R.std_pct-r.ytdR.std_pct,volDelta=r.r30R.net_vol-r.ytdR.net_vol;
            return(
              <div key={r.rep} onClick={()=>onOpenScorecard(r.rep)}
                style={{padding:"10px 13px",borderRadius:"var(--radius)",cursor:"pointer",marginBottom:7,
                  background:"var(--bg-elevated)",border:"1px solid var(--border)",transition:"all .15s"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--border-strong)";e.currentTarget.style.background="var(--bg-hover)";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";e.currentTarget.style.background="var(--bg-elevated)";}}>
                <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:6}}>
                  <span style={{fontSize:15,minWidth:22}}>{["🥇","🥈","🥉","🔥","🔥"][i]}</span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13,color:"var(--text-primary)"}}>{r.rep}</div>
                    <div style={{fontSize:10,color:TC[r.tier]??"#64748b"}}>{r.tier}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{color:cl.color,fontWeight:700,fontSize:11}}>{cl.text}</div>
                    {r.rankDelta!=null&&<div style={{color:r.rankDelta>0?"#34d399":"#f87171",fontSize:10,fontWeight:700}}>{r.rankDelta>0?`▲${r.rankDelta} ranks`:`▼${Math.abs(r.rankDelta)} ranks`}</div>}
                  </div>
                </div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  {stdDelta>0.02&&<span style={{color:"#34d399",background:"rgba(52,211,153,.1)",padding:"2px 7px",borderRadius:4,fontSize:10,fontWeight:600}}>STD% +{(stdDelta*100).toFixed(1)}pp</span>}
                  {volDelta>0&&<span style={{color:"#38bdf8",background:"rgba(56,189,248,.1)",padding:"2px 7px",borderRadius:4,fontSize:10,fontWeight:600}}>Vol +{f$(volDelta)}</span>}
                  {r.r30R.net_issue_rate>=.80&&<span style={{color:"#a78bfa",background:"rgba(167,139,250,.1)",padding:"2px 7px",borderRadius:4,fontSize:10}}>✓ Clean</span>}
                </div>
              </div>
            );
          })}
        </div>

        {/* COOLING OFF */}
        <div className="section-block" style={{margin:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
            <span style={{fontSize:14}}>❄️</span>
            <span style={{fontWeight:800,fontSize:13,color:"#38bdf8",fontFamily:"var(--font-display)",letterSpacing:".04em"}}>COOLING OFF</span>
            <span style={{fontSize:10,color:"var(--text-muted)",marginLeft:2}}>Bottom 5 by momentum</span>
          </div>
          {bot5.map((r,i)=>{
            const cl=compositeLabel(r.composite);
            return(
              <div key={r.rep} onClick={()=>onOpenScorecard(r.rep)}
                style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:"var(--radius)",
                  cursor:"pointer",marginBottom:7,background:"var(--bg-elevated)",border:"1px solid var(--border)",transition:"all .15s"}}
                onMouseEnter={e=>{e.currentTarget.style.background="var(--bg-hover)";e.currentTarget.style.borderColor="var(--border-strong)";}}
                onMouseLeave={e=>{e.currentTarget.style.background="var(--bg-elevated)";e.currentTarget.style.borderColor="var(--border)";}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13,color:"var(--text-primary)"}}>{r.rep}</div>
                  <div style={{fontSize:10,color:TC[r.tier]??"#64748b"}}>{r.tier}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:cl.color,fontWeight:700,fontSize:12}}>{cl.text}</div>
                  <div style={{fontSize:10,color:"var(--text-faint)",fontFamily:"var(--font-mono)"}}>Score {r.composite>0?"+":""}{r.composite}</div>
                </div>
                {r.rankDelta!=null&&(
                  <div style={{color:r.rankDelta>0?"#34d399":r.rankDelta<0?"#f87171":"#64748b",fontWeight:700,fontSize:12,minWidth:34,textAlign:"right"}}>
                    {r.rankDelta>0?`▲${r.rankDelta}`:r.rankDelta<0?`▼${Math.abs(r.rankDelta)}`:"—"}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* HISTORICAL TRAJECTORIES */}
      {historyRows.length>0&&(
        <div style={{marginBottom:24}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <span style={{fontWeight:700,fontSize:13,color:"#a78bfa",fontFamily:"var(--font-display)"}}>📈 HISTORICAL TRAJECTORY</span>
            <span style={{fontSize:10,color:"var(--text-muted)"}}>{history.filter(h=>h.win==="r30").length} R30 snapshots</span>
          </div>
          <div style={{overflowX:"auto",borderRadius:"var(--radius-lg)",border:"1px solid var(--border)"}}>
            <table className="rank-table">
              <thead>
                <tr>
                  {["Rep","Tier","STD% Trend","Net Vol Trend","Score Trend","Snapshots","STD% Δ","Net Vol Δ"].map(l=>(
                    <th key={l} style={{cursor:"default"}}>{l}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {historyRows.slice(0,20).map((r,i)=>(
                  <tr key={r.rep} onClick={()=>onOpenScorecard(r.rep)} className="clickable-row" style={{cursor:"pointer"}}>
                    <td style={{fontWeight:600,color:"var(--text-primary)",whiteSpace:"nowrap"}}>{r.rep}</td>
                    <td><span className="tier-pill" style={{background:`${TC[r30Data.reps.find(x=>x.rep===r.rep)?.tier]??"#64748b"}18`,color:TC[r30Data.reps.find(x=>x.rep===r.rep)?.tier]??"#64748b"}}>{r30Data.reps.find(x=>x.rep===r.rep)?.tier??"—"}</span></td>
                    <td><Sparkline points={r.pts.map(p=>({v:p.std}))} color="#6366f1" width={90}/></td>
                    <td><Sparkline points={r.pts.map(p=>({v:p.net_vol}))} color="#38bdf8" width={90}/></td>
                    <td><Sparkline points={r.pts.map(p=>({v:p.score}))} color="#fbbf24" width={90}/></td>
                    <td style={{textAlign:"center"}}>{r.snapCount}</td>
                    <td style={{color:r.stdDelta>0?"#34d399":"#f87171",fontWeight:700,fontFamily:"var(--font-mono)"}}>{r.stdDelta>0?"+":""}{(r.stdDelta*100).toFixed(1)}pp</td>
                    <td style={{color:r.volDelta>0?"#34d399":"#f87171",fontWeight:700,fontFamily:"var(--font-mono)"}}>{r.volDelta>0?"+":""}{f$(r.volDelta)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* FULL TREND TABLE */}
      <div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <span style={{fontWeight:700,fontSize:13,color:"var(--text-primary)",fontFamily:"var(--font-display)"}}>📊 FULL MOMENTUM TABLE</span>
          <span style={{fontSize:10,color:"var(--text-muted)"}}>{trendRows.length} reps</span>
        </div>
        <div style={{overflowX:"auto",borderRadius:"var(--radius-lg)",border:"1px solid var(--border)"}}>
          <table className="rank-table">
            <thead>
              <tr>
                <th>Rep</th><th>Tier</th><th style={{color:"#94a3b8"}}>Momentum</th>
                <th style={{color:"#94a3b8"}}>Score</th>
                <th style={{color:"#6366f1"}}>STD%</th><th style={{color:"#38bdf8"}}>OTD%</th>
                <th style={{color:"#34d399"}}>Net Vol</th><th style={{color:"#fbbf24"}}>Avg Deal</th>
                <th style={{color:"#86efac"}}>NetStk%</th><th style={{color:"#fb923c"}}>Fallout%</th>
                <th style={{color:"#fbbf24"}}>OTD↔STD</th><th style={{color:"#94a3b8"}}>Rank Δ</th>
              </tr>
            </thead>
            <tbody>
              {trendRows.map((row,i)=>{
                const cl=compositeLabel(row.composite);
                const SigCell=({mKey,fmt})=>{
                  const s=row.sigs[mKey];if(!s)return<td>—</td>;
                  return(
                    <td>
                      <div style={{color:s.color,fontSize:11}}>
                        <span style={{opacity:.5,fontSize:10,fontFamily:"var(--font-mono)"}}>{fmt?fmt(s.ytd):s.ytd} </span>
                        <span style={{fontWeight:700,fontFamily:"var(--font-mono)"}}>{s.icon} {fmt?fmt(s.r30):s.r30}</span>
                      </div>
                    </td>
                  );
                };
                return(
                  <tr key={row.rep} onClick={()=>onOpenScorecard(row.rep)} className="clickable-row" style={{cursor:"pointer"}}>
                    <td style={{fontWeight:600,color:"var(--text-primary)",whiteSpace:"nowrap"}}>{row.rep}</td>
                    <td><span className="tier-pill" style={{background:`${TC[row.tier]??"#64748b"}18`,color:TC[row.tier]??"#64748b"}}>{row.tier}</span></td>
                    <td><span style={{color:cl.color,fontWeight:700,fontSize:11}}>{cl.text}</span></td>
                    <td>
                      <div style={{fontSize:10}}>
                        <span style={{color:"var(--text-faint)",fontFamily:"var(--font-mono)"}}>{row.ytdR.score?.toFixed(3)} </span>
                        <span style={{color:row.sigs.std_pct?.s>=0?"#34d399":"#f87171",fontWeight:700,fontFamily:"var(--font-mono)"}}>→ {row.r30R.score?.toFixed(3)}</span>
                      </div>
                    </td>
                    <SigCell mKey="std_pct" fmt={fP}/>
                    <SigCell mKey="otd_pct" fmt={fP}/>
                    <SigCell mKey="net_vol" fmt={fK}/>
                    <SigCell mKey="avg_deal" fmt={fK}/>
                    <SigCell mKey="net_issue_rate" fmt={fP}/>
                    <SigCell mKey="fallout_rate" fmt={fP}/>
                    <SigCell mKey="_gap" fmt={v=>`${v}pp`}/>
                    <td>
                      {row.rankDelta!=null?(
                        <span style={{color:row.rankDelta>0?"#34d399":row.rankDelta<0?"#f87171":"#64748b",fontWeight:700,fontFamily:"var(--font-mono)"}}>
                          {row.rankDelta>0?`▲${row.rankDelta}`:row.rankDelta<0?`▼${Math.abs(row.rankDelta)}`:"—"}
                        </span>
                      ):"—"}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── COMPARISON TOOL ─────────────────────────────────────────────────────────
function ComparisonTool({r30Data,ytdData,markets,marketList}){
  const [mode,setMode]=useState("rep");
  const [selectedReps,setSelectedReps]=useState([]);
  const [selectedMarkets,setSelectedMarkets]=useState([]);
  const [dataWin,setDataWin]=useState("r30");

  const srcData=dataWin==="r30"?r30Data:ytdData;
  const activeReps=useMemo(()=>(srcData?.reps||[]).filter(r=>r.tier!=="⛔ Excluded"&&markets[r.rep]!=="⛔ Terminated"),[srcData,markets]);

  const marketData=useMemo(()=>{
    if(!srcData||!marketList.length)return{};
    const result={};
    for(const mkt of marketList){
      const reps=activeReps.filter(r=>markets[r.rep]===mkt);
      if(!reps.length)continue;
      const sum=f=>reps.reduce((a,r)=>a+(r[f]??0),0);
      const avg=f=>sum(f)/reps.length;
      const totalGross=sum("gross_iss"),totalCloses=sum("otd_cnt"),totalNetVol=sum("net_vol");
      const totalCloseVol=sum("close_vol"),totalNetCloses=sum("num_net");
      const totalCancel=sum("cancel_cnt"),totalHold=sum("hold_cnt"),totalCrDecl=sum("crdecline_cnt"),totalNsli=sum("nsli");
      const per100=f=>totalGross>0?(sum(f)/totalGross)*100:0;
      result[mkt]={
        name:mkt,repCount:reps.length,totalGross,totalCloses,totalNetVol,totalCloseVol,totalNetCloses,
        totalCancel,totalHold,totalCrDecl,totalNsli,
        otd_pct:totalGross>0?totalCloses/totalGross:0,
        std_pct:sum("demo")>0?totalCloses/sum("demo"):0,
        netstk_pct:totalCloses>0?totalNetCloses/totalCloses:0,
        fallout_rate:totalCloses>0?(totalCancel*0.65+totalHold*0.25+totalCrDecl*0.10)/totalCloses:0,
        avg_deal:totalCloses>0?totalCloseVol/totalCloses:0,
        avg_net_vol_per_rep:totalNetVol/reps.length,
        nsli_per_close:totalCloses>0?totalNsli/totalCloses:0,
        norm_net_vol:per100("net_vol"),norm_closes:totalGross>0?(totalCloses/totalGross)*100:0,
        norm_nsli:per100("nsli"),avg_score:avg("score"),
        elite_pct:reps.filter(r=>r.tier==="🥇 Elite").length/reps.length,reps,
      };
    }
    return result;
  },[srcData,activeReps,markets,marketList]);

  const toggleRep=rep=>{setSelectedReps(prev=>prev.includes(rep)?prev.filter(r=>r!==rep):prev.length<4?[...prev,rep]:prev);};
  const toggleMarket=m=>{setSelectedMarkets(prev=>prev.includes(m)?prev.filter(x=>x!==m):prev.length<4?[...prev,m]:prev);};

  const REP_METRICS=[
    {key:"nsli",label:"NSLI/NCP $",fmt:v=>"$"+Math.round(v).toLocaleString(),get:r=>r.nsli,higherBetter:true},
    {key:"otd_pct",label:"OTD%",fmt:v=>(v*100).toFixed(1)+"%",get:r=>r.otd_pct,higherBetter:true},
    {key:"std_pct",label:"STD%",fmt:v=>(v*100).toFixed(1)+"%",get:r=>r.std_pct,higherBetter:true},
    {key:"net_issue_rate",label:"NetStk%",fmt:v=>(v*100).toFixed(1)+"%",get:r=>r.net_issue_rate,higherBetter:true,breakdown:true},
    {key:"net_vol",label:"Net Volume",fmt:v=>"$"+Math.round(v).toLocaleString(),get:r=>r.net_vol,higherBetter:true},
    {key:"avg_deal",label:"Avg Deal",fmt:v=>"$"+Math.round(v).toLocaleString(),get:r=>r.avg_deal,higherBetter:true},
    {key:"fallout_rate",label:"Wtd Fallout%",fmt:v=>(v*100).toFixed(1)+"%",get:r=>r.fallout_rate,higherBetter:false},
    {key:"score",label:"Overall Score",fmt:v=>v?.toFixed(4),get:r=>r.score,higherBetter:true},
  ];
  const MKT_METRICS=[
    {key:"totalNetVol",label:"Total Net Vol",fmt:v=>"$"+Math.round(v).toLocaleString(),higherBetter:true},
    {key:"norm_net_vol",label:"Net Vol per 100 Appts",fmt:v=>"$"+Math.round(v).toLocaleString(),higherBetter:true},
    {key:"netstk_pct",label:"NetStk%",fmt:v=>(v*100).toFixed(1)+"%",higherBetter:true,breakdown:true},
    {key:"otd_pct",label:"OTD%",fmt:v=>(v*100).toFixed(1)+"%",higherBetter:true},
    {key:"std_pct",label:"STD%",fmt:v=>(v*100).toFixed(1)+"%",higherBetter:true},
    {key:"fallout_rate",label:"Wtd Fallout%",fmt:v=>(v*100).toFixed(1)+"%",higherBetter:false},
    {key:"avg_deal",label:"Avg Deal Size",fmt:v=>"$"+Math.round(v).toLocaleString(),higherBetter:true},
    {key:"totalNsli",label:"Total NSLI/NCP",fmt:v=>"$"+Math.round(v).toLocaleString(),higherBetter:true},
    {key:"nsli_per_close",label:"NSLI per Close",fmt:v=>"$"+Math.round(v).toLocaleString(),higherBetter:true},
    {key:"avg_score",label:"Avg Rep Score",fmt:v=>v?.toFixed(4),higherBetter:true},
    {key:"elite_pct",label:"Elite Rep %",fmt:v=>(v*100).toFixed(0)+"%",higherBetter:true},
    {key:"repCount",label:"Active Reps",fmt:v=>v,higherBetter:false},
    {key:"totalGross",label:"Total Gross Issued",fmt:v=>v,higherBetter:false},
  ];
  const COLORS=["#38bdf8","#fbbf24","#34d399","#f87171"];
  const selectedItems=mode==="rep"?selectedReps:selectedMarkets;
  const metrics=mode==="rep"?REP_METRICS:MKT_METRICS;
  const getData=item=>mode==="rep"?activeReps.find(r=>r.rep===item):marketData[item];

  const CompBar=({values,fmt,higherBetter,label,note,breakdowns})=>{
    const nums=values.map(v=>typeof v==="number"?v:0);
    const maxV=Math.max(...nums,0.001);
    const best=higherBetter?Math.max(...nums):Math.min(...nums.filter(v=>v>0));
    return(
      <div style={{marginBottom:12,padding:"12px 16px",background:"var(--bg-elevated)",borderRadius:"var(--radius)",border:"1px solid var(--border)"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <span style={{fontSize:11,color:"var(--text-secondary)",fontWeight:600}}>{label}</span>
          {note&&<span style={{fontSize:9,color:"var(--text-muted)",maxWidth:200,textAlign:"right"}}>{note}</span>}
        </div>
        {values.map((v,i)=>{
          if(v==null)return null;
          const pct=maxV>0?Math.max(4,(v/maxV)*100):4;
          const isBest=v===best&&v>0;
          const bd=breakdowns?.[i];
          return(
            <div key={i} style={{marginTop:7}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:COLORS[i],flexShrink:0}}/>
                <div style={{flex:1,height:16,background:"var(--bg-base)",borderRadius:3,overflow:"hidden",position:"relative"}}>
                  <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pct}%`,background:COLORS[i],opacity:.75,borderRadius:3,transition:"width .4s ease"}}/>
                </div>
                <span style={{fontSize:12,color:isBest?COLORS[i]:"var(--text-secondary)",fontWeight:isBest?800:400,minWidth:95,textAlign:"right",fontFamily:"var(--font-mono)"}}>
                  {fmt?fmt(v):v}{isBest&&" ★"}
                </span>
              </div>
              {bd&&(
                <div style={{marginLeft:16,marginTop:4,display:"flex",gap:8,flexWrap:"wrap"}}>
                  {bd.cancel!=null&&<span style={{fontSize:9,color:"#f87171"}}>⛔ Cxl {(bd.cancel*100).toFixed(1)}%</span>}
                  {bd.hold!=null&&<span style={{fontSize:9,color:"#fbbf24"}}>⏸ Hold {(bd.hold*100).toFixed(1)}%</span>}
                  {bd.crdecl!=null&&<span style={{fontSize:9,color:"#a78bfa"}}>❌ Decl {(bd.crdecl*100).toFixed(1)}%</span>}
                </div>
              )}
            </div>
          );
        })}
      </div>
    );
  };

  return(
    <div style={{padding:"18px 22px"}}>
      <div style={{marginBottom:18}}>
        <div style={{fontWeight:800,fontSize:15,color:"var(--text-primary)",fontFamily:"var(--font-display)",marginBottom:4}}>⚖ Comparison Tool</div>
        <div style={{fontSize:12,color:"var(--text-muted)"}}>Select up to 4 reps or markets for side-by-side analysis</div>
      </div>

      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <div className="seg-control">
          {[["rep","👤 Rep vs Rep"],["market","🗺 Market vs Market"]].map(([m,l])=>(
            <button key={m} className={`seg-btn${mode===m?" active":""}`} onClick={()=>{setMode(m);setSelectedReps([]);setSelectedMarkets([]);}}>{l}</button>
          ))}
        </div>
        <div className="seg-control" style={{marginLeft:"auto"}}>
          {["r30","ytd"].map(w=>(
            <button key={w} className={`seg-btn${dataWin===w?" active":""}`} onClick={()=>setDataWin(w)}>{w==="r30"?"R30":"YTD"}</button>
          ))}
        </div>
      </div>

      <div className="section-block" style={{marginBottom:16}}>
        <div style={{fontSize:10,color:"var(--text-muted)",letterSpacing:".07em",marginBottom:10,textTransform:"uppercase",fontWeight:700}}>
          {mode==="rep"?`Select Reps (${selectedReps.length}/4)`:`Select Markets (${selectedMarkets.length}/4)`}
        </div>
        {mode==="rep"?(
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {activeReps.sort((a,b)=>a.rep.localeCompare(b.rep)).map(r=>{
              const sel=selectedReps.includes(r.rep),idx=selectedReps.indexOf(r.rep);
              return(
                <button key={r.rep} onClick={()=>toggleRep(r.rep)} disabled={!sel&&selectedReps.length>=4}
                  style={{padding:"5px 11px",borderRadius:20,fontFamily:"inherit",cursor:"pointer",fontSize:11,
                    border:`1.5px solid ${sel?COLORS[idx]:"var(--border)"}`,
                    background:sel?`${COLORS[idx]}18`:"transparent",
                    color:sel?COLORS[idx]:"var(--text-secondary)",
                    opacity:(!sel&&selectedReps.length>=4)?.35:1,transition:"all .15s"}}>
                  {sel&&<span style={{marginRight:4,fontWeight:800}}>#{idx+1}</span>}
                  {r.rep}
                  <span style={{marginLeft:5,fontSize:9,color:TC[r.tier]??"#64748b"}}>{r.tier?.split(" ")[0]}</span>
                </button>
              );
            })}
          </div>
        ):(
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {marketList.filter(m=>marketData[m]).map(m=>{
              const sel=selectedMarkets.includes(m),idx=selectedMarkets.indexOf(m),md=marketData[m];
              return(
                <button key={m} onClick={()=>toggleMarket(m)} disabled={!sel&&selectedMarkets.length>=4}
                  style={{padding:"8px 14px",borderRadius:"var(--radius)",fontFamily:"inherit",cursor:"pointer",
                    border:`1.5px solid ${sel?COLORS[idx]:"var(--border)"}`,
                    background:sel?`${COLORS[idx]}18`:"transparent",
                    color:sel?COLORS[idx]:"var(--text-secondary)",fontSize:12,textAlign:"left",
                    opacity:(!sel&&selectedMarkets.length>=4)?.35:1,transition:"all .15s"}}>
                  {sel&&<span style={{marginRight:4,fontWeight:800}}>#{idx+1}</span>}
                  <span style={{fontWeight:600}}>{m}</span>
                  {md&&<span style={{marginLeft:8,fontSize:10,color:"var(--text-muted)"}}>{md.repCount} reps · {md.totalGross} appts</span>}
                </button>
              );
            })}
            {!marketList.length&&<div style={{color:"var(--text-muted)",fontSize:12}}>No markets assigned yet.</div>}
          </div>
        )}
      </div>

      {selectedItems.length>0&&(
        <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
          {selectedItems.map((item,i)=>{
            const d=getData(item);
            return(
              <div key={item} style={{display:"flex",alignItems:"center",gap:9,background:"var(--bg-surface)",border:`1px solid ${COLORS[i]}33`,borderRadius:"var(--radius)",padding:"9px 14px"}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:COLORS[i]}}/>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:COLORS[i]}}>{item}</div>
                  {mode==="rep"&&d&&<div style={{fontSize:10,color:"var(--text-muted)"}}>{d.tier} · Rank #{d.rank} · Score {d.score?.toFixed(3)}</div>}
                  {mode==="market"&&d&&<div style={{fontSize:10,color:"var(--text-muted)"}}>{d.repCount} reps · {d.totalGross} gross issued</div>}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {mode==="market"&&selectedItems.length>=2&&(
        <div style={{background:"rgba(56,189,248,.05)",border:"1px solid rgba(56,189,248,.15)",borderRadius:"var(--radius)",padding:"10px 14px",marginBottom:14,fontSize:12,color:"#38bdf8",lineHeight:1.6}}>
          <strong>Volume context:</strong> Use <strong>Net Vol per 100 Appts</strong> for a fair normalized comparison.
        </div>
      )}

      {selectedItems.length>=2?(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:10}}>
          {metrics.map(m=>{
            const values=selectedItems.map(item=>{const d=getData(item);return d?m.get?m.get(d):d[m.key]:null;});
            if(values.every(v=>!v&&v!==0))return null;
            let breakdowns=null;
            if(m.breakdown){
              breakdowns=selectedItems.map(item=>{
                const d=getData(item);if(!d)return null;
                if(mode==="rep"){return{cancel:d.cancel_rate,hold:d.hold_rate,crdecl:d.crdecl_rate};}
                else{return{cancel:d.totalCloses>0?d.totalCancel/d.totalCloses:0,hold:d.totalCloses>0?d.totalHold/d.totalCloses:0,crdecl:d.totalCloses>0?d.totalCrDecl/d.totalCloses:0};}
              });
            }
            return<CompBar key={m.key} values={values} fmt={m.fmt} higherBetter={m.higherBetter!==false} label={m.label} note={m.note} breakdowns={breakdowns}/>;
          })}
        </div>
      ):(
        <div style={{textAlign:"center",color:"var(--text-muted)",padding:"48px 0",fontSize:13}}>
          {selectedItems.length===0?"Select at least 2 items above to compare":"Select one more to start comparing"}
        </div>
      )}

      {/* VOLUME NORMALIZED (rep mode) */}
      {mode==="rep"&&selectedItems.length>=2&&(()=>{
        const maxGross=Math.max(...selectedItems.map(rep=>{const d=activeReps.find(r=>r.rep===rep);return d?.gross_iss||0;}));
        return(
          <div style={{marginTop:20}}>
            <div className="section-block" style={{marginBottom:14}}>
              <div style={{fontWeight:700,fontSize:13,color:"var(--text-primary)",fontFamily:"var(--font-display)",marginBottom:12}}>📐 Volume-Normalized — per 100 gross issued</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:10}}>
                {[
                  {label:"Net Vol per 100 Appts",key:"norm_net_vol",fmt:v=>"$"+Math.round(v).toLocaleString()},
                  {label:"Closes per 100 Appts",key:"norm_closes",fmt:v=>v.toFixed(1)},
                  {label:"NSLI per 100 Appts",key:"norm_nsli",fmt:v=>"$"+Math.round(v).toLocaleString()},
                  {label:"Net Closes per 100 Appts",key:"norm_net_closes",fmt:v=>v.toFixed(1)},
                ].map(m=>{
                  const values=selectedItems.map(rep=>{
                    const d=activeReps.find(r=>r.rep===rep);if(!d||!d.gross_iss)return null;
                    const per100=f=>(d[f]/d.gross_iss)*100;
                    if(m.key==="norm_net_vol")return per100("net_vol");
                    if(m.key==="norm_closes")return per100("otd_cnt");
                    if(m.key==="norm_nsli")return per100("nsli");
                    if(m.key==="norm_net_closes")return per100("num_net");
                    return null;
                  });
                  const maxV=Math.max(...values.filter(v=>v!=null),0.001),best=Math.max(...values.filter(v=>v!=null));
                  return(
                    <div key={m.key} style={{background:"var(--bg-elevated)",borderRadius:"var(--radius)",padding:"12px 14px",border:"1px solid var(--border)"}}>
                      <div style={{fontSize:11,color:"var(--text-secondary)",fontWeight:600,marginBottom:10}}>{m.label}</div>
                      {values.map((v,i)=>{
                        if(v==null)return null;
                        const pct=Math.max(4,(v/maxV)*100),isBest=v===best&&v>0;
                        const rep=selectedItems[i];
                        return(
                          <div key={i} style={{marginBottom:8}}>
                            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:3}}>
                              <span style={{color:COLORS[i]}}>{rep.split(",")[0]}</span>
                              <span style={{color:isBest?COLORS[i]:"var(--text-muted)",fontWeight:isBest?800:400,fontFamily:"var(--font-mono)"}}>{m.fmt(v)}{isBest?" ★":""}</span>
                            </div>
                            <div style={{height:6,background:"var(--bg-base)",borderRadius:3,overflow:"hidden"}}>
                              <div style={{height:"100%",width:`${pct}%`,background:COLORS[i],opacity:.75,borderRadius:3,transition:"width .4s ease"}}/>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        );
      })()}

      {/* LEAD RECOMMENDATION */}
      {mode==="rep"&&selectedItems.length===2&&(()=>{
        const dA=activeReps.find(r=>r.rep===selectedItems[0]),dB=activeReps.find(r=>r.rep===selectedItems[1]);
        if(!dA||!dB)return null;
        const teamAvgObj={
          net_vol:activeReps.reduce((a,r)=>a+r.net_vol,0)/activeReps.length,
          std_pct:activeReps.reduce((a,r)=>a+r.std_pct,0)/activeReps.length,
          net_issue_rate:activeReps.reduce((a,r)=>a+r.net_issue_rate,0)/activeReps.length,
          fallout_rate:activeReps.reduce((a,r)=>a+r.fallout_rate,0)/activeReps.length,
          avg_deal:activeReps.reduce((a,r)=>a+r.avg_deal,0)/activeReps.length,
        };
        const rec=generateLeadRecommendation(selectedItems[0],dA,selectedItems[1],dB,teamAvgObj);
        const confColor=rec.confidence==="Strong"?"#34d399":rec.confidence==="Moderate"?"#fbbf24":"#94a3b8";
        const winnerIdx=selectedItems.indexOf(rec.winner),winnerColor=rec.winner?COLORS[winnerIdx]:"#94a3b8";
        return(
          <div style={{marginTop:18,background:"var(--bg-surface)",border:`1px solid ${winnerColor}33`,borderRadius:"var(--radius-lg)",padding:22,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",inset:0,background:`linear-gradient(135deg,${winnerColor}05 0%,transparent 60%)`,pointerEvents:"none"}}/>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
              <span style={{fontSize:22}}>🎯</span>
              <div>
                <div style={{fontWeight:800,fontSize:15,color:"var(--text-primary)",fontFamily:"var(--font-display)"}}>Lead Recommendation</div>
                <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>Weighted toward netting business: close rate + stick rate + fallout</div>
              </div>
            </div>
            {rec.winner?(
              <>
                <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16,padding:"16px 18px",background:`${winnerColor}0e`,border:`1px solid ${winnerColor}25`,borderRadius:"var(--radius)"}}>
                  <div style={{fontSize:32}}>🏆</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,color:"var(--text-muted)",letterSpacing:".07em",marginBottom:2,textTransform:"uppercase"}}>Give the next lead to</div>
                    <div style={{fontWeight:900,fontSize:22,color:winnerColor,fontFamily:"var(--font-display)"}}>{rec.winner}</div>
                    <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>{activeReps.find(r=>r.rep===rec.winner)?.tier} · Score {activeReps.find(r=>r.rep===rec.winner)?.score?.toFixed(4)}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:10,color:"var(--text-muted)",marginBottom:3}}>Confidence</div>
                    <div style={{fontWeight:800,fontSize:14,color:confColor}}>{rec.confidence}</div>
                    <div style={{fontSize:10,color:"var(--text-muted)",marginTop:3}}>Score gap: {Math.abs(rec.ptsA-rec.ptsB)} pts</div>
                  </div>
                </div>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:10,color:"var(--text-muted)",letterSpacing:".07em",marginBottom:8,fontWeight:700,textTransform:"uppercase"}}>Why this rep?</div>
                  {rec.reasons.map((reason,i)=>(
                    <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",background:"rgba(255,255,255,.03)",borderRadius:"var(--radius-sm)",padding:"9px 13px",border:"1px solid var(--border)",marginBottom:6}}>
                      <span style={{color:winnerColor,fontWeight:800,fontSize:13,flexShrink:0}}>→</span>
                      <span style={{fontSize:12,color:"var(--text-secondary)",lineHeight:1.6}}>{reason}</span>
                    </div>
                  ))}
                </div>
                <div style={{fontSize:10,color:"var(--text-muted)",padding:"9px 12px",background:"var(--bg-base)",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",lineHeight:1.6}}>
                  ⚖ Data-driven signal only. Does not account for availability, territory, or recent wins.
                </div>
              </>
            ):(
              <div style={{textAlign:"center",padding:"20px 0",color:"var(--text-muted)",fontSize:13}}>{rec.reasons[0]}</div>
            )}
          </div>
        );
      })()}
    </div>
  );
}

// ─── MARKET MANAGER ──────────────────────────────────────────────────────────
function MarketManager({r30Data,ytdData,markets,marketList,onSave}){
  const [assignments,setAssignments]=useState({...markets});
  const [list,setList]=useState([...marketList]);
  const [newMarket,setNewMarket]=useState("");
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);

  const allReps=useMemo(()=>{
    const seen=new Set();const reps=[];
    for(const r of [...(r30Data?.reps||[]),...(ytdData?.reps||[])].filter(x=>x.tier!=="⛔ Excluded")){
      if(!seen.has(r.rep)){seen.add(r.rep);reps.push(r.rep);}
    }
    return reps.sort();
  },[r30Data,ytdData]);

  const addMarket=()=>{const m=newMarket.trim();if(!m||list.includes(m))return;setList(prev=>[...prev,m].sort());setNewMarket("");};
  const toggleTerminated=(rep)=>{setAssignments(prev=>{const next={...prev};if(next[rep]==="⛔ Terminated")delete next[rep];else next[rep]="⛔ Terminated";return next;});};
  const removeMarket=m=>{setList(prev=>prev.filter(x=>x!==m));setAssignments(prev=>{const next={...prev};Object.keys(next).forEach(k=>{if(next[k]===m)delete next[k];});return next;});};
  const assign=(rep,market)=>{setAssignments(prev=>({...prev,[rep]:market||undefined}));};
  const save=async()=>{setSaving(true);await db.set("markets",{assignments,list});onSave(assignments,list);setSaving(false);setSaved(true);setTimeout(()=>setSaved(false),2000);};

  const byMarket={};
  list.forEach(m=>{byMarket[m]=[];});
  byMarket["Unassigned"]=[];byMarket["⛔ Terminated"]=[];
  allReps.forEach(rep=>{
    const m=assignments[rep];
    if(m==="⛔ Terminated")byMarket["⛔ Terminated"].push(rep);
    else if(m&&byMarket[m])byMarket[m].push(rep);
    else byMarket["Unassigned"].push(rep);
  });

  const inpStyle={background:"var(--bg-elevated)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"8px 12px",color:"var(--text-primary)",fontSize:12,fontFamily:"inherit",outline:"none",width:"100%",transition:"border-color .15s"};

  return(
    <div style={{padding:"18px 22px"}}>
      <div style={{marginBottom:20}}>
        <div style={{fontWeight:800,fontSize:15,color:"#fbbf24",fontFamily:"var(--font-display)",marginBottom:4}}>🗺 Market Manager</div>
        <div style={{fontSize:12,color:"var(--text-muted)"}}>Assign each rep to their market. Changes save instantly.</div>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:20,alignItems:"center"}}>
        <input value={newMarket} onChange={e=>setNewMarket(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addMarket()} placeholder="New market name..." style={{...inpStyle,width:220}}/>
        <button onClick={addMarket} className="btn-primary">+ Add</button>
        <button onClick={save} disabled={saving} style={{marginLeft:"auto",padding:"8px 20px",background:saved?"#34d399":"linear-gradient(135deg,#0ea5e9,#6366f1)",border:"none",borderRadius:"var(--radius-sm)",color:saved?"#000":"#fff",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{saving?"Saving…":saved?"✓ Saved":"Save Changes"}</button>
      </div>

      {list.length>0&&(
        <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:20}}>
          {list.map(m=>(
            <div key={m} style={{display:"flex",alignItems:"center",gap:6,background:"var(--bg-surface)",border:"1px solid rgba(251,191,36,.3)",borderRadius:20,padding:"5px 12px",fontSize:12}}>
              <span style={{color:"#fbbf24",fontWeight:600}}>{m}</span>
              <span style={{color:"var(--text-muted)",fontSize:11}}>({byMarket[m]?.length||0})</span>
              <button onClick={()=>removeMarket(m)} style={{background:"none",border:"none",color:"var(--text-muted)",cursor:"pointer",fontSize:14,lineHeight:1}}>×</button>
            </div>
          ))}
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:12}}>
        {byMarket["Unassigned"]?.length>0&&(
          <div className="section-block" style={{gridColumn:"1/-1"}}>
            <div style={{fontSize:10,color:"var(--text-muted)",letterSpacing:".07em",marginBottom:12,fontWeight:700,textTransform:"uppercase"}}>Unassigned ({byMarket["Unassigned"].length} reps)</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:6}}>
              {byMarket["Unassigned"].map(rep=>(
                <div key={rep} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:"var(--bg-elevated)",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)"}}>
                  <span style={{flex:1,fontSize:12,color:"var(--text-secondary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rep}</span>
                  <select value={assignments[rep]||""} onChange={e=>assign(rep,e.target.value)}
                    style={{background:"var(--bg-base)",border:"1px solid var(--border)",borderRadius:4,padding:"4px 8px",color:"var(--text-primary)",fontSize:11,fontFamily:"inherit",cursor:"pointer"}}>
                    <option value="">— assign —</option>
                    {list.map(m=><option key={m} value={m}>{m}</option>)}
                  </select>
                  <button onClick={()=>toggleTerminated(rep)} style={{background:"var(--red-dim)",border:"1px solid rgba(248,113,113,.3)",borderRadius:4,padding:"4px 7px",color:"#f87171",cursor:"pointer",fontSize:10,fontWeight:700,fontFamily:"inherit"}}>⛔</button>
                </div>
              ))}
            </div>
          </div>
        )}
        {list.map(m=>(
          byMarket[m]?.length>0&&(
            <div key={m} className="section-block" style={{border:"1px solid rgba(251,191,36,.2)"}}>
              <div style={{fontSize:11,color:"#fbbf24",letterSpacing:".07em",marginBottom:12,fontWeight:700,textTransform:"uppercase"}}>{m} ({byMarket[m].length})</div>
              {byMarket[m].map(rep=>{
                const repData=(r30Data?.reps||ytdData?.reps||[]).find(x=>x.rep===rep);
                return(
                  <div key={rep} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 10px",background:"var(--bg-elevated)",borderRadius:"var(--radius-sm)",marginBottom:5,border:"1px solid var(--border)"}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,color:"var(--text-primary)",fontWeight:600}}>{rep}</div>
                      {repData&&<div style={{fontSize:10,color:TC[repData.tier]??"#64748b"}}>{repData.tier} · #{repData.rank}</div>}
                    </div>
                    <select value={assignments[rep]||""} onChange={e=>assign(rep,e.target.value)}
                      style={{background:"var(--bg-base)",border:"1px solid var(--border)",borderRadius:4,padding:"4px 8px",color:"var(--text-primary)",fontSize:11,fontFamily:"inherit",cursor:"pointer"}}>
                      <option value="">— unassign —</option>
                      {list.map(mk=><option key={mk} value={mk}>{mk}</option>)}
                    </select>
                    <button onClick={()=>toggleTerminated(rep)} style={{background:"var(--red-dim)",border:"1px solid rgba(248,113,113,.3)",borderRadius:4,padding:"4px 7px",color:"#f87171",cursor:"pointer",fontSize:10,fontFamily:"inherit"}}>⛔</button>
                  </div>
                );
              })}
            </div>
          )
        ))}
      </div>
      {byMarket["⛔ Terminated"]?.length>0&&(
        <div className="section-block" style={{marginTop:8,border:"1px solid rgba(248,113,113,.15)"}}>
          <div style={{fontSize:11,color:"#f87171",letterSpacing:".07em",marginBottom:10,fontWeight:700,textTransform:"uppercase"}}>⛔ Terminated ({byMarket["⛔ Terminated"].length})</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {byMarket["⛔ Terminated"].map(rep=>(
              <div key={rep} style={{display:"flex",alignItems:"center",gap:7,background:"var(--red-dim)",border:"1px solid rgba(248,113,113,.18)",borderRadius:6,padding:"5px 11px"}}>
                <span style={{fontSize:12,color:"var(--text-muted)",textDecoration:"line-through"}}>{rep}</span>
                <button onClick={()=>toggleTerminated(rep)} style={{background:"none",border:"none",color:"var(--text-muted)",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>↩</button>
              </div>
            ))}
          </div>
        </div>
      )}
      {allReps.length===0&&<div style={{color:"var(--text-muted)",fontSize:13,textAlign:"center",padding:40}}>Upload R30 or YTD data first.</div>}
    </div>
  );
}

// ─── REP MAP TAB (unchanged logic, minor style) ─────────────────────────────
function RepMapTab({allReps,markets}){
  const mapRef=useRef(null);
  const leafletMap=useRef(null);
  const markersRef=useRef([]);
  const routeLayerRef=useRef(null);
  const [repData,setRepData]=useState([]);
  const [activeRep,setActiveRep]=useState(null);
  const [search,setSearch]=useState("");
  const [orsKey,setOrsKey]=useState(()=>localStorage.getItem("ors_api_key")||"");
  const [orsKeyInput,setOrsKeyInput]=useState(()=>localStorage.getItem("ors_api_key")||"");
  const [panel,setPanel]=useState("reps");
  const [addrInput,setAddrInput]=useState("");
  const [destInputs,setDestInputs]=useState(["","",""]);
  const [routeResults,setRouteResults]=useState({});
  const [geocoding,setGeocoding]=useState(false);
  const [calcingRoutes,setCalcingRoutes]=useState(false);
  const [qFrom,setQFrom]=useState("");
  const [qTo,setQTo]=useState("");
  const [qResult,setQResult]=useState(null);
  const [qLoading,setQLoading]=useState(false);
  const [toast,setToast]=useState(null);
  const toastTimer=useRef(null);
  const REP_COLORS=["#f97316","#38bdf8","#34d399","#a78bfa","#fb7185","#fbbf24","#34d399","#60a5fa","#e879f9","#f472b6","#84cc16","#22d3ee","#c084fc","#fb923c","#2dd4bf"];
  const repColor=idx=>REP_COLORS[idx%REP_COLORS.length];
  const showToast=(msg,type="")=>{clearTimeout(toastTimer.current);setToast({msg,type});toastTimer.current=setTimeout(()=>setToast(null),2800);};

  useEffect(()=>{(async()=>{const d=await db.get("repmap");if(d&&Array.isArray(d))setRepData(d);})();},[]);
  useEffect(()=>{
    if(!allReps.length)return;
    setRepData(prev=>{
      const existing=new Set(prev.map(r=>r.rep));
      const newOnes=allReps.filter(r=>r.tier!=="⛔ Excluded"&&markets[r.rep]!=="⛔ Terminated"&&!existing.has(r.rep)).map(r=>({rep:r.rep,address:"",lat:null,lng:null,destinations:["","",""]}));
      if(!newOnes.length)return prev;
      return[...prev,...newOnes];
    });
  },[allReps,markets]);

  const saveTimer=useRef(null);
  useEffect(()=>{
    if(!repData.length)return;
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{await db.set("repmap",repData);},1500);
  },[repData]);

  useEffect(()=>{
    if(!mapRef.current||leafletMap.current)return;
    const map=L.map(mapRef.current,{center:[27.8,-81.7],zoom:7,zoomControl:false});
    L.control.zoom({position:"bottomright"}).addTo(map);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:19}).addTo(map);
    routeLayerRef.current=L.layerGroup().addTo(map);
    leafletMap.current=map;
    setTimeout(()=>map.invalidateSize(),100);
    return()=>{map.remove();leafletMap.current=null;};
  },[]);

  useEffect(()=>{
    if(!leafletMap.current)return;
    markersRef.current.forEach(m=>m.remove());
    markersRef.current=[];
    repData.forEach((rep,idx)=>{
      if(rep.lat==null||rep.lng==null)return;
      const color=repColor(idx),isActive=rep.rep===activeRep;
      const initial=(rep.rep.split(",")[1]?.trim()[0]||rep.rep[0]||"?").toUpperCase();
      const div=document.createElement("div");
      div.style.cssText=`width:32px;height:32px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;border:2px solid ${isActive?"#fff":"rgba(255,255,255,0.2)"};box-shadow:0 2px 12px rgba(0,0,0,.5);cursor:pointer;transform:${isActive?"scale(1.3)":"scale(1)"};transition:transform .15s;font-family:DM Sans`;

      const icon=L.divIcon({className:"",html:div,iconSize:[32,32],iconAnchor:[16,16],popupAnchor:[0,-20]});

      markersRef.current.push(marker);
    });
  },[repData,activeRep]);

  const haversine=(lat1,lng1,lat2,lng2)=>{const R=3958.8,dL=(lat2-lat1)*Math.PI/180,dl=(lng2-lng1)*Math.PI/180;const a=Math.sin(dL/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dl/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));};
  const nominatim=async addr=>{const q=addr.toLowerCase().includes("fl")||addr.toLowerCase().includes("florida")?addr:addr+", Florida, USA";const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`,{headers:{"Accept-Language":"en"}});const d=await r.json();return d&&d[0]?{lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)}:null;};
  const fmtTime=mins=>{const h=Math.floor(mins/60),m=mins%60;return h>0?`${h}h ${m}m`:`${m}m`;};
  const geocodeRep=async()=>{if(!addrInput.trim()){showToast("Enter an address first","error");return;}setGeocoding(true);showToast("Geocoding…");const geo=await nominatim(addrInput.trim());if(geo){setRepData(prev=>prev.map(r=>r.rep===activeRep?{...r,address:addrInput.trim(),lat:geo.lat,lng:geo.lng}:r));showToast("Location found ✓","success");if(leafletMap.current)leafletMap.current.flyTo([geo.lat,geo.lng],11,{duration:1});}else{showToast("Address not found","error");}setGeocoding(false);};
  const calcRoutes=async()=>{const rep=repData.find(r=>r.rep===activeRep);if(!rep||rep.lat==null){showToast("Locate rep first","error");return;}const active=destInputs.filter(d=>d.trim());if(!active.length){showToast("Enter a destination","error");return;}setRepData(prev=>prev.map(r=>r.rep===activeRep?{...r,destinations:destInputs}:r));setCalcingRoutes(true);const newResults={};for(let i=0;i<destInputs.length;i++){const dest=destInputs[i].trim();if(!dest)continue;newResults[i]={loading:true};setRouteResults(r=>({...r,[activeRep]:{...r[activeRep],...newResults}}));try{const dGeo=await nominatim(dest);if(!dGeo){newResults[i]={error:"Destination not found"};continue;}if(orsKey){const res=await fetch("https://api.openrouteservice.org/v2/directions/driving-car",{method:"POST",headers:{"Authorization":orsKey,"Content-Type":"application/json"},body:JSON.stringify({coordinates:[[rep.lng,rep.lat],[dGeo.lng,dGeo.lat]]})});const data=await res.json();if(data.routes?.[0]){const s=data.routes[0].summary;newResults[i]={miles:(s.distance*0.000621371).toFixed(1),time:fmtTime(Math.round(s.duration/60))};}else{newResults[i]={error:data.error?.message||"Not found"};}}else{const miles=(haversine(rep.lat,rep.lng,dGeo.lat,dGeo.lng)*1.3).toFixed(1);newResults[i]={miles:miles+"*",time:fmtTime(Math.round(miles/45*60))+"*"};}await new Promise(r=>setTimeout(r,600));}catch(e){newResults[i]={error:"Network error"};}}setRouteResults(r=>({...r,[activeRep]:newResults}));setCalcingRoutes(false);showToast("Done ✓","success");};
  const activeRepData=repData.find(r=>r.rep===activeRep);
  useEffect(()=>{if(!activeRepData)return;setAddrInput(activeRepData.address||"");setDestInputs(activeRepData.destinations?.length===3?activeRepData.destinations:["","",""]);setRouteResults({});},[activeRep]);
  const zoomToRep=()=>{if(!activeRepData?.lat){showToast("No location set","error");return;}leafletMap.current?.flyTo([activeRepData.lat,activeRepData.lng],12,{duration:1});};
  const filteredReps=repData.filter(r=>{if(markets[r.rep]==="⛔ Terminated")return false;return r.rep.toLowerCase().includes(search.toLowerCase())||(markets[r.rep]||"").toLowerCase().includes(search.toLowerCase());});
  const mapped=filteredReps.filter(r=>r.lat!=null),unmapped=filteredReps.filter(r=>r.lat==null);

  const inp={background:"var(--bg-elevated)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"7px 11px",color:"var(--text-primary)",fontSize:12,fontFamily:"inherit",outline:"none",width:"100%"};
  const sectionLbl={fontSize:10,color:"var(--text-muted)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:6};

  const RouteResultBlock=({repKey})=>{

      <div style={{flex:1,position:"relative"}}>
        <div ref={mapRef} style={{width:"100%",height:"100%"}}/>
        <style>{`.leaflet-tile{filter:brightness(0.55) saturate(0.6) hue-rotate(200deg);}.leaflet-container{background:#070b12!important;}.leaflet-popup-content-wrapper{background:var(--bg-surface)!important;border:1px solid var(--border-strong)!important;border-radius:10px!important;box-shadow:0 4px 24px rgba(0,0,0,.7)!important;color:var(--text-primary)!important;}.leaflet-popup-tip{background:var(--bg-surface)!important;}.leaflet-popup-content{margin:10px 14px!important;}`}</style>
      </div>

        <div style={{display:"flex",borderBottom:"1px solid var(--border)",flexShrink:0}}>
          {[["reps","Reps"],["route","Route"],["settings","Settings"]].map(([k,l])=>(
            <div key={k} onClick={()=>setPanel(k)} style={{flex:1,padding:"10px 4px",fontSize:10,textAlign:"center",cursor:"pointer",letterSpacing:".06em",textTransform:"uppercase",color:panel===k?"#34d399":"var(--text-muted)",borderBottom:panel===k?"2px solid #34d399":"2px solid transparent",transition:"all .15s",fontWeight:panel===k?700:400}}>
              {l}

        </div>
        <div style={{flex:1,overflowY:"auto",padding:14}}>
          {panel==="reps"&&!activeRep&&(
            <div>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search reps or markets…" style={{...inp,marginBottom:10}}/>
              <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",fontSize:11}}>
                <span style={{color:"var(--text-muted)"}}>{repData.length} reps</span>
                <span style={{color:"#34d399"}}>· {mapped.length} mapped</span>
                {unmapped.length>0&&<span style={{color:"#fbbf24"}}>· {unmapped.length} unmapped</span>}
              </div>
              {mapped.length>0&&(
                <div style={{marginBottom:12}}>
                  <div style={sectionLbl}>📍 Mapped ({mapped.length})</div>
                  {mapped.map((rep)=>{
                    const idx=repData.indexOf(rep);
                    return(
                      <div key={rep.rep} onClick={()=>setActiveRep(rep.rep)} style={{background:"var(--bg-elevated)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"8px 12px",cursor:"pointer",marginBottom:5,display:"flex",alignItems:"center",gap:10,transition:"all .15s"}}

                        </div>
                        {markets[rep.rep]&&<span style={{fontSize:9,color:"#fbbf24",background:"rgba(251,191,36,.1)",padding:"2px 5px",borderRadius:3}}>{markets[rep.rep]}</span>}

                          <div style={{fontWeight:600,fontSize:12,color:"var(--text-secondary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rep.rep}</div>
                          <div style={{fontSize:10,color:"var(--text-faint)",fontStyle:"italic"}}>Click to set address</div>
                        </div>
                      </div>

          )}
          {panel==="reps"&&activeRep&&(
            <div>
              <div onClick={()=>setActiveRep(null)} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"var(--text-muted)",cursor:"pointer",marginBottom:14,transition:"color .15s"}}
                onMouseEnter={e=>{e.currentTarget.style.color="var(--text-secondary)";}}

              {markets[activeRep]&&<div style={{fontSize:11,color:"#fbbf24",marginBottom:14}}>🗺 {markets[activeRep]}</div>}
              <div style={{marginBottom:16}}>

                  <button onClick={geocodeRep} disabled={geocoding} style={{background:"rgba(52,211,153,.1)",border:"1px solid rgba(52,211,153,.3)",borderRadius:"var(--radius-sm)",padding:"7px 12px",color:"#34d399",cursor:"pointer",fontSize:11,fontFamily:"inherit",flexShrink:0}}>

                    <input value={d} onChange={e=>setDestInputs(prev=>prev.map((v,j)=>j===i?e.target.value:v))} onKeyDown={e=>e.key==="Enter"&&calcRoutes()} placeholder="City or address" style={inp}/>
                  </div>
                ))}
                <button onClick={calcRoutes} disabled={calcingRoutes} className="btn-primary" style={{width:"100%",marginTop:6}}>{calcingRoutes?"Calculating…":"Calculate Drives"}</button>

          {panel==="route"&&(
            <div>

              <button className="btn-primary" style={{width:"100%"}} onClick={async()=>{
                if(!qFrom.trim()||!qTo.trim())return;setQLoading(true);setQResult(null);
                try{
                  const [fGeo,tGeo]=await Promise.all([nominatim(qFrom),nominatim(qTo)]);
                  if(!fGeo||!tGeo){setQResult({error:"Could not locate addresses"});setQLoading(false);return;}
                  if(orsKey){const res=await fetch("https://api.openrouteservice.org/v2/directions/driving-car",{method:"POST",headers:{"Authorization":orsKey,"Content-Type":"application/json"},body:JSON.stringify({coordinates:[[fGeo.lng,fGeo.lat],[tGeo.lng,tGeo.lat]]})});const data=await res.json();if(data.routes?.[0]){const s=data.routes[0].summary;setQResult({miles:(s.distance*0.000621371).toFixed(1),time:fmtTime(Math.round(s.duration/60)),from:qFrom,to:qTo});}else{setQResult({error:data.error?.message||"Route not found"});}}
                  else{const miles=(haversine(fGeo.lat,fGeo.lng,tGeo.lat,tGeo.lng)*1.3).toFixed(1);setQResult({miles:miles+"*",time:fmtTime(Math.round(miles/45*60))+"*",from:qFrom,to:qTo,est:true});}

                      </div>

                    </>

          {panel==="settings"&&(
            <div>
              <div style={{fontWeight:700,fontSize:13,color:"var(--text-primary)",marginBottom:14,fontFamily:"var(--font-display)"}}>Settings</div>

                  <button onClick={()=>{setOrsKey(orsKeyInput);localStorage.setItem("ors_api_key",orsKeyInput);showToast("Key saved ✓","success");}} className="btn-primary">Save</button>
                </div>

              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

      <div style={{marginBottom:10}}><span style={lbl}>Appt Time</span><BtnGroup fieldKey="apptTime" opts={["9AM","10AM","11AM","1PM","2PM","3PM","5PM","6PM","7PM"].map(t=>({val:t,label:t}))}/></div>
      <div style={{marginBottom:10}}><span style={lbl}>Ph#</span><input value={form.phone} onChange={e=>set("phone",e.target.value)} placeholder="(000) 000-0000" style={inp}/></div>
