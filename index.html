<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sales Rank — Reece</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-base:       #070b12;
      --bg-surface:    #0c1220;
      --bg-elevated:   #101928;
      --bg-hover:      #141f30;
      --border:        #1a2538;
      --border-strong: #253347;
      --text-primary:  #eef2f8;
      --text-secondary:#8898aa;
      --text-muted:    #3d5068;
      --text-faint:    #1e2f42;
      --green:         #34d399;
      --green-dim:     rgba(52,211,153,.12);
      --yellow:        #fbbf24;
      --yellow-dim:    rgba(251,191,36,.12);
      --red:           #f87171;
      --red-dim:       rgba(248,113,113,.12);
      --blue:          #38bdf8;
      --blue-dim:      rgba(56,189,248,.10);
      --purple:        #a78bfa;
      --orange:        #fb923c;
      --accent:        #38bdf8;
      --font-display:  'Syne', sans-serif;
      --font-body:     'DM Sans', sans-serif;
      --font-mono:     'DM Mono', monospace;
      --radius-sm:     6px;
      --radius:        10px;
      --radius-lg:     14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    input::placeholder { color: var(--text-muted); }
    textarea::placeholder { color: var(--text-muted); }

    @keyframes spin    { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes fadeUp  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideIn { from{opacity:0;transform:scale(.97) translateY(4px)} to{opacity:1;transform:scale(1) translateY(0)} }
    @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }

    .fade-up  { animation: fadeUp  .25s ease both; }
    .slide-in { animation: slideIn .22s ease both; }

    /* ── TABLE HOVER ── */
    tbody tr { transition: background .12s; }
    tbody tr:hover { background: var(--bg-hover) !important; }
    tbody tr:hover td:first-child { border-left: 2px solid var(--accent); padding-left: 10px; }

    /* ── NAV LINK HOVER ── */
    .nav-btn { transition: color .15s, border-color .15s; }
    .nav-btn:hover { color: var(--text-primary) !important; }

    /* ── CARD HOVER ── */
    .metric-card { transition: transform .15s, box-shadow .15s; }
    .metric-card:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(0,0,0,.35); }

    /* ── CLICKABLE ROW ── */
    .clickable-row:hover .rep-arrow { opacity: 1 !important; }
    .rep-arrow { opacity: 0; transition: opacity .15s; }

    /* ── PILL ── */
    .tier-pill {
      display: inline-flex; align-items: center;
      padding: 2px 9px; border-radius: 20px;
      font-size: 10px; font-weight: 700; letter-spacing: .04em;
    }

    /* ── BUTTON BASE ── */
    .btn-ghost {
      background: transparent; border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 7px 14px;
      color: var(--text-secondary); cursor: pointer; font-family: inherit;
      font-size: 12px; transition: all .15s;
    }
    .btn-ghost:hover { border-color: var(--border-strong); color: var(--text-primary); }
    .btn-primary {
      background: linear-gradient(135deg,#0ea5e9,#6366f1);
      border: none; border-radius: var(--radius-sm); padding: 8px 16px;
      color: #fff; font-weight: 700; font-size: 12px;
      cursor: pointer; font-family: inherit; transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .88; }

    /* ── SEGMENT CONTROL ── */
    .seg-control {
      display: inline-flex; background: var(--bg-base);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 3px; gap: 2px;
    }
    .seg-btn {
      padding: 6px 16px; border-radius: 7px; font-family: inherit;
      font-size: 12px; cursor: pointer; border: none;
      transition: all .15s; font-weight: 500;
    }
    .seg-btn.active {
      background: linear-gradient(135deg,#0ea5e9,#6366f1);
      color: #fff; font-weight: 700;
      box-shadow: 0 1px 8px rgba(14,165,233,.3);
    }
    .seg-btn:not(.active) { background: transparent; color: var(--text-muted); }
    .seg-btn:not(.active):hover { color: var(--text-secondary); background: var(--bg-elevated); }

    /* ── STAT CHIP ── */
    .stat-chip {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px;
    }
    .stat-chip .chip-label { font-size: 10px; color: var(--text-muted); margin-bottom: 3px; letter-spacing:.04em; }
    .stat-chip .chip-value { font-size: 16px; font-weight: 700; color: var(--text-primary); font-family: var(--font-mono); }

    /* ── SECTION DIVIDER ── */
    .section-block {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      margin-bottom: 14px;
    }

    /* ── INSIGHT CARD ── */
    .insight-item {
      display: flex; gap: 11px; align-items: flex-start;
      padding: 11px 14px; border-radius: var(--radius);
      animation: fadeUp .2s ease both;
    }
    .insight-item:not(:last-child) { margin-bottom: 7px; }

    /* ── GRADE BOX ── */
    .grade-box {
      background: var(--bg-base); border-radius: var(--radius);
      padding: 14px 10px; text-align: center;
      transition: transform .15s; cursor: default;
      position: relative; overflow: hidden;
    }
    .grade-box:hover { transform: translateY(-2px); }

    /* ── MINI BAR ── */
    .mini-bar-track {
      height: 5px; background: var(--bg-elevated);
      border-radius: 3px; position: relative; overflow: visible;
    }
    .mini-bar-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
    .mini-bar-avg {
      position: absolute; top: -3px; width: 2px; height: 11px;
      background: var(--border-strong); border-radius: 1px;
    }

    /* ── TREND ROW ── */
    .trend-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 12px; background: var(--bg-base);
      border-radius: var(--radius-sm); margin-bottom: 4px;
      border: 1px solid transparent; transition: border-color .15s;
    }
    .trend-row:hover { border-color: var(--border); }

    /* ── COMPARISON CARD ── */
    .comp-header {
      padding: 10px 14px; background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
    }
    .comp-bar-row { margin-top: 6px; }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 50vh; gap: 12px; color: var(--text-muted);
    }
    .empty-state .empty-icon { font-size: 48px; opacity: .4; margin-bottom: 4px; }
    .empty-state .empty-title { font-size: 15px; font-weight: 600; color: var(--text-secondary); font-family: var(--font-display); }
    .empty-state .empty-sub { font-size: 12px; color: var(--text-muted); }

    /* ── TABLE OVERRIDES ── */
    .rank-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    .rank-table th {
      padding: 11px 13px; text-align: left; font-size: 10px;
      font-weight: 700; color: var(--text-muted); letter-spacing: .07em;
      text-transform: uppercase; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none; white-space: nowrap;
      background: var(--bg-surface);
    }
    .rank-table th:hover { color: var(--text-secondary); }
    .rank-table td {
      padding: 10px 13px; border-top: 1px solid var(--text-faint);
      color: var(--text-secondary); white-space: nowrap;
      transition: padding .12s;
    }
    .rank-table tbody tr:nth-child(even) td { background: rgba(255,255,255,.012); }

    /* ── UPLOAD MODAL ── */
    .upload-dropzone {
      border: 1.5px dashed var(--border-strong); border-radius: var(--radius);
      padding: 28px; text-align: center; cursor: pointer; transition: all .2s;
    }
    .upload-dropzone:hover { border-color: var(--blue); background: var(--blue-dim); }
  </style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo}=React;

// ─── FIREBASE ────────────────────────────────────────────────────────────────
const FB="https://salesranks-3674f-default-rtdb.firebaseio.com";
const db={
  get:async k=>{try{const r=await fetch(`${FB}/salesrank/${k}.json`);return r.ok?await r.json():null;}catch{return null;}},
  set:async(k,v)=>{try{await fetch(`${FB}/salesrank/${k}.json`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)});}catch(e){console.error(e);}},
};

// ─── WEIGHTS (unchanged) ─────────────────────────────────────────────────────
const W={net_vol:.20,nsli:.12,net_iss:.08,otd:.12,std:.12,close:.06,cancel:.13,hold:.05,crdecl:.02,gross:.10};
const CONF=d=>d<3?0:d<5?.35:d<10?.6:d<20?.8:1;
const TIERS=[
  {label:"🥇 Elite",  min:.80,color:"#f59e0b"},
  {label:"🥈 Strong", min:.65,color:"#94a3b8"},
  {label:"🥉 Average",min:.45,color:"#cd7f32"},
  {label:"⚠ Below Avg",min:.25,color:"#fb923c"},
  {label:"🔴 Low",   min:0,  color:"#f87171"},
];
const TC={"🥇 Elite":"#f59e0b","🥈 Strong":"#94a3b8","🥉 Average":"#cd7f32","⚠ Below Avg":"#fb923c","🔴 Low":"#f87171","⛔ Excluded":"#3d5068"};

// ─── MOMENTUM SIGNALS (unchanged) ────────────────────────────────────────────
const signal=(r30,ytd,higherBetter)=>{
  if(r30==null||ytd==null||ytd===0)return{s:0,label:"➡ Stable",color:"#64748b",icon:"➡"};
  const delta=(r30-ytd)/Math.abs(ytd);
  const d=higherBetter?delta:-delta;
  if(d>=.15) return{s:2,label:"🔥 Hot",    color:"#34d399",icon:"🔥"};
  if(d>=.05) return{s:1,label:"📈 Rising",  color:"#86efac",icon:"📈"};
  if(d>-.05) return{s:0,label:"➡ Stable",  color:"#64748b",icon:"➡"};
  if(d>-.15) return{s:-1,label:"📉 Slipping",color:"#fb923c",icon:"📉"};
  return{s:-2,label:"❄ Cold",    color:"#38bdf8",icon:"❄"};
};
const SIGNAL_METRICS=[
  {key:"std_pct",    label:"STD%",         higherBetter:true},
  {key:"otd_pct",    label:"OTD%",         higherBetter:true},
  {key:"net_vol",    label:"Net Vol",      higherBetter:true},
  {key:"avg_deal",   label:"Avg Deal",     higherBetter:true},
  {key:"net_issue_rate",label:"NetStk%",   higherBetter:true},
  {key:"fallout_rate",label:"Fallout%",    higherBetter:false},
  {key:"_gap",       label:"OTD↔STD Gap", higherBetter:false},
];

// ─── RANK ENGINE (unchanged) ─────────────────────────────────────────────────
function pctRank(arr,val){
  const s=[...arr].sort((a,b)=>a-b);
  const below=s.filter(v=>v<val).length,equal=s.filter(v=>v===val).length;
  if(s.length<=1)return 1;
  return(below+(equal-1)*.5)/(s.length-1);
}
function scoreReps(reps){
  const ranked=reps.filter(r=>CONF(r.demo)>0);
  if(!ranked.length)return reps.map(r=>({...r,score:0,pct:0,tier:"⛔ Excluded",rank:"-"}));
  const get=f=>ranked.map(r=>r[f]??0);
  const N={};
  ["net_vol","nsli","net_iss","otd_pct","std_pct","close_rate","gross_iss"]
    .forEach(f=>{const a=get(f);N[f]=ranked.map(r=>pctRank(a,r[f]??0));});
  ["cancel_rate","hold_rate","crdecl_rate"]
    .forEach(f=>{const a=get(f);N[f]=ranked.map(r=>1-pctRank(a,r[f]??0));});
  const raw=ranked.map((r,i)=>
    W.net_vol*N.net_vol[i]+W.nsli*N.nsli[i]+W.net_iss*N.net_iss[i]+
    W.otd*N.otd_pct[i]+W.std*N.std_pct[i]+W.close*N.close_rate[i]+
    W.cancel*N.cancel_rate[i]+W.hold*N.hold_rate[i]+W.crdecl*N.crdecl_rate[i]+
    W.gross*N.gross_iss[i]
  );
  const adj=raw.map((s,i)=>(s*.75+.5*.25)*CONF(ranked[i].demo));
  const adjPct=adj.map(v=>pctRank(adj,v));
  const ws=ranked.map((r,i)=>({...r,_adj:adj[i],_pct:adjPct[i]}));
  ws.sort((a,b)=>b._adj-a._adj);
  const result=ws.map((r,i)=>{
    const pct=r._pct,tier=TIERS.find(t=>pct>=t.min)?.label??"🔴 Low";
    return{...r,score:+r._adj.toFixed(4),pct:+pct.toFixed(4),tier,rank:i+1};
  });
  const excl=reps.filter(r=>CONF(r.demo)===0).map(r=>({...r,score:0,pct:0,tier:"⛔ Excluded",rank:"-"}));
  return[...result,...excl];
}

// ─── CSV PARSER (unchanged) ───────────────────────────────────────────────────
function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const headers=lines[0].split(",").map(h=>h.replace(/"/g,"").trim());
  return lines.slice(1).map(line=>{
    const vals=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;}else if(c===","&&!inQ){vals.push(cur);cur="";}else{cur+=c;}
    }
    vals.push(cur);
    const obj={};headers.forEach((h,i)=>{obj[h]=(vals[i]||"").trim();});
    return obj;
  });
}
function processCSV(text,win){
  const rows=parseCSV(text);
  const repRows=rows.filter(r=>r.Grouper&&r.Grouper.trim()!=="");
  if(!repRows.length)throw new Error("No rep rows found");
  const meta=rows[0]||{};
  const date_range=meta.SDate&&meta.EDate?`${meta.SDate} — ${meta.EDate}`:"";
  const n=v=>{const x=parseFloat(v);return isNaN(x)?0:x;};
  const reps=repRows.map(r=>{
    const otd_cnt=n(r.NumSale),demo=n(r.NumSat),gross_iss=n(r.NumIssued);
    const net_iss=n(r.NumNetIssued),close_vol=n(r.GSA),net_vol=n(r.NSA);
    const nsli=n(r.NSLI),cancel_cnt=n(r.NumCancelled),hold_cnt=n(r.NumHold);
    const crdecline_cnt=n(r.NumCD),working_cnt=n(r.NumWorking);
    const cancel_vol=n(r.GSACancelled),hold_vol=n(r.GSAHold),crdecline_vol=n(r.GSACD),working_vol=n(r.GSAWorking);
    const num_net=n(r.NumNet);
    const jsc=[1,2,3,4,5,6].map(i=>({cnt:n(r[`NumJSC${i}`]),vol:n(r[`GSAJSC${i}`]),label:r[`jbs${i}`]||`Type ${i}`}));
    const avg_deal=otd_cnt>0?close_vol/otd_cnt:0;
    const close_rate=demo>0?otd_cnt/demo:0;
    const cancel_rate=otd_cnt>0?cancel_cnt/otd_cnt:0;
    const hold_rate=otd_cnt>0?hold_cnt/otd_cnt:0;
    const crdecl_rate=otd_cnt>0?crdecline_cnt/otd_cnt:0;
    const fallout_rate=otd_cnt>0?(cancel_cnt*0.65+hold_cnt*0.25+crdecline_cnt*0.10)/otd_cnt:0;
    const net_issue_rate=otd_cnt>0?num_net/otd_cnt:0;
    return{
      rep:r.Grouper.trim(),gross_iss,net_iss,demo,otd_cnt,num_net,
      otd_pct:n(r.OTDPct),std_pct:n(r.STDPct),close_rate,
      close_vol,avg_deal,net_vol,nsli,
      cancel_cnt,cancel_vol,cancel_rate,
      hold_cnt,hold_vol,hold_rate,
      crdecline_cnt,crdecline_vol,crdecl_rate,
      fallout_rate,net_issue_rate,
      working_cnt,working_vol,jsc,
    };
  });
  return{reps:scoreReps(reps),date_range,updated:new Date().toISOString(),win,
    sdate:meta.SDate||"",edate:meta.EDate||""};
}

// ─── FORMATTERS (unchanged) ──────────────────────────────────────────────────
const f$=v=>v==null?"—":"$"+Math.round(v).toLocaleString();
const fP=v=>v==null?"—":(v*100).toFixed(1)+"%";
const fN=v=>v==null?"—":v;
const fK=v=>v==null?"—":"$"+Math.round(v/1000)+"k";
const gapPts=r=>r.otd_pct!=null&&r.std_pct!=null?Math.round((r.otd_pct-r.std_pct)*100):null;
const gapInfo=pts=>{
  if(pts===null)return{label:"—",color:"#64748b",badge:""};
  if(pts>=20)return{label:`+${pts}pp`,color:"#f87171",badge:"🚨"};
  if(pts>=12)return{label:`+${pts}pp`,color:"#fb923c",badge:"⚠"};
  if(pts>=6) return{label:`+${pts}pp`,color:"#fbbf24",badge:"👀"};
  return{label:pts<0?`${pts}pp`:`+${pts}pp`,color:"#34d399",badge:"✓"};
};

// ─── LETTER GRADE (unchanged) ────────────────────────────────────────────────
function letterGrade(val,benchmark,higherBetter=true){
  if(val==null||isNaN(val)||!benchmark)return{grade:"N/A",color:"#64748b"};
  const ratio=higherBetter?val/benchmark:benchmark/val;
  if(ratio>=1.20)return{grade:"A+",color:"#34d399"};
  if(ratio>=1.05)return{grade:"A", color:"#34d399"};
  if(ratio>=0.88)return{grade:"B", color:"#86efac"};
  if(ratio>=0.72)return{grade:"C", color:"#fbbf24"};
  if(ratio>=0.55)return{grade:"D", color:"#fb923c"};
  return{grade:"F",color:"#f87171"};
}

// ─── INSIGHT ENGINE (unchanged logic) ────────────────────────────────────────
function generateInsights(r,bench,r30R,ytdR){
  const insights=[];
  const stdPct=r.std_pct*100,otdPct=r.otd_pct*100;
  const falloutPct=r.fallout_rate*100,nirPct=r.net_issue_rate*100;
  const gap=gapPts(r),lowSample=r.demo<10;
  if(lowSample){insights.push({type:"caution",icon:"🔬",text:`Low sample size (${r.demo} demos) — treat these numbers with caution. Performance may look better or worse than reality.`});}
  if(stdPct>=35&&falloutPct>(bench.fallout*100)*1.2){insights.push({type:"warn",icon:"⚠️",text:`Strong close rate (${stdPct.toFixed(1)}%) but higher-than-average fallout (${falloutPct.toFixed(1)}%) — closing deals that aren't sticking.`});}
  else if(stdPct>=35){insights.push({type:"good",icon:"💪",text:`Strong close rate at ${stdPct.toFixed(1)}% — well above the 35% threshold. Converts demos into revenue consistently.`});}
  else if(stdPct<25){insights.push({type:"bad",icon:"📉",text:`Close rate of ${stdPct.toFixed(1)}% is below the 25% floor. Demo-to-close conversion needs attention.`});}
  if(gap!==null&&gap>=12){insights.push({type:"warn",icon:"🚨",text:`OTD% is ${gap}pp higher than STD% — rep closes on the day but struggles in the full cycle. May be relying on pressure over process.`});}
  if(nirPct>=80){insights.push({type:"good",icon:"✅",text:`Excellent stick rate — ${nirPct.toFixed(1)}% of closes net issue. Deals are real and durable.`});}
  else if(nirPct<55&&r.otd_cnt>=5){insights.push({type:"bad",icon:"🔴",text:`Only ${nirPct.toFixed(1)}% of closes net issue. A large portion of "wins" aren't converting to revenue.`});}
  if(r.net_vol>bench.net_vol*1.25){insights.push({type:"good",icon:"🏆",text:`Top revenue producer — net volume of ${f$(r.net_vol)} is ${Math.round((r.net_vol/bench.net_vol-1)*100)}% above team average.`});}
  if(r30R&&ytdR){
    const stdDelta=r30R.std_pct-ytdR.std_pct,volDelta=r30R.net_vol-ytdR.net_vol;
    if(stdDelta>=.05&&volDelta>0){insights.push({type:"trend",icon:"🔥",text:`Improving trajectory — close rate (+${(stdDelta*100).toFixed(1)}pp) and volume (${f$(volDelta)}) both up vs YTD baseline.`});}
    else if(stdDelta<=-.05&&volDelta<0){insights.push({type:"warn",icon:"❄️",text:`Declining trend — close rate down ${(Math.abs(stdDelta)*100).toFixed(1)}pp and volume down ${f$(Math.abs(volDelta))} vs YTD.`});}
  }
  if(falloutPct<(bench.fallout*100)*0.7&&r.otd_cnt>=5){insights.push({type:"good",icon:"🎯",text:`Deal quality is excellent — fallout rate of ${falloutPct.toFixed(1)}% is well below team average. Closes are clean and durable.`});}
  return insights.slice(0,3);
}

// ─── LEAD RECOMMENDATION ENGINE (unchanged) ──────────────────────────────────
function generateLeadRecommendation(repA,dataA,repB,dataB,teamAvgs){
  const score=(d)=>{
    let pts=0;
    if(d.net_vol>teamAvgs.net_vol*1.1)pts+=3;else if(d.net_vol>teamAvgs.net_vol*0.9)pts+=2;else pts+=1;
    if(d.std_pct>=0.35)pts+=3;else if(d.std_pct>=0.25)pts+=2;else pts+=0;
    if(d.net_issue_rate>=0.80)pts+=3;else if(d.net_issue_rate>=0.60)pts+=2;else pts+=0;
    if(d.fallout_rate<teamAvgs.fallout_rate*0.8)pts+=2;else if(d.fallout_rate>teamAvgs.fallout_rate*1.3)pts-=2;
    if(d.avg_deal>teamAvgs.avg_deal*1.1)pts+=1;
    return pts;
  };
  const ptsA=score(dataA),ptsB=score(dataB),diff=ptsA-ptsB;
  const winner=diff>0?repA:diff<0?repB:null;
  const winnerData=diff>0?dataA:dataB,loserData=diff>0?dataB:dataA;
  const confidence=Math.abs(diff)>=5?"Strong":Math.abs(diff)>=2?"Moderate":"Marginal";
  const reasons=[];
  if(!winner)return{winner:null,confidence:"Tied",reasons:["Performance metrics are too close to call. Consider availability, market fit, or recency."],ptsA,ptsB};
  const wD=winnerData,lD=loserData;
  if(wD.net_vol>lD.net_vol*1.1)reasons.push(`Higher net volume (${f$(wD.net_vol)} vs ${f$(lD.net_vol)}) — proven revenue producer`);
  if(wD.std_pct>lD.std_pct+0.03)reasons.push(`Stronger close rate (${(wD.std_pct*100).toFixed(1)}% vs ${(lD.std_pct*100).toFixed(1)}%) — more likely to convert`);
  if(wD.net_issue_rate>lD.net_issue_rate+0.05)reasons.push(`Better stick rate (${(wD.net_issue_rate*100).toFixed(1)}% vs ${(lD.net_issue_rate*100).toFixed(1)}%) — revenue more likely to hold`);
  if(wD.fallout_rate<lD.fallout_rate-0.03)reasons.push(`Lower fallout (${(wD.fallout_rate*100).toFixed(1)}% vs ${(lD.fallout_rate*100).toFixed(1)}%) — cleaner deal quality`);
  if(wD.avg_deal>lD.avg_deal*1.1)reasons.push(`Higher avg deal (${f$(wD.avg_deal)} vs ${f$(lD.avg_deal)}) — extracts more value per appointment`);
  if(reasons.length===0)reasons.push("Marginally higher composite score across weighted metrics");
  return{winner,confidence,reasons:reasons.slice(0,3),ptsA,ptsB};
}

// SPARKLINE
function Sparkline({points,color="#38bdf8",width=120,height=32}){
  if(!points||points.length<2)return<span style={{color:"var(--text-faint)",fontSize:10}}>—</span>;
  const vals=points.map(p=>p.v),mn=Math.min(...vals),mx=Math.max(...vals),range=mx-mn||1;
  const xS=(width-4)/(points.length-1);
  const yP=v=>height-4-((v-mn)/range)*(height-8);
  const d=points.map((p,i)=>`${i===0?"M":"L"}${2+i*xS},${yP(p.v)}`).join(" ");
  const last=points[points.length-1],prev=points[points.length-2],up=last.v>=prev.v;
  return(
    <svg width={width} height={height}>
      <path d={d} fill="none" stroke={color} strokeWidth={1.5} opacity={.8}/>
      <circle cx={2+(points.length-1)*xS} cy={yP(last.v)} r={3} fill={up?"#34d399":"#f87171"}/>
    </svg>
  );
}

// TIER LINE CHART
function TierLineChart({rep,r30Data,ytdData}){
  const tierLines=useMemo(()=>{
    const seen=new Set();const deduped=[];
    for(const r of (r30Data?.reps||[]).filter(x=>x.tier!=="⛔ Excluded")){seen.add(r.rep);deduped.push(r);}
    for(const r of (ytdData?.reps||[]).filter(x=>x.tier!=="⛔ Excluded")){if(!seen.has(r.rep))deduped.push(r);}
    const TIER_ORDER=["🥇 Elite","🥈 Strong","🥉 Average","⚠ Below Avg","🔴 Low"];
    const avg=(reps,f)=>{const v=reps.map(r=>r[f]??0).filter(x=>x>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;};
    return TIER_ORDER.map(tier=>{
      const reps=deduped.filter(r=>r.tier===tier);if(!reps.length)return null;
      return{label:tier,color:TC[tier],count:reps.length,
        std:avg(reps,"std_pct"),otd:avg(reps,"otd_pct"),nir:avg(reps,"net_issue_rate"),
        fallout:avg(reps,"fallout_rate"),avg_deal:avg(reps,"avg_deal"),net_vol:avg(reps,"net_vol")};
    }).filter(Boolean);
  },[r30Data,ytdData]);
  const allReps=[...(r30Data?.reps||[]),...(ytdData?.reps||[])];
  const METRICS=[
    {key:"std",repKey:"std_pct",label:"STD%",max:.80,fmt:v=>fP(v)},
    {key:"otd",repKey:"otd_pct",label:"OTD%",max:.70,fmt:v=>fP(v)},
    {key:"nir",repKey:"net_issue_rate",label:"NetStk%",max:1.0,fmt:v=>fP(v)},
    {key:"fallout",repKey:"fallout_rate",label:"Fallout%",max:1.0,fmt:v=>fP(v),invert:true},
    {key:"avg_deal",repKey:"avg_deal",label:"Avg Deal",max:Math.max(...allReps.map(r=>r.avg_deal||0))*1.1||60000,fmt:v=>fK(v)},
    {key:"net_vol",repKey:"net_vol",label:"Net Vol",max:Math.max(...allReps.map(r=>r.net_vol||0))*1.1||600000,fmt:v=>fK(v)},
  ];
  const W2=580,H=280,PAD={top:36,right:132,bottom:50,left:48};
  const chartW=W2-PAD.left-PAD.right,chartH=H-PAD.top-PAD.bottom,nM=METRICS.length;
  const xStep=chartW/(nM-1),norm=(v,m)=>{const r=Math.min(1,Math.max(0,v/m.max));return m.invert?1-r:r;};
  const yPx=v=>PAD.top+chartH*(1-v),xPx=i=>PAD.left+i*xStep;
  const path=vals=>vals.map((v,i)=>`${i===0?"M":"L"}${xPx(i).toFixed(1)},${yPx(norm(v,METRICS[i])).toFixed(1)}`).join(" ");
  const repVals=METRICS.map(m=>rep[m.repKey]??0);
  if(!tierLines.length)return null;
  return(
    <div style={{marginTop:14,background:"var(--bg-base)",borderRadius:"var(--radius-lg)",border:"1px solid var(--border)",padding:16}}>
      <SectionHeader icon="📐" title="Performance vs Tier Baselines" description="How this rep's metrics stack up against each tier's average" color="#6366f1" compact/>
      <div style={{overflowX:"auto"}}>
        <svg width={W2} height={H} style={{display:"block",minWidth:W2}}>
          {[0,.25,.5,.75,1].map(v=>(
            <g key={v}>
              <line x1={PAD.left} y1={yPx(v)} x2={PAD.left+chartW} y2={yPx(v)} stroke="var(--border)" strokeWidth={1} strokeDasharray="3,4"/>
              <text x={PAD.left-6} y={yPx(v)+4} textAnchor="end" fill="var(--text-muted)" fontSize={8}>{(v*100).toFixed(0)}%</text>
            </g>
          ))}
          {METRICS.map((_,i)=>(
            <line key={i} x1={xPx(i)} y1={PAD.top} x2={xPx(i)} y2={PAD.top+chartH} stroke="var(--border)" strokeWidth={1} strokeDasharray="2,5"/>
          ))}
          {tierLines.map(tier=>{
            const vals=METRICS.map(m=>tier[m.key]??0);
            return(
              <g key={tier.label}>
                <path d={path(vals)} fill="none" stroke={tier.color} strokeWidth={1.5} strokeOpacity={.45} strokeDasharray="5,3"/>
                {vals.map((v,i)=><circle key={i} cx={xPx(i)} cy={yPx(norm(v,METRICS[i]))} r={2.5} fill={tier.color} opacity={.55}/>)}
              </g>
            );
          })}
          <path d={path(repVals)} fill="none" stroke="#38bdf8" strokeWidth={3}/>
          {repVals.map((v,i)=>(
            <g key={i}>
              <circle cx={xPx(i)} cy={yPx(norm(v,METRICS[i]))} r={5} fill="#38bdf8" stroke="var(--bg-base)" strokeWidth={2}/>
              <text x={xPx(i)} y={yPx(norm(v,METRICS[i]))-10} textAnchor="middle" fill="#38bdf8" fontSize={9} fontWeight={700} fontFamily="DM Mono">{METRICS[i].fmt(v)}</text>
            </g>
          ))}
          {METRICS.map((m,i)=>(
            <text key={i} x={xPx(i)} y={H-PAD.bottom+16} textAnchor="middle" fill="var(--text-secondary)" fontSize={10} fontFamily="DM Sans">{m.label}</text>
          ))}
          <g transform={`translate(${W2-PAD.right+10},${PAD.top})`}>
            <line x1={0} y1={6} x2={14} y2={6} stroke="#38bdf8" strokeWidth={3}/>
            <text x={18} y={10} fill="#38bdf8" fontSize={9} fontWeight={700} fontFamily="DM Sans">This Rep</text>
            {tierLines.map((t,i)=>(
              <g key={i} transform={`translate(0,${(i+1)*17})`}>
                <line x1={0} y1={6} x2={14} y2={6} stroke={t.color} strokeWidth={1.5} strokeDasharray="5,3" opacity={.75}/>
                <text x={18} y={10} fill={t.color} fontSize={9} fontFamily="DM Sans">{t.label} ({t.count})</text>
              </g>
            ))}
          </g>
        </svg>
      </div>
    </div>
  );
}

              threshold={r.demo>=20?"✓ Reliable":r.demo<10?"⚠ Low N":"~ OK"}/>
          </div>
        </div>

        {/* ── REVENUE ── */}
        <div className="section-block" style={{marginBottom:14}}>
          <SectionHeader icon="💰" title="Revenue Production" description="Volume and value of deals closed" color="#38bdf8" compact/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            <MetricCard label="Net Volume" explanation="Total revenue that sticks" value={f$(r.net_vol)}

            <MetricCard label="Avg Deal Size" explanation="Revenue extracted per close" value={f$(r.avg_deal)}

            <MetricCard label="Gross Issued" explanation="Total appointments closed" value={fN(r.gross_iss)} color="var(--text-muted)"/>
          </div>
        </div>

        {/* ── DEAL QUALITY ── */}
        <div className="section-block" style={{marginBottom:14}}>
          <SectionHeader icon="🛡️" title="Deal Quality & Risk" description="How clean and durable this rep's business is" color="#fb923c" compact/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            <MetricCard label="Fallout%" explanation="Deals lost after closing" value={fP(r.fallout_rate)}
              color={falloutColor(r.fallout_rate)} threshold={r.fallout_rate<.15?"✓ Clean":r.fallout_rate>.25?"⚠ High":"~ OK"}
              showBar barValue={r.fallout_rate} barMax={.5} teamAvg={bench.fallout}/>
            <MetricCard label="NetStk%" explanation="Closes that become installs" value={fP(r.net_issue_rate)}
              color={nirColor(r.net_issue_rate)} threshold={r.net_issue_rate>=.80?"✓ Strong":r.net_issue_rate<.60?"⚠ Low":"~ OK"}
              showBar barValue={r.net_issue_rate} barMax={1} teamAvg={bench.nir}/>
            <MetricCard label="Cancel Rate" explanation="Deals that cancelled" value={fP(r.cancel_rate)}
              color={r.cancel_rate<.1?"#34d399":r.cancel_rate>.2?"#f87171":"#fbbf24"}/>
            <MetricCard label="Hold Rate" explanation="Deals currently on hold" value={fP(r.hold_rate)}
              color={r.hold_rate<.08?"#34d399":r.hold_rate>.15?"#f87171":"#fbbf24"}/>
          </div>
        </div>

        {/* ── VS TEAM + DONUTS ── */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div className="section-block" style={{margin:0}}>
            <SectionHeader icon="📏" title="vs Team Average" description="Gray tick = team average" color="#475569" compact/>
            <MiniBar value={r.net_vol} teamAvg={teamAvgs.net_vol} max={teamAvgs.net_vol*3} color="#38bdf8" label="Net Volume" fmt={f$}/>
            <MiniBar value={r.std_pct} teamAvg={teamAvgs.std_pct} max={1} color="#6366f1" label="STD% — Close Rate" fmt={fP}/>
            <MiniBar value={r.avg_deal} teamAvg={teamAvgs.avg_deal} max={teamAvgs.avg_deal*2.5} color="#fbbf24" label="Avg Deal Size" fmt={f$}/>
            <MiniBar value={r.net_issue_rate} teamAvg={teamAvgs.net_issue_rate} max={1} color="#34d399" label="NetStk% — Stick Rate" fmt={fP}/>
            <MiniBar value={1-r.fallout_rate} teamAvg={1-teamAvgs.fallout_rate} max={1} color="#a78bfa" label="Clean Rate (inverse fallout)" fmt={fP}/>
          </div>
          <div className="section-block" style={{margin:0}}>
            <SectionHeader icon="🔵" title="Rate Breakdown" description="% of max benchmark" color="#475569" compact/>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginTop:4}}>
              <Donut value={r.std_pct} max={.8} color="#6366f1" label="STD%"/>
              <Donut value={r.otd_pct} max={.7} color="#38bdf8" label="OTD%"/>
              <Donut value={r.net_issue_rate} max={1} color="#34d399" label="NetStk%"/>
              <Donut value={r.cancel_rate} max={.5} color="#ef4444" label="Cancel%"/>
              <Donut value={r.hold_rate} max={.5} color="#fb923c" label="Hold%"/>
              <Donut value={r.crdecl_rate} max={.3} color="#fbbf24" label="CrDecl%"/>
            </div>
          </div>
        </div>

        {/* ── R30 VS YTD ── */}
        {r30R&&ytdR&&(
          <div className="section-block" style={{marginBottom:14}}>
            <SectionHeader icon="📈" title="R30 vs YTD — Momentum" description="Is this rep improving or declining vs their full-year baseline?" color="#38bdf8" compact/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
              <TrendRow r30Val={r30R.net_vol}        ytdVal={ytdR.net_vol}        higherBetter={true}  fmt={f$}  label="Net Volume"/>
              <TrendRow r30Val={r30R.std_pct}        ytdVal={ytdR.std_pct}        higherBetter={true}  fmt={fP}  label="STD% — Close Rate"/>
              <TrendRow r30Val={r30R.otd_pct}        ytdVal={ytdR.otd_pct}        higherBetter={true}  fmt={fP}  label="OTD%"/>
              <TrendRow r30Val={r30R.avg_deal}       ytdVal={ytdR.avg_deal}       higherBetter={true}  fmt={f$}  label="Avg Deal Size"/>
              <TrendRow r30Val={r30R.fallout_rate}   ytdVal={ytdR.fallout_rate}   higherBetter={false} fmt={fP}  label="Fallout% — lower is better"/>
              <TrendRow r30Val={r30R.net_issue_rate} ytdVal={ytdR.net_issue_rate} higherBetter={true}  fmt={fP}  label="NetStk% — Stick Rate"/>
              <TrendRow r30Val={gapPts(r30R)}        ytdVal={gapPts(ytdR)}        higherBetter={false} fmt={v=>`${v}pp`} label="OTD↔STD Gap"/>
              <TrendRow r30Val={r30R.score}          ytdVal={ytdR.score}          higherBetter={true}  fmt={v=>v?.toFixed(4)} label="Overall Score"/>
            </div>
          </div>
        )}

        {/* ── HISTORICAL TREND ── */}
        {repHistory.length>=2&&(
          <div className="section-block" style={{marginBottom:14}}>
            <SectionHeader icon="🕒" title={`Historical Trend — ${repHistory.length} Snapshots`} description="Based on uploaded R30 snapshots over time" color="#a78bfa" compact/>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
              {[
                {label:"STD% — Close Rate",key:"std_pct",fmt:fP,color:"#6366f1"},
                {label:"Net Volume",key:"net_vol",fmt:fK,color:"#38bdf8"},
                {label:"Fallout%",key:"fallout_rate",fmt:fP,color:"#fb923c"},
                {label:"Avg Deal",key:"avg_deal",fmt:fK,color:"#fbbf24"},
              ].map(m=>{
                const pts=repHistory.map(h=>({date:h.date,v:h.rep[m.key]??0}));
                const first=pts[0].v,last=pts[pts.length-1].v,up=last>=first;
                return(
                  <div key={m.key} style={{background:"var(--bg-base)",borderRadius:"var(--radius)",padding:"10px 13px",border:"1px solid var(--border)"}}>

                      <span style={{fontSize:11,color:up?"#34d399":"#f87171",fontWeight:700,fontFamily:"var(--font-mono)"}}>{m.fmt(last)} {up?"↑":"↓"}</span>
