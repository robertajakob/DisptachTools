<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sales Rank — Reece</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-base:       #070b12;
      --bg-surface:    #0c1220;
      --bg-elevated:   #101928;
      --bg-hover:      #141f30;
      --border:        #1a2538;
      --border-strong: #253347;
      --text-primary:  #eef2f8;
      --text-secondary:#8898aa;
      --text-muted:    #3d5068;
      --text-faint:    #1e2f42;
      --green:         #34d399;
      --green-dim:     rgba(52,211,153,.12);
      --yellow:        #fbbf24;
      --yellow-dim:    rgba(251,191,36,.12);
      --red:           #f87171;
      --red-dim:       rgba(248,113,113,.12);
      --blue:          #38bdf8;
      --blue-dim:      rgba(56,189,248,.10);
      --purple:        #a78bfa;
      --orange:        #fb923c;
      --accent:        #38bdf8;
      --font-display:  'Syne', sans-serif;
      --font-body:     'DM Sans', sans-serif;
      --font-mono:     'DM Mono', monospace;
      --radius-sm:     6px;
      --radius:        10px;
      --radius-lg:     14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    input::placeholder { color: var(--text-muted); }
    textarea::placeholder { color: var(--text-muted); }

    @keyframes spin    { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes fadeUp  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideIn { from{opacity:0;transform:scale(.97) translateY(4px)} to{opacity:1;transform:scale(1) translateY(0)} }
    @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }

    .fade-up  { animation: fadeUp  .25s ease both; }
    .slide-in { animation: slideIn .22s ease both; }

    /* ── TABLE HOVER ── */
    tbody tr { transition: background .12s; }
    tbody tr:hover { background: var(--bg-hover) !important; }
    tbody tr:hover td:first-child { border-left: 2px solid var(--accent); padding-left: 10px; }

    /* ── NAV LINK HOVER ── */
    .nav-btn { transition: color .15s, border-color .15s; }
    .nav-btn:hover { color: var(--text-primary) !important; }

    /* ── CARD HOVER ── */
    .metric-card { transition: transform .15s, box-shadow .15s; }
    .metric-card:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(0,0,0,.35); }

    /* ── CLICKABLE ROW ── */
    .clickable-row:hover .rep-arrow { opacity: 1 !important; }
    .rep-arrow { opacity: 0; transition: opacity .15s; }

    /* ── PILL ── */
    .tier-pill {
      display: inline-flex; align-items: center;
      padding: 2px 9px; border-radius: 20px;
      font-size: 10px; font-weight: 700; letter-spacing: .04em;
    }

    /* ── BUTTON BASE ── */
    .btn-ghost {
      background: transparent; border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 7px 14px;
      color: var(--text-secondary); cursor: pointer; font-family: inherit;
      font-size: 12px; transition: all .15s;
    }
    .btn-ghost:hover { border-color: var(--border-strong); color: var(--text-primary); }
    .btn-primary {
      background: linear-gradient(135deg,#0ea5e9,#6366f1);
      border: none; border-radius: var(--radius-sm); padding: 8px 16px;
      color: #fff; font-weight: 700; font-size: 12px;
      cursor: pointer; font-family: inherit; transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .88; }

    /* ── SEGMENT CONTROL ── */
    .seg-control {
      display: inline-flex; background: var(--bg-base);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 3px; gap: 2px;
    }
    .seg-btn {
      padding: 6px 16px; border-radius: 7px; font-family: inherit;
      font-size: 12px; cursor: pointer; border: none;
      transition: all .15s; font-weight: 500;
    }
    .seg-btn.active {
      background: linear-gradient(135deg,#0ea5e9,#6366f1);
      color: #fff; font-weight: 700;
      box-shadow: 0 1px 8px rgba(14,165,233,.3);
    }
    .seg-btn:not(.active) { background: transparent; color: var(--text-muted); }
    .seg-btn:not(.active):hover { color: var(--text-secondary); background: var(--bg-elevated); }

    /* ── STAT CHIP ── */
    .stat-chip {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px;
    }
    .stat-chip .chip-label { font-size: 10px; color: var(--text-muted); margin-bottom: 3px; letter-spacing:.04em; }
    .stat-chip .chip-value { font-size: 16px; font-weight: 700; color: var(--text-primary); font-family: var(--font-mono); }

    /* ── SECTION DIVIDER ── */
    .section-block {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      margin-bottom: 14px;
    }

    /* ── INSIGHT CARD ── */
    .insight-item {
      display: flex; gap: 11px; align-items: flex-start;
      padding: 11px 14px; border-radius: var(--radius);
      animation: fadeUp .2s ease both;
    }
    .insight-item:not(:last-child) { margin-bottom: 7px; }

    /* ── GRADE BOX ── */
    .grade-box {
      background: var(--bg-base); border-radius: var(--radius);
      padding: 14px 10px; text-align: center;
      transition: transform .15s; cursor: default;
      position: relative; overflow: hidden;
    }
    .grade-box:hover { transform: translateY(-2px); }

    /* ── MINI BAR ── */
    .mini-bar-track {
      height: 5px; background: var(--bg-elevated);
      border-radius: 3px; position: relative; overflow: visible;
    }
    .mini-bar-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
    .mini-bar-avg {
      position: absolute; top: -3px; width: 2px; height: 11px;
      background: var(--border-strong); border-radius: 1px;
    }

    /* ── TREND ROW ── */
    .trend-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 12px; background: var(--bg-base);
      border-radius: var(--radius-sm); margin-bottom: 4px;
      border: 1px solid transparent; transition: border-color .15s;
    }
    .trend-row:hover { border-color: var(--border); }

    /* ── COMPARISON CARD ── */
    .comp-header {
      padding: 10px 14px; background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
    }
    .comp-bar-row { margin-top: 6px; }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 50vh; gap: 12px; color: var(--text-muted);
    }
    .empty-state .empty-icon { font-size: 48px; opacity: .4; margin-bottom: 4px; }
    .empty-state .empty-title { font-size: 15px; font-weight: 600; color: var(--text-secondary); font-family: var(--font-display); }
    .empty-state .empty-sub { font-size: 12px; color: var(--text-muted); }

    /* ── TABLE OVERRIDES ── */
    .rank-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    .rank-table th {
      padding: 11px 13px; text-align: left; font-size: 10px;
      font-weight: 700; color: var(--text-muted); letter-spacing: .07em;
      text-transform: uppercase; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none; white-space: nowrap;
      background: var(--bg-surface);
    }
    .rank-table th:hover { color: var(--text-secondary); }
    .rank-table td {
      padding: 10px 13px; border-top: 1px solid var(--text-faint);
      color: var(--text-secondary); white-space: nowrap;
      transition: padding .12s;
    }
    .rank-table tbody tr:nth-child(even) td { background: rgba(255,255,255,.012); }

    /* ── UPLOAD MODAL ── */
    .upload-dropzone {
      border: 1.5px dashed var(--border-strong); border-radius: var(--radius);
      padding: 28px; text-align: center; cursor: pointer; transition: all .2s;
    }
    .upload-dropzone:hover { border-color: var(--blue); background: var(--blue-dim); }
  </style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo}=React;

// ─── FIREBASE ────────────────────────────────────────────────────────────────
const FB="https://salesranks-3674f-default-rtdb.firebaseio.com";
const db={
  get:async k=>{try{const r=await fetch(`${FB}/salesrank/${k}.json`);return r.ok?await r.json():null;}catch{return null;}},
  set:async(k,v)=>{try{await fetch(`${FB}/salesrank/${k}.json`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)});}catch(e){console.error(e);}},
};

// ─── WEIGHTS (unchanged) ─────────────────────────────────────────────────────
const W={net_vol:.20,nsli:.12,net_iss:.08,otd:.12,std:.12,close:.06,cancel:.13,hold:.05,crdecl:.02,gross:.10};
const CONF=d=>d<3?0:d<5?.35:d<10?.6:d<20?.8:1;
const TIERS=[
  {label:"🥇 Elite",  min:.80,color:"#f59e0b"},
  {label:"🥈 Strong", min:.65,color:"#94a3b8"},
  {label:"🥉 Average",min:.45,color:"#cd7f32"},
  {label:"⚠ Below Avg",min:.25,color:"#fb923c"},
  {label:"🔴 Low",   min:0,  color:"#f87171"},
];
const TC={"🥇 Elite":"#f59e0b","🥈 Strong":"#94a3b8","🥉 Average":"#cd7f32","⚠ Below Avg":"#fb923c","🔴 Low":"#f87171","⛔ Excluded":"#3d5068"};

// ─── MOMENTUM SIGNALS (unchanged) ────────────────────────────────────────────
const signal=(r30,ytd,higherBetter)=>{
  if(r30==null||ytd==null||ytd===0)return{s:0,label:"➡ Stable",color:"#64748b",icon:"➡"};
  const delta=(r30-ytd)/Math.abs(ytd);
  const d=higherBetter?delta:-delta;
  if(d>=.15) return{s:2,label:"🔥 Hot",    color:"#34d399",icon:"🔥"};
  if(d>=.05) return{s:1,label:"📈 Rising",  color:"#86efac",icon:"📈"};
  if(d>-.05) return{s:0,label:"➡ Stable",  color:"#64748b",icon:"➡"};
  if(d>-.15) return{s:-1,label:"📉 Slipping",color:"#fb923c",icon:"📉"};
  return{s:-2,label:"❄ Cold",    color:"#38bdf8",icon:"❄"};
};
const SIGNAL_METRICS=[
  {key:"std_pct",    label:"STD%",         higherBetter:true},
  {key:"otd_pct",    label:"OTD%",         higherBetter:true},
  {key:"net_vol",    label:"Net Vol",      higherBetter:true},
  {key:"avg_deal",   label:"Avg Deal",     higherBetter:true},
  {key:"net_issue_rate",label:"NetStk%",   higherBetter:true},
  {key:"fallout_rate",label:"Fallout%",    higherBetter:false},
  {key:"_gap",       label:"OTD↔STD Gap", higherBetter:false},
];

// ─── RANK ENGINE (unchanged) ─────────────────────────────────────────────────
function pctRank(arr,val){
  const s=[...arr].sort((a,b)=>a-b);
  const below=s.filter(v=>v<val).length,equal=s.filter(v=>v===val).length;
  if(s.length<=1)return 1;
  return(below+(equal-1)*.5)/(s.length-1);
}
function scoreReps(reps){
  const ranked=reps.filter(r=>CONF(r.demo)>0);
  if(!ranked.length)return reps.map(r=>({...r,score:0,pct:0,tier:"⛔ Excluded",rank:"-"}));
  const get=f=>ranked.map(r=>r[f]??0);
  const N={};
  ["net_vol","nsli","net_iss","otd_pct","std_pct","close_rate","gross_iss"]
    .forEach(f=>{const a=get(f);N[f]=ranked.map(r=>pctRank(a,r[f]??0));});
  ["cancel_rate","hold_rate","crdecl_rate"]
    .forEach(f=>{const a=get(f);N[f]=ranked.map(r=>1-pctRank(a,r[f]??0));});
  const raw=ranked.map((r,i)=>
    W.net_vol*N.net_vol[i]+W.nsli*N.nsli[i]+W.net_iss*N.net_iss[i]+
    W.otd*N.otd_pct[i]+W.std*N.std_pct[i]+W.close*N.close_rate[i]+
    W.cancel*N.cancel_rate[i]+W.hold*N.hold_rate[i]+W.crdecl*N.crdecl_rate[i]+
    W.gross*N.gross_iss[i]
  );
  const adj=raw.map((s,i)=>(s*.75+.5*.25)*CONF(ranked[i].demo));
  const adjPct=adj.map(v=>pctRank(adj,v));
  const ws=ranked.map((r,i)=>({...r,_adj:adj[i],_pct:adjPct[i]}));
  ws.sort((a,b)=>b._adj-a._adj);
  const result=ws.map((r,i)=>{
    const pct=r._pct,tier=TIERS.find(t=>pct>=t.min)?.label??"🔴 Low";
    return{...r,score:+r._adj.toFixed(4),pct:+pct.toFixed(4),tier,rank:i+1};
  });
  const excl=reps.filter(r=>CONF(r.demo)===0).map(r=>({...r,score:0,pct:0,tier:"⛔ Excluded",rank:"-"}));
  return[...result,...excl];
}

// ─── CSV PARSER (unchanged) ───────────────────────────────────────────────────
function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const headers=lines[0].split(",").map(h=>h.replace(/"/g,"").trim());
  return lines.slice(1).map(line=>{
    const vals=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;}else if(c===","&&!inQ){vals.push(cur);cur="";}else{cur+=c;}
    }
    vals.push(cur);
    const obj={};headers.forEach((h,i)=>{obj[h]=(vals[i]||"").trim();});
    return obj;
  });
}
function processCSV(text,win){
  const rows=parseCSV(text);
  const repRows=rows.filter(r=>r.Grouper&&r.Grouper.trim()!=="");
  if(!repRows.length)throw new Error("No rep rows found");
  const meta=rows[0]||{};
  const date_range=meta.SDate&&meta.EDate?`${meta.SDate} — ${meta.EDate}`:"";
  const n=v=>{const x=parseFloat(v);return isNaN(x)?0:x;};
  const reps=repRows.map(r=>{
    const otd_cnt=n(r.NumSale),demo=n(r.NumSat),gross_iss=n(r.NumIssued);
    const net_iss=n(r.NumNetIssued),close_vol=n(r.GSA),net_vol=n(r.NSA);
    const nsli=n(r.NSLI),cancel_cnt=n(r.NumCancelled),hold_cnt=n(r.NumHold);
    const crdecline_cnt=n(r.NumCD),working_cnt=n(r.NumWorking);
    const cancel_vol=n(r.GSACancelled),hold_vol=n(r.GSAHold),crdecline_vol=n(r.GSACD),working_vol=n(r.GSAWorking);
    const num_net=n(r.NumNet);
    const jsc=[1,2,3,4,5,6].map(i=>({cnt:n(r[`NumJSC${i}`]),vol:n(r[`GSAJSC${i}`]),label:r[`jbs${i}`]||`Type ${i}`}));
    const avg_deal=otd_cnt>0?close_vol/otd_cnt:0;
    const close_rate=demo>0?otd_cnt/demo:0;
    const cancel_rate=otd_cnt>0?cancel_cnt/otd_cnt:0;
    const hold_rate=otd_cnt>0?hold_cnt/otd_cnt:0;
    const crdecl_rate=otd_cnt>0?crdecline_cnt/otd_cnt:0;
    const fallout_rate=otd_cnt>0?(cancel_cnt*0.65+hold_cnt*0.25+crdecline_cnt*0.10)/otd_cnt:0;
    const net_issue_rate=otd_cnt>0?num_net/otd_cnt:0;
    return{
      rep:r.Grouper.trim(),gross_iss,net_iss,demo,otd_cnt,num_net,
      otd_pct:n(r.OTDPct),std_pct:n(r.STDPct),close_rate,
      close_vol,avg_deal,net_vol,nsli,
      cancel_cnt,cancel_vol,cancel_rate,
      hold_cnt,hold_vol,hold_rate,
      crdecline_cnt,crdecline_vol,crdecl_rate,
      fallout_rate,net_issue_rate,
      working_cnt,working_vol,jsc,
    };
  });
  return{reps:scoreReps(reps),date_range,updated:new Date().toISOString(),win,
    sdate:meta.SDate||"",edate:meta.EDate||""};
}

// ─── FORMATTERS (unchanged) ──────────────────────────────────────────────────
const f$=v=>v==null?"—":"$"+Math.round(v).toLocaleString();
const fP=v=>v==null?"—":(v*100).toFixed(1)+"%";
const fN=v=>v==null?"—":v;
const fK=v=>v==null?"—":"$"+Math.round(v/1000)+"k";
const gapPts=r=>r.otd_pct!=null&&r.std_pct!=null?Math.round((r.otd_pct-r.std_pct)*100):null;
const gapInfo=pts=>{
  if(pts===null)return{label:"—",color:"#64748b",badge:""};
  if(pts>=20)return{label:`+${pts}pp`,color:"#f87171",badge:"🚨"};
  if(pts>=12)return{label:`+${pts}pp`,color:"#fb923c",badge:"⚠"};
  if(pts>=6) return{label:`+${pts}pp`,color:"#fbbf24",badge:"👀"};
  return{label:pts<0?`${pts}pp`:`+${pts}pp`,color:"#34d399",badge:"✓"};
};

// ─── LETTER GRADE (unchanged) ────────────────────────────────────────────────
function letterGrade(val,benchmark,higherBetter=true){
  if(val==null||isNaN(val)||!benchmark)return{grade:"N/A",color:"#64748b"};
  const ratio=higherBetter?val/benchmark:benchmark/val;
  if(ratio>=1.20)return{grade:"A+",color:"#34d399"};
  if(ratio>=1.05)return{grade:"A", color:"#34d399"};
  if(ratio>=0.88)return{grade:"B", color:"#86efac"};
  if(ratio>=0.72)return{grade:"C", color:"#fbbf24"};
  if(ratio>=0.55)return{grade:"D", color:"#fb923c"};
  return{grade:"F",color:"#f87171"};
}

// ─── INSIGHT ENGINE (unchanged logic) ────────────────────────────────────────
function generateInsights(r,bench,r30R,ytdR){
  const insights=[];
  const stdPct=r.std_pct*100,otdPct=r.otd_pct*100;
  const falloutPct=r.fallout_rate*100,nirPct=r.net_issue_rate*100;
  const gap=gapPts(r),lowSample=r.demo<10;
  if(lowSample){insights.push({type:"caution",icon:"🔬",text:`Low sample size (${r.demo} demos) — treat these numbers with caution. Performance may look better or worse than reality.`});}
  if(stdPct>=35&&falloutPct>(bench.fallout*100)*1.2){insights.push({type:"warn",icon:"⚠️",text:`Strong close rate (${stdPct.toFixed(1)}%) but higher-than-average fallout (${falloutPct.toFixed(1)}%) — closing deals that aren't sticking.`});}
  else if(stdPct>=35){insights.push({type:"good",icon:"💪",text:`Strong close rate at ${stdPct.toFixed(1)}% — well above the 35% threshold. Converts demos into revenue consistently.`});}
  else if(stdPct<25){insights.push({type:"bad",icon:"📉",text:`Close rate of ${stdPct.toFixed(1)}% is below the 25% floor. Demo-to-close conversion needs attention.`});}
  if(gap!==null&&gap>=12){insights.push({type:"warn",icon:"🚨",text:`OTD% is ${gap}pp higher than STD% — rep closes on the day but struggles in the full cycle. May be relying on pressure over process.`});}
  if(nirPct>=80){insights.push({type:"good",icon:"✅",text:`Excellent stick rate — ${nirPct.toFixed(1)}% of closes net issue. Deals are real and durable.`});}
  else if(nirPct<55&&r.otd_cnt>=5){insights.push({type:"bad",icon:"🔴",text:`Only ${nirPct.toFixed(1)}% of closes net issue. A large portion of "wins" aren't converting to revenue.`});}
  if(r.net_vol>bench.net_vol*1.25){insights.push({type:"good",icon:"🏆",text:`Top revenue producer — net volume of ${f$(r.net_vol)} is ${Math.round((r.net_vol/bench.net_vol-1)*100)}% above team average.`});}
  if(r30R&&ytdR){
    const stdDelta=r30R.std_pct-ytdR.std_pct,volDelta=r30R.net_vol-ytdR.net_vol;
    if(stdDelta>=.05&&volDelta>0){insights.push({type:"trend",icon:"🔥",text:`Improving trajectory — close rate (+${(stdDelta*100).toFixed(1)}pp) and volume (${f$(volDelta)}) both up vs YTD baseline.`});}
    else if(stdDelta<=-.05&&volDelta<0){insights.push({type:"warn",icon:"❄️",text:`Declining trend — close rate down ${(Math.abs(stdDelta)*100).toFixed(1)}pp and volume down ${f$(Math.abs(volDelta))} vs YTD.`});}
  }
  if(falloutPct<(bench.fallout*100)*0.7&&r.otd_cnt>=5){insights.push({type:"good",icon:"🎯",text:`Deal quality is excellent — fallout rate of ${falloutPct.toFixed(1)}% is well below team average. Closes are clean and durable.`});}
  return insights.slice(0,3);
}

// ─── LEAD RECOMMENDATION ENGINE (unchanged) ──────────────────────────────────
function generateLeadRecommendation(repA,dataA,repB,dataB,teamAvgs){
  const score=(d)=>{
    let pts=0;
    if(d.net_vol>teamAvgs.net_vol*1.1)pts+=3;else if(d.net_vol>teamAvgs.net_vol*0.9)pts+=2;else pts+=1;
    if(d.std_pct>=0.35)pts+=3;else if(d.std_pct>=0.25)pts+=2;else pts+=0;
    if(d.net_issue_rate>=0.80)pts+=3;else if(d.net_issue_rate>=0.60)pts+=2;else pts+=0;
    if(d.fallout_rate<teamAvgs.fallout_rate*0.8)pts+=2;else if(d.fallout_rate>teamAvgs.fallout_rate*1.3)pts-=2;
    if(d.avg_deal>teamAvgs.avg_deal*1.1)pts+=1;
    return pts;
  };
  const ptsA=score(dataA),ptsB=score(dataB),diff=ptsA-ptsB;
  const winner=diff>0?repA:diff<0?repB:null;
  const winnerData=diff>0?dataA:dataB,loserData=diff>0?dataB:dataA;
  const confidence=Math.abs(diff)>=5?"Strong":Math.abs(diff)>=2?"Moderate":"Marginal";
  const reasons=[];
  if(!winner)return{winner:null,confidence:"Tied",reasons:["Performance metrics are too close to call. Consider availability, market fit, or recency."],ptsA,ptsB};
  const wD=winnerData,lD=loserData;
  if(wD.net_vol>lD.net_vol*1.1)reasons.push(`Higher net volume (${f$(wD.net_vol)} vs ${f$(lD.net_vol)}) — proven revenue producer`);
  if(wD.std_pct>lD.std_pct+0.03)reasons.push(`Stronger close rate (${(wD.std_pct*100).toFixed(1)}% vs ${(lD.std_pct*100).toFixed(1)}%) — more likely to convert`);
  if(wD.net_issue_rate>lD.net_issue_rate+0.05)reasons.push(`Better stick rate (${(wD.net_issue_rate*100).toFixed(1)}% vs ${(lD.net_issue_rate*100).toFixed(1)}%) — revenue more likely to hold`);
  if(wD.fallout_rate<lD.fallout_rate-0.03)reasons.push(`Lower fallout (${(wD.fallout_rate*100).toFixed(1)}% vs ${(lD.fallout_rate*100).toFixed(1)}%) — cleaner deal quality`);
  if(wD.avg_deal>lD.avg_deal*1.1)reasons.push(`Higher avg deal (${f$(wD.avg_deal)} vs ${f$(lD.avg_deal)}) — extracts more value per appointment`);
  if(reasons.length===0)reasons.push("Marginally higher composite score across weighted metrics");
  return{winner,confidence,reasons:reasons.slice(0,3),ptsA,ptsB};
}

// SPARKLINE
function Sparkline({points,color="#38bdf8",width=120,height=32}){
  if(!points||points.length<2)return<span style={{color:"var(--text-faint)",fontSize:10}}>—</span>;
  const vals=points.map(p=>p.v),mn=Math.min(...vals),mx=Math.max(...vals),range=mx-mn||1;
  const xS=(width-4)/(points.length-1);
  const yP=v=>height-4-((v-mn)/range)*(height-8);
  const d=points.map((p,i)=>`${i===0?"M":"L"}${2+i*xS},${yP(p.v)}`).join(" ");
  const last=points[points.length-1],prev=points[points.length-2],up=last.v>=prev.v;
  return(
    <svg width={width} height={height}>
      <path d={d} fill="none" stroke={color} strokeWidth={1.5} opacity={.8}/>
      <circle cx={2+(points.length-1)*xS} cy={yP(last.v)} r={3} fill={up?"#34d399":"#f87171"}/>
    </svg>
  );
}

// TIER LINE CHART
function TierLineChart({rep,r30Data,ytdData}){
  const tierLines=useMemo(()=>{
    const seen=new Set();const deduped=[];
    for(const r of (r30Data?.reps||[]).filter(x=>x.tier!=="⛔ Excluded")){seen.add(r.rep);deduped.push(r);}
    for(const r of (ytdData?.reps||[]).filter(x=>x.tier!=="⛔ Excluded")){if(!seen.has(r.rep))deduped.push(r);}
    const TIER_ORDER=["🥇 Elite","🥈 Strong","🥉 Average","⚠ Below Avg","🔴 Low"];
    const avg=(reps,f)=>{const v=reps.map(r=>r[f]??0).filter(x=>x>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;};
    return TIER_ORDER.map(tier=>{
      const reps=deduped.filter(r=>r.tier===tier);if(!reps.length)return null;
      return{label:tier,color:TC[tier],count:reps.length,
        std:avg(reps,"std_pct"),otd:avg(reps,"otd_pct"),nir:avg(reps,"net_issue_rate"),
        fallout:avg(reps,"fallout_rate"),avg_deal:avg(reps,"avg_deal"),net_vol:avg(reps,"net_vol")};
    }).filter(Boolean);
  },[r30Data,ytdData]);
  const allReps=[...(r30Data?.reps||[]),...(ytdData?.reps||[])];
  const METRICS=[
    {key:"std",repKey:"std_pct",label:"STD%",max:.80,fmt:v=>fP(v)},
    {key:"otd",repKey:"otd_pct",label:"OTD%",max:.70,fmt:v=>fP(v)},
    {key:"nir",repKey:"net_issue_rate",label:"NetStk%",max:1.0,fmt:v=>fP(v)},
    {key:"fallout",repKey:"fallout_rate",label:"Fallout%",max:1.0,fmt:v=>fP(v),invert:true},
    {key:"avg_deal",repKey:"avg_deal",label:"Avg Deal",max:Math.max(...allReps.map(r=>r.avg_deal||0))*1.1||60000,fmt:v=>fK(v)},
    {key:"net_vol",repKey:"net_vol",label:"Net Vol",max:Math.max(...allReps.map(r=>r.net_vol||0))*1.1||600000,fmt:v=>fK(v)},
  ];
  const W2=580,H=280,PAD={top:36,right:132,bottom:50,left:48};
  const chartW=W2-PAD.left-PAD.right,chartH=H-PAD.top-PAD.bottom,nM=METRICS.length;
  const xStep=chartW/(nM-1),norm=(v,m)=>{const r=Math.min(1,Math.max(0,v/m.max));return m.invert?1-r:r;};
  const yPx=v=>PAD.top+chartH*(1-v),xPx=i=>PAD.left+i*xStep;
  const path=vals=>vals.map((v,i)=>`${i===0?"M":"L"}${xPx(i).toFixed(1)},${yPx(norm(v,METRICS[i])).toFixed(1)}`).join(" ");
  const repVals=METRICS.map(m=>rep[m.repKey]??0);
  if(!tierLines.length)return null;
  return(
    <div style={{marginTop:14,background:"var(--bg-base)",borderRadius:"var(--radius-lg)",border:"1px solid var(--border)",padding:16}}>
      <SectionHeader icon="📐" title="Performance vs Tier Baselines" description="How this rep's metrics stack up against each tier's average" color="#6366f1" compact/>
      <div style={{overflowX:"auto"}}>
        <svg width={W2} height={H} style={{display:"block",minWidth:W2}}>
          {[0,.25,.5,.75,1].map(v=>(
            <g key={v}>
              <line x1={PAD.left} y1={yPx(v)} x2={PAD.left+chartW} y2={yPx(v)} stroke="var(--border)" strokeWidth={1} strokeDasharray="3,4"/>
              <text x={PAD.left-6} y={yPx(v)+4} textAnchor="end" fill="var(--text-muted)" fontSize={8}>{(v*100).toFixed(0)}%</text>
            </g>
          ))}
          {METRICS.map((_,i)=>(
            <line key={i} x1={xPx(i)} y1={PAD.top} x2={xPx(i)} y2={PAD.top+chartH} stroke="var(--border)" strokeWidth={1} strokeDasharray="2,5"/>
          ))}
          {tierLines.map(tier=>{
            const vals=METRICS.map(m=>tier[m.key]??0);
            return(
              <g key={tier.label}>
                <path d={path(vals)} fill="none" stroke={tier.color} strokeWidth={1.5} strokeOpacity={.45} strokeDasharray="5,3"/>
                {vals.map((v,i)=><circle key={i} cx={xPx(i)} cy={yPx(norm(v,METRICS[i]))} r={2.5} fill={tier.color} opacity={.55}/>)}
              </g>
            );
          })}
          <path d={path(repVals)} fill="none" stroke="#38bdf8" strokeWidth={3}/>
          {repVals.map((v,i)=>(
            <g key={i}>
              <circle cx={xPx(i)} cy={yPx(norm(v,METRICS[i]))} r={5} fill="#38bdf8" stroke="var(--bg-base)" strokeWidth={2}/>
              <text x={xPx(i)} y={yPx(norm(v,METRICS[i]))-10} textAnchor="middle" fill="#38bdf8" fontSize={9} fontWeight={700} fontFamily="DM Mono">{METRICS[i].fmt(v)}</text>
            </g>
          ))}
          {METRICS.map((m,i)=>(
            <text key={i} x={xPx(i)} y={H-PAD.bottom+16} textAnchor="middle" fill="var(--text-secondary)" fontSize={10} fontFamily="DM Sans">{m.label}</text>
          ))}
          <g transform={`translate(${W2-PAD.right+10},${PAD.top})`}>
            <line x1={0} y1={6} x2={14} y2={6} stroke="#38bdf8" strokeWidth={3}/>
            <text x={18} y={10} fill="#38bdf8" fontSize={9} fontWeight={700} fontFamily="DM Sans">This Rep</text>
            {tierLines.map((t,i)=>(
              <g key={i} transform={`translate(0,${(i+1)*17})`}>
                <line x1={0} y1={6} x2={14} y2={6} stroke={t.color} strokeWidth={1.5} strokeDasharray="5,3" opacity={.75}/>
                <text x={18} y={10} fill={t.color} fontSize={9} fontFamily="DM Sans">{t.label} ({t.count})</text>
              </g>
            ))}
          </g>
        </svg>
      </div>
    </div>
  );
}

            <MetricCard label="Demos Sat" explanation="Sample size for reliability" value={fN(r.demo)}
              color={r.demo>=20?"#34d399":r.demo>=10?"#fbbf24":"#94a3b8"}
              threshold={r.demo>=20?"✓ Reliable":r.demo<10?"⚠ Low N":"~ OK"}/>
          </div>
        </div>

        {/* ── REVENUE ── */}
        <div className="section-block" style={{marginBottom:14}}>
          <SectionHeader icon="💰" title="Revenue Production" description="Volume and value of deals closed" color="#38bdf8" compact/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            <MetricCard label="Net Volume" explanation="Total revenue that sticks" value={f$(r.net_vol)}
              color={r.net_vol>=bench.net_vol?"#34d399":"#94a3b8"} showBar barValue={r.net_vol} barMax={bench.net_vol*3} teamAvg={bench.net_vol}/>
            <MetricCard label="Avg Deal Size" explanation="Revenue extracted per close" value={f$(r.avg_deal)}
              color={r.avg_deal>=bench.avg_deal?"#34d399":"#94a3b8"} showBar barValue={r.avg_deal} barMax={bench.avg_deal*2.5} teamAvg={bench.avg_deal}/>
            <MetricCard label="NSLI/NCP" explanation="Net service & install revenue" value={f$(r.nsli)} color="#a78bfa"/>
            <MetricCard label="Gross Issued" explanation="Total appointments closed" value={fN(r.gross_iss)} color="var(--text-muted)"/>
          </div>
        </div>

        {/* ── DEAL QUALITY ── */}
        <div className="section-block" style={{marginBottom:14}}>
          <SectionHeader icon="🛡️" title="Deal Quality & Risk" description="How clean and durable this rep's business is" color="#fb923c" compact/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            <MetricCard label="Fallout%" explanation="Deals lost after closing" value={fP(r.fallout_rate)}
              color={falloutColor(r.fallout_rate)} threshold={r.fallout_rate<.15?"✓ Clean":r.fallout_rate>.25?"⚠ High":"~ OK"}
              showBar barValue={r.fallout_rate} barMax={.5} teamAvg={bench.fallout}/>
            <MetricCard label="NetStk%" explanation="Closes that become installs" value={fP(r.net_issue_rate)}
              color={nirColor(r.net_issue_rate)} threshold={r.net_issue_rate>=.80?"✓ Strong":r.net_issue_rate<.60?"⚠ Low":"~ OK"}
              showBar barValue={r.net_issue_rate} barMax={1} teamAvg={bench.nir}/>
            <MetricCard label="Cancel Rate" explanation="Deals that cancelled" value={fP(r.cancel_rate)}
              color={r.cancel_rate<.1?"#34d399":r.cancel_rate>.2?"#f87171":"#fbbf24"}/>
            <MetricCard label="Hold Rate" explanation="Deals currently on hold" value={fP(r.hold_rate)}
              color={r.hold_rate<.08?"#34d399":r.hold_rate>.15?"#f87171":"#fbbf24"}/>
          </div>
        </div>

        {/* ── VS TEAM + DONUTS ── */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          <div className="section-block" style={{margin:0}}>
            <SectionHeader icon="📏" title="vs Team Average" description="Gray tick = team average" color="#475569" compact/>
            <MiniBar value={r.net_vol} teamAvg={teamAvgs.net_vol} max={teamAvgs.net_vol*3} color="#38bdf8" label="Net Volume" fmt={f$}/>
            <MiniBar value={r.std_pct} teamAvg={teamAvgs.std_pct} max={1} color="#6366f1" label="STD% — Close Rate" fmt={fP}/>
            <MiniBar value={r.avg_deal} teamAvg={teamAvgs.avg_deal} max={teamAvgs.avg_deal*2.5} color="#fbbf24" label="Avg Deal Size" fmt={f$}/>
            <MiniBar value={r.net_issue_rate} teamAvg={teamAvgs.net_issue_rate} max={1} color="#34d399" label="NetStk% — Stick Rate" fmt={fP}/>
            <MiniBar value={1-r.fallout_rate} teamAvg={1-teamAvgs.fallout_rate} max={1} color="#a78bfa" label="Clean Rate (inverse fallout)" fmt={fP}/>
          </div>
          <div className="section-block" style={{margin:0}}>
            <SectionHeader icon="🔵" title="Rate Breakdown" description="% of max benchmark" color="#475569" compact/>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginTop:4}}>
              <Donut value={r.std_pct} max={.8} color="#6366f1" label="STD%"/>
              <Donut value={r.otd_pct} max={.7} color="#38bdf8" label="OTD%"/>
              <Donut value={r.net_issue_rate} max={1} color="#34d399" label="NetStk%"/>
              <Donut value={r.cancel_rate} max={.5} color="#ef4444" label="Cancel%"/>
              <Donut value={r.hold_rate} max={.5} color="#fb923c" label="Hold%"/>
              <Donut value={r.crdecl_rate} max={.3} color="#fbbf24" label="CrDecl%"/>
            </div>
          </div>
        </div>

        {/* ── R30 VS YTD ── */}
        {r30R&&ytdR&&(
          <div className="section-block" style={{marginBottom:14}}>
            <SectionHeader icon="📈" title="R30 vs YTD — Momentum" description="Is this rep improving or declining vs their full-year baseline?" color="#38bdf8" compact/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
              <TrendRow r30Val={r30R.net_vol}        ytdVal={ytdR.net_vol}        higherBetter={true}  fmt={f$}  label="Net Volume"/>
              <TrendRow r30Val={r30R.std_pct}        ytdVal={ytdR.std_pct}        higherBetter={true}  fmt={fP}  label="STD% — Close Rate"/>
              <TrendRow r30Val={r30R.otd_pct}        ytdVal={ytdR.otd_pct}        higherBetter={true}  fmt={fP}  label="OTD%"/>
              <TrendRow r30Val={r30R.avg_deal}       ytdVal={ytdR.avg_deal}       higherBetter={true}  fmt={f$}  label="Avg Deal Size"/>
              <TrendRow r30Val={r30R.fallout_rate}   ytdVal={ytdR.fallout_rate}   higherBetter={false} fmt={fP}  label="Fallout% — lower is better"/>
              <TrendRow r30Val={r30R.net_issue_rate} ytdVal={ytdR.net_issue_rate} higherBetter={true}  fmt={fP}  label="NetStk% — Stick Rate"/>
              <TrendRow r30Val={gapPts(r30R)}        ytdVal={gapPts(ytdR)}        higherBetter={false} fmt={v=>`${v}pp`} label="OTD↔STD Gap"/>
              <TrendRow r30Val={r30R.score}          ytdVal={ytdR.score}          higherBetter={true}  fmt={v=>v?.toFixed(4)} label="Overall Score"/>
            </div>
          </div>
        )}

        {/* ── HISTORICAL TREND ── */}
        {repHistory.length>=2&&(
          <div className="section-block" style={{marginBottom:14}}>
            <SectionHeader icon="🕒" title={`Historical Trend — ${repHistory.length} Snapshots`} description="Based on uploaded R30 snapshots over time" color="#a78bfa" compact/>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
              {[
                {label:"STD% — Close Rate",key:"std_pct",fmt:fP,color:"#6366f1"},
                {label:"Net Volume",key:"net_vol",fmt:fK,color:"#38bdf8"},
                {label:"Fallout%",key:"fallout_rate",fmt:fP,color:"#fb923c"},
                {label:"Avg Deal",key:"avg_deal",fmt:fK,color:"#fbbf24"},
              ].map(m=>{
                const pts=repHistory.map(h=>({date:h.date,v:h.rep[m.key]??0}));
                const first=pts[0].v,last=pts[pts.length-1].v,up=last>=first;
                return(
                  <div key={m.key} style={{background:"var(--bg-base)",borderRadius:"var(--radius)",padding:"10px 13px",border:"1px solid var(--border)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                      <span style={{fontSize:10,color:"var(--text-muted)"}}>{m.label}</span>
                      <span style={{fontSize:11,color:up?"#34d399":"#f87171",fontWeight:700,fontFamily:"var(--font-mono)"}}>{m.fmt(last)} {up?"↑":"↓"}</span>
                    </div>
                    <Sparkline points={pts} color={m.color} width={140} height={30}/>
                    <div style={{fontSize:9,color:"var(--text-faint)",marginTop:3}}>{repHistory[0].date} → {repHistory[repHistory.length-1].date}</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        <TierLineChart rep={r} r30Data={r30Data} ytdData={ytdData}/>

        {/* ── FULL RAW STATS ── */}
        <div style={{marginTop:14}}>
          <SectionHeader icon="📋" title={`Full Stats (${r30R?"Rolling 30":"Year to Date"})`} description="Raw numbers underlying all calculations above" color="#475569" compact/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:5}}>
            {[
              ["Demos Sat",fN(r.demo),"Appointments sat"],
              ["Gross Issued",fN(r.gross_iss),"Total closes"],
              ["OTD Closes",fN(r.otd_cnt),"Same-day closes"],
              ["Net Closes",fN(r.num_net),"Net issued closes"],
              ["NetStk%",fP(r.net_issue_rate),"Stick rate"],
              ["Close Vol",f$(r.close_vol),"Gross close volume"],
              ["Net Vol",f$(r.net_vol),"Net revenue"],
              ["Avg Deal",f$(r.avg_deal),"Revenue per close"],
              ["NSLI/NCP",f$(r.nsli),"Service & install rev"],
              ["Cancels",fN(r.cancel_cnt),"Post-close cancels"],
              ["Holds",fN(r.hold_cnt),"Deals on hold"],
              ["Cr Declines",fN(r.crdecline_cnt),"Credit declines"],
              ["Working",fN(r.working_cnt),"In-flight deals"],
            ].map(([l,v,tip])=>(
              <div key={l} style={{background:"var(--bg-base)",borderRadius:"var(--radius-sm)",padding:"8px 11px",border:"1px solid var(--border)"}} title={tip}>
                <div style={{fontSize:9,color:"var(--text-muted)",marginBottom:3,letterSpacing:".04em",textTransform:"uppercase"}}>{l}</div>
                <div style={{fontWeight:700,color:"var(--text-primary)",fontSize:13,fontFamily:"var(--font-mono)"}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── MARKET SNAPSHOT TAB ─────────────────────────────────────────────────────
function MarketSnapshotTab({r30Data,ytdData,markets,marketList,onOpenScorecard}){
  const [snapWin,setSnapWin]=useState("r30");
  const [selectedMarket,setSelectedMarket]=useState(null);
  const src=snapWin==="r30"?r30Data:ytdData;
  const otherSrc=snapWin==="r30"?ytdData:r30Data;

  const marketCards=useMemo(()=>{
    if(!src?.reps||!marketList.length)return[];
    return marketList.map(mkt=>{
      const reps=src.reps.filter(r=>markets[r.rep]===mkt&&r.tier!=="⛔ Excluded");
      if(!reps.length)return null;
      const sum=f=>reps.reduce((a,r)=>a+(r[f]??0),0);
      const avg=f=>sum(f)/reps.length;
      const netVol=sum("net_vol");
      const stdPct=avg("std_pct");
      const otdPct=avg("otd_pct");
      const avgDeal=avg("avg_deal");
      const topRep=reps.slice().sort((a,b)=>(b.net_vol??0)-(a.net_vol??0))[0];
      const eliteCount=reps.filter(r=>r.tier==="🥇 Elite"||r.tier==="🥈 Strong").length;
      const atRiskCount=reps.filter(r=>r.tier==="⚠ Below Avg"||r.tier==="🔴 Low").length;

      let volTrend=null;
      if(otherSrc?.reps){
        const otherReps=otherSrc.reps.filter(r=>markets[r.rep]===mkt&&r.tier!=="⛔ Excluded");
        if(otherReps.length){
          const otherVol=otherReps.reduce((a,r)=>a+(r.net_vol??0),0);
          volTrend=otherVol>0?((netVol-otherVol)/otherVol):null;
        }
      }

      return{name:mkt,repCount:reps.length,netVol,stdPct,otdPct,avgDeal,topRep,eliteCount,atRiskCount,volTrend};
    }).filter(Boolean).sort((a,b)=>b.netVol-a.netVol);
  },[src,otherSrc,markets,marketList]);

  const company=useMemo(()=>{
    if(!r30Data?.reps&&!ytdData?.reps)return null;
    const r30Active=(r30Data?.reps||[]).filter(r=>r.tier!=="⛔ Excluded");
    const ytdActive=(ytdData?.reps||[]).filter(r=>r.tier!=="⛔ Excluded");
    const calc=arr=>arr.length?{
      netVol:arr.reduce((a,r)=>a+(r.net_vol??0),0),
      stdPct:arr.reduce((a,r)=>a+(r.std_pct??0),0)/arr.length,
      otdPct:arr.reduce((a,r)=>a+(r.otd_pct??0),0)/arr.length,
      avgDeal:arr.reduce((a,r)=>a+(r.avg_deal??0),0)/arr.length,
      repCount:arr.length,
    }:null;
    return{r30:calc(r30Active),ytd:calc(ytdActive)};
  },[r30Data,ytdData]);

  const detailData=useMemo(()=>{
    if(!selectedMarket||!src?.reps)return null;

    const reps=src.reps.filter(r=>markets[r.rep]===selectedMarket&&r.tier!=="⛔ Excluded");
    if(!reps.length)return null;

    const normalizeRank=v=>{
      if(v==null||v==="-"||v==="—"||v==="")return Number.POSITIVE_INFINITY;
      const n=Number(v);
      return Number.isFinite(n)?n:Number.POSITIVE_INFINITY;
    };

    const sorted=[...reps].sort((a,b)=>{
      const ra=normalizeRank(a.rank), rb=normalizeRank(b.rank);
      if(ra!==rb)return ra-rb;
      return (b.net_vol??0)-(a.net_vol??0);
    });

    const sum=f=>reps.reduce((a,r)=>a+(r[f]??0),0);
    const avg=f=>sum(f)/reps.length;

    const mktNetVol=sum("net_vol");
    const mktStdPct=avg("std_pct");
    const mktOtdPct=avg("otd_pct");
    const mktAvgDeal=avg("avg_deal");
    const mktFallout=avg("fallout_rate");
    const mktNir=avg("net_issue_rate");
    const mktRank=marketCards.findIndex(m=>m.name===selectedMarket)+1;
    const topRep=[...reps].sort((a,b)=>(b.net_vol??0)-(a.net_vol??0))[0];

    const allActive=src.reps.filter(r=>r.tier!=="⛔ Excluded");
    const coAvg=f=>allActive.length?allActive.reduce((a,r)=>a+(r[f]??0),0)/allActive.length:0;
    const coStd=coAvg("std_pct");
    const coFallout=coAvg("fallout_rate");
    const coNir=coAvg("net_issue_rate");
    const coAvgDeal=coAvg("avg_deal");
    const companyNetVol=allActive.reduce((a,r)=>a+(r.net_vol??0),0);

    let deltas=null;
    if(otherSrc?.reps){
      const otherReps=otherSrc.reps.filter(r=>markets[r.rep]===selectedMarket&&r.tier!=="⛔ Excluded");
      if(otherReps.length){
        const otherSum=f=>otherReps.reduce((a,r)=>a+(r[f]??0),0);
        const otherAvg=f=>otherSum(f)/otherReps.length;
        const otherNetVol=otherSum("net_vol");
        deltas={
          vol:otherNetVol>0?(mktNetVol-otherNetVol)/otherNetVol:null,
          std:mktStdPct-otherAvg("std_pct"),
          otd:mktOtdPct-otherAvg("otd_pct"),
          deal:mktAvgDeal-otherAvg("avg_deal"),
        };
      }
    }

    const shortName=repName=>{
      if(!repName)return "Unknown";
      if(repName.includes(","))return repName.split(",")[1].trim();
      return repName.split(" ")[0];
    };

    const insights=[];
    const topTwo=[...reps].sort((a,b)=>(b.net_vol??0)-(a.net_vol??0)).slice(0,2);
    const topTwoVol=topTwo.reduce((a,r)=>a+(r.net_vol??0),0);
    if(reps.length>=3&&mktNetVol>0&&topTwoVol/mktNetVol>=0.7){
      insights.push({icon:"⚡",type:"warn",text:`${topTwo.map(r=>shortName(r.rep)).join(" & ")} are driving ${Math.round(topTwoVol/mktNetVol*100)}% of market volume.`});
    }
    if(mktFallout>coFallout*1.25){
      insights.push({icon:"⚠️",type:"warn",text:`High fallout vs company average (${fP(mktFallout)} vs ${fP(coFallout)}).`});
    }else if(mktFallout<coFallout*0.8&&reps.length>=2){
      insights.push({icon:"✅",type:"good",text:`Deal quality is holding well with below-average fallout.`});
    }
    if(mktStdPct>=0.35&&mktNir<0.65){
      insights.push({icon:"🔄",type:"warn",text:`Strong close rate but weak stick rate (${fP(mktStdPct)} STD, ${fP(mktNir)} NetStk).`});
    }else if(mktStdPct>=0.35&&mktNir>=0.75){
      insights.push({icon:"💪",type:"good",text:`Strong close rate and stick rate — durable revenue profile.`});
    }
    const aboveAvgStd=reps.filter(r=>(r.std_pct??0)>coStd).length;
    if(reps.length>=3&&aboveAvgStd===1){
      insights.push({icon:"📊",type:"caution",text:`Only 1 of ${reps.length} reps is above company-average STD%.`});
    }
    const lowDemo=reps.filter(r=>(r.demo??0)<8).length;
    if(reps.length>=2&&lowDemo>=Math.ceil(reps.length/2)){
      insights.push({icon:"🔬",type:"caution",text:`${lowDemo} of ${reps.length} reps have low sample size.`});
    }
    if(companyNetVol>0&&mktNetVol/companyNetVol>=0.2){
      insights.push({icon:"🏆",type:"good",text:`This market is carrying over 20% of total ${snapWin==="r30"?"R30":"YTD"} net volume.`});
    }

    const carrying=[...reps].sort((a,b)=>(b.net_vol??0)-(a.net_vol??0)).slice(0,2);
    const moreLeads=[...reps]
      .filter(r=>(r.std_pct??0)>=0.32&&(r.net_issue_rate??0)>=0.70)
      .sort((a,b)=>(b.std_pct??0)-(a.std_pct??0))
      .slice(0,2);
    const caution=[...reps]
      .filter(r=>(r.fallout_rate??0)>coFallout*1.3)
      .sort((a,b)=>(b.fallout_rate??0)-(a.fallout_rate??0));
    const lowSample=[...reps]
      .filter(r=>(r.demo??0)<8)
      .sort((a,b)=>(a.demo??0)-(b.demo??0));

    return{
      sorted,
      mktNetVol,mktStdPct,mktOtdPct,mktAvgDeal,mktFallout,mktNir,mktRank,topRep,deltas,
      insights:insights.slice(0,5),
      coStd,coFallout,coNir,coAvgDeal,
      carrying,moreLeads,caution,lowSample,
    };
  },[selectedMarket,src,otherSrc,markets,marketCards,snapWin]);

  useEffect(()=>{
    if(selectedMarket&&!marketCards.some(m=>m.name===selectedMarket))setSelectedMarket(null);
  },[selectedMarket,marketCards]);

  const noData=!r30Data&&!ytdData;
  if(noData)return(
    <div className="empty-state" style={{padding:"60px 0"}}>
      <div className="empty-icon">🏙</div>
      <div className="empty-title">No data yet</div>
      <div className="empty-sub">Upload a CSV to see market standings</div>
    </div>
  );

  const trendColor=v=>v==null?"#64748b":v>=.1?"#34d399":v>=0?"#86efac":v>-.1?"#fb923c":"#f87171";
  const trendIcon=v=>v==null?"➡":v>=.1?"🔥":v>=0?"↑":v>-.1?"↓":"❄";
  const trendLabel=v=>v==null?"—":((v>=0?"+":"")+((v*100).toFixed(1))+"%");
  const deltaColor=v=>v==null?"#64748b":v>0?"#34d399":v<0?"#f87171":"#94a3b8";
  const formatDeltaPp=v=>v==null?"—":`${v>0?"+":""}${(v*100).toFixed(1)}pp`;
  const formatDeltaMoney=v=>v==null?"—":`${v>0?"+":""}${f$(Math.round(v))}`;

  const selectedCard=selectedMarket?marketCards.find(m=>m.name===selectedMarket):null;
  const insightStyles={
    good:{bg:"rgba(52,211,153,.06)",border:"rgba(52,211,153,.2)"},
    warn:{bg:"rgba(248,113,113,.06)",border:"rgba(248,113,113,.2)"},
    caution:{bg:"rgba(251,191,36,.06)",border:"rgba(251,191,36,.2)"},
  };

  return(
    <div style={{padding:"20px 24px",animation:"fadeUp .2s ease both"}}>

      {/* ── HEADER + WINDOW TOGGLE ── */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div>
          <div style={{fontWeight:800,fontSize:18,color:"var(--text-primary)",fontFamily:"var(--font-display)",letterSpacing:"-.01em"}}>Market Snapshot</div>
          <div style={{fontSize:11,color:"var(--text-muted)",marginTop:3}}>Current standing by market · CEO-level view</div>
        </div>
        <div style={{display:"flex",gap:6,background:"var(--bg-elevated)",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:4}}>
          {[["r30","Rolling 30"],["ytd","Year to Date"]].map(([v,l])=>(
            <button key={v} onClick={()=>{setSnapWin(v);setSelectedMarket(null);}} style={{padding:"6px 14px",borderRadius:"var(--radius-sm)",border:"none",fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer",transition:"all .15s",background:snapWin===v?"#38bdf8":"transparent",color:snapWin===v?"#000":"var(--text-muted)"}}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {/* ── COMPANY ROLLUP BANNER ── */}
      {company&&(
        <div style={{background:"var(--bg-surface)",border:"1px solid var(--border-strong)",borderRadius:"var(--radius-lg)",padding:"16px 22px",marginBottom:22,display:"grid",gridTemplateColumns:"auto 1fr 1fr 1fr 1fr",gap:"0 28px",alignItems:"center"}}>
          <div style={{paddingRight:24,borderRight:"1px solid var(--border)"}}>
            <div style={{fontSize:10,color:"var(--text-muted)",letterSpacing:".08em",textTransform:"uppercase",fontWeight:700,marginBottom:4}}>Company</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {r30Data&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:3,background:"rgba(56,189,248,.12)",color:"#38bdf8",fontWeight:700,border:"1px solid rgba(56,189,248,.2)"}}>R30</span>}
              {ytdData&&<span style={{fontSize:9,padding:"2px 7px",borderRadius:3,background:"rgba(52,211,153,.10)",color:"#34d399",fontWeight:700,border:"1px solid rgba(52,211,153,.2)"}}>YTD</span>}
            </div>
          </div>
          {[
            ["Net Volume","netVol",v=>f$(Math.round(v)),"#34d399"],
            ["STD%","stdPct",v=>fP(v),"#38bdf8"],
            ["OTD%","otdPct",v=>fP(v),"#a78bfa"],
            ["Avg Deal","avgDeal",v=>f$(Math.round(v)),"#fbbf24"],
          ].map(([label,key,fmt,color])=>{
            const r30v=company.r30?.[key];
            const ytdv=company.ytd?.[key];
            return(
              <div key={key}>
                <div style={{fontSize:10,color:"var(--text-muted)",letterSpacing:".06em",textTransform:"uppercase",fontWeight:700,marginBottom:6}}>{label}</div>
                <div style={{display:"flex",gap:14,alignItems:"baseline"}}>
                  {r30Data&&<div><div style={{fontSize:9,color:"#38bdf8",marginBottom:1}}>R30</div><div style={{fontSize:15,fontWeight:800,color,fontFamily:"var(--font-mono)"}}>{fmt(r30v??0)}</div></div>}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App(){
  const [mainTab,setMainTab]=useState("dashboard");
  const [salesSub,setSalesSub]=useState("r30");
  const [dispatchSub,setDispatchSub]=useState("tracker");
  const [r30,setR30]=useState(null);
  const [ytd,setYtd]=useState(null);
  const [history,setHistory]=useState([]);
  const [uploading,setUploading]=useState(false);
  const [uploadWin,setUploadWin]=useState("r30");
  const [msg,setMsg]=useState("");
  const [search,setSearch]=useState("");
  const [marketFilter,setMarketFilter]=useState("");
  const [sort,setSort]=useState({f:"rank",d:"asc"});
  const [scorecard,setScorecard]=useState(null);
  const [modal,setModal]=useState(false);
  const [markets,setMarkets]=useState({});
  const [marketList,setMarketList]=useState([]);
  const fileRef=useRef();

  useEffect(()=>{
    (async()=>{
      const r=await db.get("r30");if(r)setR30(r);
      const y=await db.get("ytd");if(y)setYtd(y);
      const h=await db.get("history");if(h)setHistory(Array.isArray(h)?h:[]);
      const m=await db.get("markets");if(m){setMarkets(m.assignments||{});setMarketList(m.list||[]);}
    })();
    const iv=setInterval(async()=>{
      const r=await db.get("r30");if(r)setR30(r);
      const y=await db.get("ytd");if(y)setYtd(y);
      const h=await db.get("history");if(h)setHistory(Array.isArray(h)?h:[]);
      const m=await db.get("markets");if(m){setMarkets(m.assignments||{});setMarketList(m.list||[]);}
    },30000);
    return()=>clearInterval(iv);
  },[]);

  const curForTable=salesSub==="ytd"?ytd:r30;
  const teamAvgs=useMemo(()=>{
    const src=curForTable?.reps?.filter(r=>r.tier!=="⛔ Excluded")||[];
    const avg=f=>{const v=src.map(r=>r[f]??0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;};
    return{net_vol:avg("net_vol"),std_pct:avg("std_pct"),otd_pct:avg("otd_pct"),avg_deal:avg("avg_deal"),net_issue_rate:avg("net_issue_rate"),fallout_rate:avg("fallout_rate")};
  },[curForTable]);

  const upload=useCallback(async e=>{
    const file=e.target.files[0];if(!file)return;
    setUploading(true);setMsg("Reading CSV...");
    try{
      const text=await new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=rej;fr.readAsText(file);});
      setMsg("Parsing...");
      const out=processCSV(text,uploadWin);
      setMsg("Saving...");
      await db.set(uploadWin,out);
      uploadWin==="r30"?setR30(out):setYtd(out);
      if(uploadWin==="r30"){
        const h=await db.get("history")||[];
        const hist=Array.isArray(h)?h:[];
        const existing=hist.findIndex(x=>x.sdate===out.sdate&&x.edate===out.edate);
        const snapshot={win:uploadWin,sdate:out.sdate,edate:out.edate,updated:out.updated,date_range:out.date_range,reps:out.reps.map(r=>({rep:r.rep,tier:r.tier,rank:r.rank,score:r.score,std_pct:r.std_pct,otd_pct:r.otd_pct,net_vol:r.net_vol,avg_deal:r.avg_deal,net_issue_rate:r.net_issue_rate,fallout_rate:r.fallout_rate,demo:r.demo}))};
        if(existing>=0)hist[existing]=snapshot;else hist.push(snapshot);
        const trimmed=hist.slice(-52);
        await db.set("history",trimmed);setHistory(trimmed);
      }
      setSalesSub(uploadWin);setMainTab("dashboard");setModal(false);setMsg("");
    }catch(err){setMsg("Error: "+err.message);}
    finally{setUploading(false);if(fileRef.current)fileRef.current.value="";}
  },[uploadWin]);

  const tgSort=f=>setSort(s=>s.f===f?{f,d:s.d==="asc"?"desc":"asc"}:{f,d:f==="rank"?"asc":"desc"});
  const active=curForTable?.reps?.filter(r=>r.tier!=="⛔ Excluded").length??0;

  const tableRows=useMemo(()=>{
    const src=salesSub==="ytd"?ytd:r30;
    if(!src?.reps)return[];
    let list=[...src.reps];
    if(search)list=list.filter(r=>r.rep?.toLowerCase().includes(search.toLowerCase()));
    if(marketFilter==="__unassigned__")list=list.filter(r=>!markets[r.rep]||markets[r.rep]==="");
    else if(marketFilter)list=list.filter(r=>markets[r.rep]===marketFilter);
    list.sort((a,b)=>{
      let av=a[sort.f],bv=b[sort.f];
      if(sort.f==="rank"){av=a.rank==="-"?9999:a.rank;bv=b.rank==="-"?9999:b.rank;}
      if(sort.f==="_gap"){av=gapPts(a)??-999;bv=gapPts(b)??-999;}
      if(typeof av==="string")return sort.d==="asc"?av.localeCompare(bv):bv.localeCompare(av);
      return sort.d==="asc"?(av??0)-(bv??0):(bv??0)-(av??0);
    });
    return list;
  },[salesSub,r30,ytd,search,sort,marketFilter,markets]);

  const deepRows=useMemo(()=>(curForTable?.reps||[]).filter(r=>r.tier!=="⛔ Excluded").sort((a,b)=>b.net_vol-a.net_vol),[curForTable]);
  const allRepsForDispatch=useMemo(()=>(r30?.reps||ytd?.reps||[]),[r30,ytd]);

  const TH=({f,label,c,title})=>(
    <th title={title} onClick={()=>tgSort(f)} style={{color:c||"var(--text-muted)"}}>
      {label}{sort.f===f?(sort.d==="asc"?" ↑":" ↓"):""}
    </th>
  );

  return(
    <div style={{minHeight:"100vh",background:"var(--bg-base)",color:"var(--text-primary)",fontSize:14}}>

      {/* ── MAIN NAV ── */}
      <div style={{background:"var(--bg-surface)",borderBottom:"1px solid var(--border)",padding:"0 22px",display:"flex",alignItems:"center",height:52,position:"sticky",top:0,zIndex:50,backdropFilter:"blur(8px)"}}>
        <div style={{fontWeight:800,fontSize:15,color:"var(--text-primary)",marginRight:28,fontFamily:"var(--font-display)",letterSpacing:"-.01em",whiteSpace:"nowrap"}}>
          <span style={{color:"#38bdf8"}}>↗</span> Sales Rank
        </div>
        {[["dashboard","⚡ Dashboard"],["sales","📈 Sales Data"],["dispatch","🗂 Dispatch"]].map(([k,label])=>(
          <button key={k} className="nav-btn" onClick={()=>setMainTab(k)} style={{background:"none",border:"none",padding:"0 14px",height:52,fontFamily:"inherit",color:mainTab===k?"#38bdf8":"var(--text-muted)",borderBottom:mainTab===k?"2px solid #38bdf8":"2px solid transparent",cursor:"pointer",fontWeight:mainTab===k?700:400,fontSize:13,letterSpacing:".02em",whiteSpace:"nowrap",transition:"all .15s"}}>
            {label}
          </button>
        ))}
        <div style={{flex:1}}/>
        {history.length>0&&<span style={{fontSize:10,color:"var(--text-faint)",marginRight:14}}>{history.length} snapshots</span>}
        {curForTable&&<span style={{fontSize:11,color:"var(--text-faint)",marginRight:14}}>Updated {new Date(curForTable.updated).toLocaleDateString()}</span>}
        <button onClick={()=>{setModal(true);setMsg("");}} className="btn-primary">+ Upload CSV</button>
      </div>

      {/* ── UPLOAD MODAL ── */}
      {modal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget&&!uploading)setModal(false);}}>
          <div className="fade-up" style={{background:"var(--bg-surface)",border:"1px solid var(--border-strong)",borderRadius:"var(--radius-lg)",padding:28,width:400,maxWidth:"92vw"}}>
            <div style={{fontWeight:800,fontSize:16,marginBottom:20,fontFamily:"var(--font-display)"}}>Upload CSV Report</div>
            <div style={{fontSize:10,color:"var(--text-muted)",marginBottom:8,letterSpacing:".08em",textTransform:"uppercase",fontWeight:700}}>Target Window</div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {["r30","ytd"].map(w=>(
                <button key={w} onClick={()=>!uploading&&setUploadWin(w)} style={{flex:1,padding:"9px 0",borderRadius:"var(--radius-sm)",fontFamily:"inherit",border:`1.5px solid ${uploadWin===w?"#38bdf8":"var(--border)"}`,background:uploadWin===w?"rgba(56,189,248,.08)":"transparent",color:uploadWin===w?"#38bdf8":"var(--text-muted)",cursor:uploading?"not-allowed":"pointer",fontSize:12,fontWeight:600,transition:"all .15s"}}>
                  {w==="r30"?"Rolling 30 Days":"Year to Date"}
                </button>
              ))}
            </div>
            <div style={{fontSize:10,color:"var(--text-muted)",marginBottom:14,padding:"9px 12px",background:"var(--bg-elevated)",borderRadius:"var(--radius-sm)",lineHeight:1.6}}>
              💡 R30 uploads are saved as snapshots to build historical trends over time.
            </div>
            {!uploading?(
              <>
                <div onClick={()=>fileRef.current?.click()} className="upload-dropzone">
                  <div style={{fontSize:32,marginBottom:8,opacity:.5}}>📄</div>
                  <div style={{fontSize:13,color:"var(--text-muted)"}}>Click to select Sales Efficiency CSV</div>
                </div>
                <input ref={fileRef} type="file" accept=".csv" onChange={upload} style={{display:"none"}}/>
                <button onClick={()=>setModal(false)} className="btn-ghost" style={{width:"100%",marginTop:10}}>Cancel</button>
              </>
            ):(
              <div style={{textAlign:"center",padding:"28px 0"}}>
                <div style={{fontSize:28,marginBottom:10,display:"inline-block",animation:"spin 1s linear infinite"}}>⚙</div>
                <div style={{color:"#38bdf8",fontSize:13}}>{msg}</div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── SCORECARD ── */}
      {scorecard&&(
        <Scorecard rep={scorecard} r30Data={r30} ytdData={ytd} history={history}
          onClose={()=>setScorecard(null)} teamAvgs={teamAvgs} markets={markets}/>
      )}

      {/* ══ DASHBOARD TAB ══ */}
      {mainTab==="dashboard"&&(
        <DashboardTab
          r30Data={r30} ytdData={ytd} history={history}
          markets={markets} marketList={marketList}
          onOpenScorecard={setScorecard}/>
      )}

      {/* ══ SALES TAB ══ */}
      {mainTab==="sales"&&(
        <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 52px)"}}>
          {/* SUB NAV */}
          <div style={{background:"var(--bg-surface)",borderBottom:"1px solid var(--border)",padding:"10px 22px",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            <div className="seg-control">
              {[["r30","Rolling 30"],["ytd","Year to Date"],["trends","📈 Trends"],["deep","Deep Stats"],["snapshot","🏙 Market Snapshot"]].map(([v,label])=>(
                <button key={v} className={`seg-btn${salesSub===v?" active":""}`} onClick={()=>setSalesSub(v)}>{label}</button>
              ))}
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto"}}>

            {/* TABLE VIEW */}
            {(salesSub==="r30"||salesSub==="ytd")&&(
              <div style={{padding:"18px 22px"}}>
                {!(salesSub==="r30"?r30:ytd)?(
                  <div className="empty-state">
                    <div className="empty-icon">📭</div>
                    <div className="empty-title">No {salesSub==="r30"?"Rolling 30":"YTD"} data yet</div>
                    <div className="empty-sub">Upload a Sales Efficiency CSV to get started</div>
                    <button onClick={()=>{setUploadWin(salesSub);setModal(true);}} className="btn-primary" style={{marginTop:8,padding:"10px 22px",fontSize:13}}>Upload CSV</button>
                  </div>
                ):(
                  <>
                    {/* STAT ROW */}
                    <div style={{marginBottom:16}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                        <span style={{fontSize:11,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>{(salesSub==="ytd"?ytd:r30)?.date_range}</span>
                        {marketFilter&&marketFilter!=="__unassigned__"&&<span style={{fontSize:11,color:"#fbbf24",background:"rgba(251,191,36,.1)",padding:"2px 9px",borderRadius:12,fontWeight:600,border:"1px solid rgba(251,191,36,.2)"}}>🗺 {marketFilter}</span>}
                      </div>
                      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                        {[["Active Reps",active],["Avg STD%",fP(teamAvgs.std_pct)],["Avg OTD%",fP(teamAvgs.otd_pct)],["Avg Net Vol",f$(teamAvgs.net_vol)],["Avg Deal",f$(teamAvgs.avg_deal)],["Avg Fallout",fP(teamAvgs.fallout_rate)],["Avg NetStk%",fP(teamAvgs.net_issue_rate)]].map(([l,v])=>(
                          <div key={l} className="stat-chip">
                            <div className="chip-label">{l}</div>
                            <div className="chip-value">{v}</div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* FILTERS */}
                    <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
                      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search rep…"
                        style={{background:"var(--bg-surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"7px 12px",color:"var(--text-primary)",fontSize:13,fontFamily:"inherit",outline:"none",width:200,transition:"border-color .15s"}}
                        onFocus={e=>e.target.style.borderColor="var(--border-strong)"}
                        onBlur={e=>e.target.style.borderColor="var(--border)"}/>
                      <select value={marketFilter} onChange={e=>setMarketFilter(e.target.value)}
                        style={{background:"var(--bg-surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"7px 12px",color:marketFilter?"#fbbf24":"var(--text-muted)",fontSize:13,fontFamily:"inherit",cursor:"pointer",outline:"none",minWidth:160}}>
                        <option value="">🗺 All Markets</option>
                        {marketList.map(m=><option key={m} value={m}>{m}</option>)}
                        <option value="__unassigned__">— Unassigned</option>
                      </select>
                      {marketFilter&&<button onClick={()=>setMarketFilter("")} style={{background:"rgba(251,191,36,.08)",border:"1px solid rgba(251,191,36,.25)",borderRadius:"var(--radius-sm)",padding:"7px 10px",color:"#fbbf24",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>✕ Clear</button>}
                    </div>

                    {/* TABLE */}
                    <div style={{overflowX:"auto",borderRadius:"var(--radius-lg)",border:"1px solid var(--border)"}}>
                      <table className="rank-table">
                        <thead>
                          <tr>
                            <TH f="rank" label="Rank"/>
                            <TH f="tier" label="Tier"/>
                            <TH f="rep" label="Rep"/>
                            <TH f="score" label="Score"/>
                            <TH f="demo" label="Demos"/>
                            <TH f="std_pct" label="STD%" title="Close rate from demos sat"/>
                            <TH f="otd_pct" label="OTD%" title="On-the-day close rate"/>
                            <TH f="_gap" label="Gap" c="#fb923c" title="OTD vs STD gap — lower is better"/>
                            <TH f="net_vol" label="Net Vol"/>
                            <TH f="avg_deal" label="Avg Deal"/>
                            <TH f="net_issue_rate" label="NetStk%" title="Stick Rate"/>
                            <TH f="fallout_rate" label="Fallout%" title="Weighted: Cancel 65% · Hold 25% · CrDecl 10%"/>
                          </tr>
                        </thead>
                        <tbody>
                          {tableRows.map((r,i)=>{
                            const tc2=TC[r.tier]??"#64748b";
                            const excl=r.tier==="⛔ Excluded";
                            const pts=gapPts(r),gi=gapInfo(pts);
                            return(
                              <tr key={r.rep} className={!excl?"clickable-row":""} onClick={()=>!excl&&setScorecard(r.rep)}
                                style={{cursor:excl?"default":"pointer",opacity:excl?.4:1}}>
                                <td style={{color:"var(--text-muted)",fontFamily:"var(--font-mono)",fontWeight:600}}>{r.rank}</td>
                                <td><span className="tier-pill" style={{background:`${tc2}18`,color:tc2}}>{r.tier}</span></td>
                                <td style={{fontWeight:600,color:"var(--text-primary)",whiteSpace:"nowrap"}}>
                                  {r.rep}
                                  {!excl&&<span className="rep-arrow" style={{marginLeft:6,fontSize:10,color:"var(--text-faint)"}}>↗</span>}
                                  {markets[r.rep]&&<span style={{marginLeft:7,fontSize:9,color:"#fbbf24",background:"rgba(251,191,36,.1)",padding:"1px 6px",borderRadius:3,border:"1px solid rgba(251,191,36,.15)"}}>{markets[r.rep]}</span>}
                                </td>
                                <td style={{color:"#38bdf8",fontWeight:700,fontFamily:"var(--font-mono)"}}>{excl?"—":r.score.toFixed(4)}</td>
                                <td style={{fontFamily:"var(--font-mono)"}}>{fN(r.demo)}</td>
                                <td style={{color:r.std_pct>teamAvgs.std_pct?"#34d399":"#f87171",fontWeight:600,fontFamily:"var(--font-mono)"}}>{fP(r.std_pct)}</td>
                                <td style={{color:r.otd_pct>teamAvgs.otd_pct?"#34d399":"#f87171",fontWeight:600,fontFamily:"var(--font-mono)"}}>{fP(r.otd_pct)}</td>
                                <td style={{fontWeight:pts>=6?700:400}}>
                                  <span style={{color:gi.color,fontFamily:"var(--font-mono)"}}>{gi.label}</span>
                                  {pts>=6&&<span style={{marginLeft:4,fontSize:11}}>{gi.badge}</span>}
                                </td>
                                <td style={{color:r.net_vol>teamAvgs.net_vol?"#34d399":"#f87171",fontWeight:600,fontFamily:"var(--font-mono)"}}>{f$(r.net_vol)}</td>
                                <td style={{color:r.avg_deal>teamAvgs.avg_deal?"#34d399":"#f87171",fontFamily:"var(--font-mono)"}}>{f$(r.avg_deal)}</td>
                                <td style={{color:r.net_issue_rate>teamAvgs.net_issue_rate?"#34d399":"#f87171",fontFamily:"var(--font-mono)"}}>{fP(r.net_issue_rate)}</td>
                                <td style={{color:r.fallout_rate<teamAvgs.fallout_rate?"#34d399":"#f87171",fontFamily:"var(--font-mono)"}}>{fP(r.fallout_rate)}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </>
                )}
              </div>
            )}

            {salesSub==="trends"&&<TrendsTab r30Data={r30} ytdData={ytd} history={history} onOpenScorecard={setScorecard}/>}

            {salesSub==="deep"&&(
              <div style={{padding:"18px 22px"}}>
                <div style={{marginBottom:14}}>
                  <div style={{fontWeight:800,fontSize:14,color:"#a78bfa",fontFamily:"var(--font-display)",marginBottom:3}}>📊 Deep Stats</div>
                  <div style={{fontSize:12,color:"var(--text-muted)"}}>NSLI/NCP · Close type breakdown · Fallout detail · Sorted by Net Vol</div>
                </div>
                {!r30&&!ytd?<div style={{color:"var(--text-muted)"}}>Upload data first.</div>:(
                  <div style={{overflowX:"auto",borderRadius:"var(--radius-lg)",border:"1px solid var(--border)"}}>
                    <table className="rank-table">
                      <thead>
                        <tr>
                          <th>Rep</th><th>Tier</th>
                          <th>Net Vol</th><th>NSLI/NCP</th><th>NSLI%</th>
                          <th style={{color:"#38bdf8"}}>JSC1-Net</th>
                          <th style={{color:"#6366f1"}}>JSC2</th>
                          <th style={{color:"#fbbf24"}}>JSC3</th>
                          <th style={{color:"#fb923c"}}>JSC4</th>
                          <th style={{color:"#f87171"}}>JSC5</th>
                          <th style={{color:"var(--text-muted)"}}>JSC6</th>
                          <th style={{color:"#f87171",borderLeft:"1px solid var(--border)"}}>Cancel</th>
                          <th style={{color:"#f87171"}}>Cxl Vol</th>
                          <th style={{color:"#fbbf24"}}>Hold</th>
                          <th style={{color:"#fbbf24"}}>Hold Vol</th>
                          <th style={{color:"#a78bfa"}}>CrDecl</th>
                          <th style={{color:"#a78bfa"}}>Decl Vol</th>
                        </tr>
                      </thead>
                      <tbody>
                        {deepRows.map((r,i)=>{
                          const nsliPct=r.net_vol>0?r.nsli/r.net_vol:0;
                          const emptyJsc={cnt:0,vol:0};
                          const jsc=r.jsc||[emptyJsc,emptyJsc,emptyJsc,emptyJsc,emptyJsc,emptyJsc];
                          return(
                            <tr key={r.rep} onClick={()=>setScorecard(r.rep)} className="clickable-row" style={{cursor:"pointer"}}>
                              <td style={{fontWeight:600,color:"var(--text-primary)",whiteSpace:"nowrap"}}>{r.rep}</td>
                              <td><span className="tier-pill" style={{background:`${TC[r.tier]??"#64748b"}18`,color:TC[r.tier]??"#64748b"}}>{r.tier}</span></td>
                              <td style={{color:"#34d399",fontWeight:700,fontFamily:"var(--font-mono)"}}>{f$(r.net_vol)}</td>
                              <td style={{fontFamily:"var(--font-mono)"}}>{f$(r.nsli)}</td>
                              <td style={{color:nsliPct>.1?"#fbbf24":"var(--text-muted)",fontFamily:"var(--font-mono)"}}>{fP(nsliPct)}</td>
                              {jsc.map((j,idx)=>(
                                <td key={idx}>
                                  {j.cnt>0?<span style={{fontFamily:"var(--font-mono)"}}>{j.cnt}<span style={{fontSize:10,color:"var(--text-faint)"}}> {f$(j.vol)}</span></span>:"—"}
                                </td>
                              ))}
                              <td style={{borderLeft:"1px solid var(--border)",color:r.cancel_cnt>0?"#f87171":"var(--text-faint)",fontFamily:"var(--font-mono)"}}>{fN(r.cancel_cnt)}</td>
                              <td style={{fontFamily:"var(--font-mono)"}}>{r.cancel_vol>0?f$(r.cancel_vol):"—"}</td>
                              <td style={{color:r.hold_cnt>0?"#fbbf24":"var(--text-faint)",fontFamily:"var(--font-mono)"}}>{fN(r.hold_cnt)}</td>
                              <td style={{fontFamily:"var(--font-mono)"}}>{r.hold_vol>0?f$(r.hold_vol):"—"}</td>
                              <td style={{color:r.crdecline_cnt>0?"#a78bfa":"var(--text-faint)",fontFamily:"var(--font-mono)"}}>{fN(r.crdecline_cnt)}</td>
                              <td style={{fontFamily:"var(--font-mono)"}}>{r.crdecline_vol>0?f$(r.crdecline_vol):"—"}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            )}
            {salesSub==="snapshot"&&(
              <MarketSnapshotTab r30Data={r30} ytdData={ytd} markets={markets} marketList={marketList} onOpenScorecard={setScorecard}/>
            )}
          </div>
        </div>
      )}

      {/* ══ DISPATCH TAB ══ */}
      {mainTab==="dispatch"&&(
        <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 52px)"}}>
          <div style={{background:"var(--bg-surface)",borderBottom:"1px solid var(--border)",padding:"10px 22px",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            <div className="seg-control">
              {[["tracker","🗂 Tracker"],["compare","⚖ Compare"],["markets","🗺 Markets"],["repmap","📍 Rep Map"]].map(([v,label])=>(
                <button key={v} className={`seg-btn${dispatchSub===v?" active":""}`} onClick={()=>setDispatchSub(v)}>{label}</button>
              ))}
            </div>
          </div>
          <div style={{flex:1,overflowY:dispatchSub==="repmap"||dispatchSub==="tracker"?"hidden":"auto"}}>
            {dispatchSub==="tracker"&&<TrackerTab allReps={allRepsForDispatch} markets={markets}/>}
            {dispatchSub==="compare"&&<ComparisonTool r30Data={r30} ytdData={ytd} markets={markets} marketList={marketList}/>}
            {dispatchSub==="markets"&&<MarketManager r30Data={r30} ytdData={ytd} markets={markets} marketList={marketList} onSave={(a,l)=>{setMarkets(a);setMarketList(l);}}/>}
            {dispatchSub==="repmap"&&<RepMapTab allReps={allRepsForDispatch} markets={markets}/>}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
