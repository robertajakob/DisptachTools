<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sales Rank — Reece</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:#080c14;color:#e2e8f0;font-family:'DM Sans',system-ui,sans-serif;}
    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-track{background:#0d1120;}
    ::-webkit-scrollbar-thumb{background:#1e2a3a;border-radius:3px;}
    input::placeholder{color:#334155;}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideIn{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  </style>

<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo}=React;

// ─── FIREBASE ────────────────────────────────────────────────────────────────
const FB="https://salesranks-3674f-default-rtdb.firebaseio.com";
const db={
  get:async k=>{try{const r=await fetch(`${FB}/salesrank/${k}.json`);return r.ok?await r.json():null;}catch{return null;}},
  set:async(k,v)=>{try{await fetch(`${FB}/salesrank/${k}.json`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)});}catch(e){console.error(e);}},
};

// ─── WEIGHTS ─────────────────────────────────────────────────────────────────
const W={net_vol:.20,nsli:.12,net_iss:.08,otd:.12,std:.12,close:.06,cancel:.13,hold:.05,crdecl:.02,gross:.10}; // Fallout: Cancel 65% · Hold 25% · CrDecl 10%
const CONF=d=>d<3?0:d<5?.35:d<10?.6:d<20?.8:1;
const TIERS=[
  {label:"🥇 Elite",min:.80,color:"#f59e0b"},
  {label:"🥈 Strong",min:.65,color:"#94a3b8"},
  {label:"🥉 Average",min:.45,color:"#cd7f32"},
  {label:"⚠ Below Avg",min:.25,color:"#f97316"},
  {label:"🔴 Low",min:0,color:"#ef4444"},
];
const TC={"🥇 Elite":"#f59e0b","🥈 Strong":"#94a3b8","🥉 Average":"#cd7f32","⚠ Below Avg":"#f97316","🔴 Low":"#ef4444","⛔ Excluded":"#6b7280"};

// ─── MOMENTUM SIGNALS ────────────────────────────────────────────────────────
// Returns signal based on % change between two values
const signal=(r30,ytd,higherBetter)=>{
  if(r30==null||ytd==null||ytd===0)return{s:0,label:"➡ Stable",color:"#64748b",icon:"➡"};
  const delta=(r30-ytd)/Math.abs(ytd);
  const d=higherBetter?delta:-delta; // positive d = improvement
  if(d>=.15) return{s:2,label:"🔥 Hot",   color:"#4ade80",icon:"🔥"};
  if(d>=.05) return{s:1,label:"📈 Rising", color:"#86efac",icon:"📈"};
  if(d>-.05) return{s:0,label:"➡ Stable", color:"#64748b",icon:"➡"};
  if(d>-.15) return{s:-1,label:"📉 Slipping",color:"#f97316",icon:"📉"};
  return{s:-2,label:"❄ Cold",   color:"#38bdf8",icon:"❄"};
};

const SIGNAL_METRICS=[
  {key:"std_pct",    label:"STD%",        higherBetter:true},
  {key:"otd_pct",    label:"OTD%",        higherBetter:true},
  {key:"net_vol",    label:"Net Vol",     higherBetter:true},
  {key:"avg_deal",   label:"Avg Deal",    higherBetter:true},
  {key:"net_issue_rate",label:"NetStk%", higherBetter:true},
  {key:"fallout_rate",label:"Fallout%",   higherBetter:false},
  {key:"_gap",       label:"OTD↔STD Gap",higherBetter:false},
];

// ─── RANK ENGINE ─────────────────────────────────────────────────────────────
function pctRank(arr,val){
  const s=[...arr].sort((a,b)=>a-b);
  const below=s.filter(v=>v<val).length,equal=s.filter(v=>v===val).length;
  if(s.length<=1)return 1;
  return(below+(equal-1)*.5)/(s.length-1);
}

function scoreReps(reps){
  const ranked=reps.filter(r=>CONF(r.demo)>0);
  if(!ranked.length)return reps.map(r=>({...r,score:0,pct:0,tier:"⛔ Excluded",rank:"-"}));
  const get=f=>ranked.map(r=>r[f]??0);
  const N={};
  ["net_vol","nsli","net_iss","otd_pct","std_pct","close_rate","gross_iss"]
    .forEach(f=>{const a=get(f);N[f]=ranked.map(r=>pctRank(a,r[f]??0));});
  ["cancel_rate","hold_rate","crdecl_rate"]
    .forEach(f=>{const a=get(f);N[f]=ranked.map(r=>1-pctRank(a,r[f]??0));});
  const raw=ranked.map((r,i)=>
    W.net_vol*N.net_vol[i]+W.nsli*N.nsli[i]+W.net_iss*N.net_iss[i]+
    W.otd*N.otd_pct[i]+W.std*N.std_pct[i]+W.close*N.close_rate[i]+
    W.cancel*N.cancel_rate[i]+W.hold*N.hold_rate[i]+W.crdecl*N.crdecl_rate[i]+
    W.gross*N.gross_iss[i]
  );
  const adj=raw.map((s,i)=>(s*.75+.5*.25)*CONF(ranked[i].demo));
  const adjPct=adj.map(v=>pctRank(adj,v));
  const ws=ranked.map((r,i)=>({...r,_adj:adj[i],_pct:adjPct[i]}));
  ws.sort((a,b)=>b._adj-a._adj);
  const result=ws.map((r,i)=>{
    const pct=r._pct,tier=TIERS.find(t=>pct>=t.min)?.label??"🔴 Low";
    return{...r,score:+r._adj.toFixed(4),pct:+pct.toFixed(4),tier,rank:i+1};
  });
  const excl=reps.filter(r=>CONF(r.demo)===0).map(r=>({...r,score:0,pct:0,tier:"⛔ Excluded",rank:"-"}));
  return[...result,...excl];
}

// ─── CSV PARSER ───────────────────────────────────────────────────────────────
function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const headers=lines[0].split(",").map(h=>h.replace(/"/g,"").trim());
  return lines.slice(1).map(line=>{
    const vals=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;}else if(c===","&&!inQ){vals.push(cur);cur="";}else{cur+=c;}
    }
    vals.push(cur);
    const obj={};headers.forEach((h,i)=>{obj[h]=(vals[i]||"").trim();});
    return obj;
  });
}

function processCSV(text,win){
  const rows=parseCSV(text);
  const repRows=rows.filter(r=>r.Grouper&&r.Grouper.trim()!=="");
  if(!repRows.length)throw new Error("No rep rows found");
  const meta=rows[0]||{};
  const date_range=meta.SDate&&meta.EDate?`${meta.SDate} — ${meta.EDate}`:"";
  const n=v=>{const x=parseFloat(v);return isNaN(x)?0:x;};
  const reps=repRows.map(r=>{
    const otd_cnt=n(r.NumSale),demo=n(r.NumSat),gross_iss=n(r.NumIssued);
    const net_iss=n(r.NumNetIssued),close_vol=n(r.GSA),net_vol=n(r.NSA);
    const nsli=n(r.NSLI),cancel_cnt=n(r.NumCancelled),hold_cnt=n(r.NumHold);
    const crdecline_cnt=n(r.NumCD),working_cnt=n(r.NumWorking);
    const cancel_vol=n(r.GSACancelled),hold_vol=n(r.GSAHold),crdecline_vol=n(r.GSACD),working_vol=n(r.GSAWorking);
    const num_net=n(r.NumNet);
    const jsc=[1,2,3,4,5,6].map(i=>({cnt:n(r[`NumJSC${i}`]),vol:n(r[`GSAJSC${i}`]),label:r[`jbs${i}`]||`Type ${i}`}));
    const avg_deal=otd_cnt>0?close_vol/otd_cnt:0;
    const close_rate=demo>0?otd_cnt/demo:0;
    const cancel_rate=otd_cnt>0?cancel_cnt/otd_cnt:0;
    const hold_rate=otd_cnt>0?hold_cnt/otd_cnt:0;
    const crdecl_rate=otd_cnt>0?crdecline_cnt/otd_cnt:0;
    // Weighted fallout: Cancels 65% · Holds 25% · CrDeclines 10%
    const raw_fallout_rate=otd_cnt>0?(cancel_cnt+hold_cnt+crdecline_cnt)/otd_cnt:0;
    const fallout_rate=otd_cnt>0?(cancel_cnt*0.65+hold_cnt*0.25+crdecline_cnt*0.10)/otd_cnt:0;
    const net_issue_rate=otd_cnt>0?num_net/otd_cnt:0;
    return{
      rep:r.Grouper.trim(),gross_iss,net_iss,demo,otd_cnt,num_net,
      otd_pct:n(r.OTDPct),std_pct:n(r.STDPct),close_rate,
      close_vol,avg_deal,net_vol,nsli,
      cancel_cnt,cancel_vol,cancel_rate,
      hold_cnt,hold_vol,hold_rate,
      crdecline_cnt,crdecline_vol,crdecl_rate,
      fallout_rate,net_issue_rate,
      working_cnt,working_vol,jsc,
    };
  });
  return{reps:scoreReps(reps),date_range,updated:new Date().toISOString(),win,
    sdate:meta.SDate||"",edate:meta.EDate||""};
}

// ─── FORMATTERS ──────────────────────────────────────────────────────────────
const f$=v=>v==null?"—":"$"+Math.round(v).toLocaleString();
const fP=v=>v==null?"—":(v*100).toFixed(1)+"%";
const fN=v=>v==null?"—":v;
const fK=v=>v==null?"—":"$"+Math.round(v/1000)+"k";
const gapPts=r=>r.otd_pct!=null&&r.std_pct!=null?Math.round((r.otd_pct-r.std_pct)*100):null;
const gapInfo=pts=>{
  if(pts===null)return{label:"—",color:"#64748b",badge:""};
  if(pts>=20)return{label:`+${pts}pp`,color:"#ef4444",badge:"🚨"};
  if(pts>=12)return{label:`+${pts}pp`,color:"#f97316",badge:"⚠"};
  if(pts>=6) return{label:`+${pts}pp`,color:"#facc15",badge:"👀"};
  return{label:pts<0?`${pts}pp`:`+${pts}pp`,color:"#4ade80",badge:"✓"};
};

// ─── LETTER GRADE ────────────────────────────────────────────────────────────
function letterGrade(val,benchmark,higherBetter=true){
  if(val==null||isNaN(val)||!benchmark)return{grade:"N/A",color:"#64748b"};
  const ratio=higherBetter?val/benchmark:benchmark/val;
  if(ratio>=1.20)return{grade:"A+",color:"#4ade80"};
  if(ratio>=1.05)return{grade:"A", color:"#4ade80"};
  if(ratio>=0.88)return{grade:"B", color:"#86efac"};
  if(ratio>=0.72)return{grade:"C", color:"#facc15"};
  if(ratio>=0.55)return{grade:"D", color:"#f97316"};
  return{grade:"F",color:"#ef4444"};
}

// ─── MINI BAR ────────────────────────────────────────────────────────────────
function MiniBar({value,teamAvg,max,color,label,fmt}){
  const rW=max>0?Math.min(100,(value/max)*100):0;
  const aW=max>0?Math.min(100,(teamAvg/max)*100):0;
  return(
    <div style={{marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#94a3b8",marginBottom:2}}>
        <span>{label}</span><span style={{color}}>{fmt?fmt(value):value}</span>
      </div>
      <div style={{position:"relative",height:6,background:"#1e2a3a",borderRadius:3}}>
        <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${rW}%`,background:color,borderRadius:3}}/>
        <div style={{position:"absolute",top:-2,left:`${aW}%`,width:2,height:10,background:"#475569",borderRadius:1}}/>
      </div>
      <div style={{fontSize:9,color:"#334155",marginTop:1}}>avg: {fmt?fmt(teamAvg):teamAvg}</div>
    </div>
  );
}

// ─── DONUT ───────────────────────────────────────────────────────────────────
function Donut({value,max,color,label,size=64}){
  const pct=max>0?Math.min(1,value/max):0;
  const r=24,cx=32,cy=32,circ=2*Math.PI*r;
  return(
    <div style={{textAlign:"center"}}>
      <svg width={size} height={size} viewBox="0 0 64 64">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#1e2a3a" strokeWidth={6}/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={6}
          strokeDasharray={`${pct*circ} ${circ*(1-pct)}`} strokeLinecap="round"
          transform={`rotate(-90 ${cx} ${cy})`}/>
        <text x={cx} y={cy+4} textAnchor="middle" fill="#f1f5f9" fontSize={11} fontWeight={700}>
          {(pct*100).toFixed(0)}%
        </text>
      </svg>
      <div style={{fontSize:9,color:"#64748b",marginTop:1}}>{label}</div>
    </div>
  );
}

// ─── TREND ARROW ROW ────────────────────────────────────────────────────────
function TrendRow({r30Val,ytdVal,higherBetter,fmt,label}){
  if(r30Val==null||ytdVal==null)return null;
  const sig=signal(r30Val,ytdVal,higherBetter);
  const delta=r30Val-ytdVal;
  const pctChg=ytdVal!==0?(Math.abs(delta)/Math.abs(ytdVal)*100).toFixed(1):null;
  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
      padding:"5px 10px",background:"#080c14",borderRadius:6,marginBottom:4}}>
      <span style={{fontSize:11,color:"#64748b",minWidth:80}}>{label}</span>
      <div style={{display:"flex",alignItems:"center",gap:6,flex:1,justifyContent:"flex-end"}}>
        <span style={{fontSize:10,color:"#334155"}}>YTD: {fmt?fmt(ytdVal):ytdVal}</span>
        <span style={{fontSize:12,color:sig.color,fontWeight:800}}>{sig.icon}</span>
        <span style={{fontSize:11,color:sig.color,fontWeight:700}}>R30: {fmt?fmt(r30Val):r30Val}</span>
        {pctChg&&<span style={{fontSize:9,color:sig.color,opacity:.7}}>({pctChg}%)</span>}
      </div>
    </div>
  );
}

// ─── TIER LINE CHART ────────────────────────────────────────────────────────
function TierLineChart({rep,r30Data,ytdData}){
  const tierLines=useMemo(()=>{
    const seen=new Set(); const deduped=[];
    for(const r of (r30Data?.reps||[]).filter(x=>x.tier!=="⛔ Excluded")){seen.add(r.rep);deduped.push(r);}
    for(const r of (ytdData?.reps||[]).filter(x=>x.tier!=="⛔ Excluded")){if(!seen.has(r.rep))deduped.push(r);}
    const TIER_ORDER=["🥇 Elite","🥈 Strong","🥉 Average","⚠ Below Avg","🔴 Low"];
    const avg=(reps,f)=>{const v=reps.map(r=>r[f]??0).filter(x=>x>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;};
    return TIER_ORDER.map(tier=>{
      const reps=deduped.filter(r=>r.tier===tier);
      if(!reps.length)return null;
      return{label:tier,color:TC[tier],count:reps.length,
        std:avg(reps,"std_pct"),otd:avg(reps,"otd_pct"),nir:avg(reps,"net_issue_rate"),
        fallout:avg(reps,"fallout_rate"),avg_deal:avg(reps,"avg_deal"),net_vol:avg(reps,"net_vol")};
    }).filter(Boolean);
  },[r30Data,ytdData]);

  const allReps=[...(r30Data?.reps||[]),...(ytdData?.reps||[])];
  const METRICS=[
    {key:"std",repKey:"std_pct",label:"STD%",max:.80,fmt:v=>fP(v)},
    {key:"otd",repKey:"otd_pct",label:"OTD%",max:.70,fmt:v=>fP(v)},
    {key:"nir",repKey:"net_issue_rate",label:"NetStk%",max:1.0,fmt:v=>fP(v)},
    {key:"fallout",repKey:"fallout_rate",label:"Fallout%",max:1.0,fmt:v=>fP(v),invert:true},
    {key:"avg_deal",repKey:"avg_deal",label:"Avg Deal",max:Math.max(...allReps.map(r=>r.avg_deal||0))*1.1||60000,fmt:v=>fK(v)},
    {key:"net_vol",repKey:"net_vol",label:"Net Vol",max:Math.max(...allReps.map(r=>r.net_vol||0))*1.1||600000,fmt:v=>fK(v)},
  ];
  const W2=580,H=280,PAD={top:36,right:132,bottom:50,left:48};
  const chartW=W2-PAD.left-PAD.right,chartH=H-PAD.top-PAD.bottom;
  const nM=METRICS.length;
  const xStep=chartW/(nM-1);
  const norm=(v,m)=>{const r=Math.min(1,Math.max(0,v/m.max));return m.invert?1-r:r;};
  const yPx=v=>PAD.top+chartH*(1-v);
  const xPx=i=>PAD.left+i*xStep;
  const path=vals=>vals.map((v,i)=>`${i===0?"M":"L"}${xPx(i).toFixed(1)},${yPx(norm(v,METRICS[i])).toFixed(1)}`).join(" ");
  const repVals=METRICS.map(m=>rep[m.repKey]??0);
  if(!tierLines.length)return null;
  return(
    <div style={{marginTop:18,background:"#080c14",borderRadius:10,padding:14}}>
      <div style={{fontSize:11,color:"#334155",letterSpacing:".07em",marginBottom:2}}>PERFORMANCE vs TIER BASELINES — live from uploaded data</div>
      <div style={{fontSize:10,color:"#1e3a5f",marginBottom:10}}>Tier averages computed from all reps · Fallout% inverted — higher = better</div>
      <div style={{overflowX:"auto"}}>
        <svg width={W2} height={H} style={{display:"block",minWidth:W2}}>
          {[0,.25,.5,.75,1].map(v=>(
            <g key={v}>
              <line x1={PAD.left} y1={yPx(v)} x2={PAD.left+chartW} y2={yPx(v)} stroke="#1e2a3a" strokeWidth={1} strokeDasharray="3,3"/>
              <text x={PAD.left-5} y={yPx(v)+4} textAnchor="end" fill="#334155" fontSize={9}>{(v*100).toFixed(0)}%</text>
            </g>
          ))}
          {METRICS.map((_,i)=>(
            <line key={i} x1={xPx(i)} y1={PAD.top} x2={xPx(i)} y2={PAD.top+chartH} stroke="#1e2a3a" strokeWidth={1} strokeDasharray="2,4"/>
          ))}
          {tierLines.map(tier=>{
            const vals=METRICS.map(m=>tier[m.key]??0);
            return(
              <g key={tier.label}>
                <path d={path(vals)} fill="none" stroke={tier.color} strokeWidth={1.5} strokeOpacity={.55} strokeDasharray="5,3"/>
                {vals.map((v,i)=><circle key={i} cx={xPx(i)} cy={yPx(norm(v,METRICS[i]))} r={2.5} fill={tier.color} opacity={.65}/>)}
              </g>
            );
          })}
          <path d={path(repVals)} fill="none" stroke="#38bdf8" strokeWidth={3}/>
          {repVals.map((v,i)=>(
            <g key={i}>
              <circle cx={xPx(i)} cy={yPx(norm(v,METRICS[i]))} r={5} fill="#38bdf8" stroke="#080c14" strokeWidth={2}/>
              <text x={xPx(i)} y={yPx(norm(v,METRICS[i]))-9} textAnchor="middle" fill="#38bdf8" fontSize={9} fontWeight={700}>{METRICS[i].fmt(v)}</text>
            </g>
          ))}
          {METRICS.map((m,i)=>(
            <text key={i} x={xPx(i)} y={H-PAD.bottom+16} textAnchor="middle" fill="#64748b" fontSize={10}>{m.label}</text>
          ))}
          <g transform={`translate(${W2-PAD.right+8},${PAD.top})`}>
            <line x1={0} y1={6} x2={16} y2={6} stroke="#38bdf8" strokeWidth={3}/>
            <text x={20} y={10} fill="#38bdf8" fontSize={9} fontWeight={700}>This Rep</text>
            {tierLines.map((t,i)=>(
              <g key={i} transform={`translate(0,${(i+1)*17})`}>
                <line x1={0} y1={6} x2={16} y2={6} stroke={t.color} strokeWidth={1.5} strokeDasharray="5,3" opacity={.8}/>
                <text x={20} y={10} fill={t.color} fontSize={9}>{t.label} ({t.count})</text>
              </g>
            ))}
          </g>
        </svg>
      </div>
    </div>
  );
}

// ─── HISTORY SPARKLINE ───────────────────────────────────────────────────────
function Sparkline({points,color="#38bdf8",width=120,height=32}){
  if(!points||points.length<2)return<span style={{color:"#334155",fontSize:10}}>—</span>;
  const vals=points.map(p=>p.v);
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const range=mx-mn||1;
  const xS=(width-4)/(points.length-1);
  const yP=v=>height-4-((v-mn)/range)*(height-8);
  const d=points.map((p,i)=>`${i===0?"M":"L"}${2+i*xS},${yP(p.v)}`).join(" ");
  const last=points[points.length-1];
  const prev=points[points.length-2];
  const up=last.v>=prev.v;
  return(
    <svg width={width} height={height}>
      <path d={d} fill="none" stroke={color} strokeWidth={1.5} opacity={.8}/>
      <circle cx={2+(points.length-1)*xS} cy={yP(last.v)} r={3} fill={up?"#4ade80":"#f87171"}/>
    </svg>
  );
}

// ─── SCORECARD OVERLAY ────────────────────────────────────────────────────────
function Scorecard({rep,r30Data,ytdData,history,onClose,teamAvgs,markets={}}){
  const r30R=r30Data?.reps?.find(x=>x.rep===rep);
  const ytdR=ytdData?.reps?.find(x=>x.rep===rep);
  const r=r30R||ytdR;
  if(!r)return null;
  const tc=TC[r.tier]??"#64748b";

  // Build benchmarks from COMPANY-WIDE average (all active reps)
  const seen=new Set();const deduped=[];
  for(const x of (r30Data?.reps||[]).filter(x=>x.tier!=="⛔ Excluded")){seen.add(x.rep);deduped.push(x);}
  for(const x of (ytdData?.reps||[]).filter(x=>x.tier!=="⛔ Excluded")){if(!seen.has(x.rep))deduped.push(x);}
  const companyAvg=f=>deduped.length?deduped.map(x=>x[f]??0).reduce((a,b)=>a+b,0)/deduped.length:0;
  const bench={std:companyAvg("std_pct"),net_vol:companyAvg("net_vol"),fallout:companyAvg("fallout_rate"),avg_deal:companyAvg("avg_deal"),nir:companyAvg("net_issue_rate")};

  const grades={
    output:  letterGrade(r.net_vol,bench.net_vol,true),
    efficiency:letterGrade(r.std_pct,bench.std,true),
    fallout: letterGrade(r.fallout_rate,bench.fallout,false),
    dealSize:letterGrade(r.avg_deal,bench.avg_deal,true),
    quality: letterGrade(r.net_issue_rate,bench.nir,true),
  };

  // History for this rep
  const repHistory=history.filter(h=>h.win==="r30")
    .map(h=>{const found=h.reps?.find(x=>x.rep===rep);return found?{date:h.sdate||h.updated,rep:found}:null;})
    .filter(Boolean)
    .sort((a,b)=>new Date(a.date)-new Date(b.date));

  return(
    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}}
      style={{position:"fixed",inset:0,background:"rgba(0,0,0,.87)",zIndex:200,
        overflowY:"auto",padding:"12px 8px"}}>
      <div style={{background:"#0d1120",border:"1px solid #1e2a3a",borderRadius:12,
        width:"100%",maxWidth:860,margin:"0 auto",animation:"slideIn .2s ease",padding:"16px 20px",
        position:"relative"}}>

        {/* Header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:800,fontSize:17,color:"#f1f5f9",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{rep}</div>
            <div style={{display:"flex",gap:8,marginTop:3,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{color:tc,fontWeight:700,fontSize:12}}>{r.tier}</span>
              <span style={{color:"#1e2a3a"}}>·</span>
              <span style={{color:"#94a3b8",fontSize:12}}>Rank #{r.rank}</span>
              <span style={{color:"#1e2a3a"}}>·</span>
              <span style={{color:"#38bdf8",fontWeight:700,fontSize:12}}>Score {r.score?.toFixed(4)}</span>
              {markets[rep]&&<span style={{color:"#f59e0b",fontWeight:600,fontSize:11,
                background:"rgba(245,158,11,.1)",padding:"1px 6px",borderRadius:4}}>🗺 {markets[rep]}</span>}
              <span style={{color:"#334155",fontSize:11}}>vs company avg ({deduped.length} reps)</span>
            </div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,.06)",border:"1px solid #1e2a3a",
            color:"#e2e8f0",cursor:"pointer",fontSize:14,borderRadius:6,
            padding:"4px 10px",fontWeight:700,marginLeft:12,flexShrink:0}}>✕ Close</button>
        </div>

        {/* Grades */}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:"#334155",letterSpacing:".07em",marginBottom:6}}>CATEGORY GRADES vs COMPANY AVERAGE</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
            {[["Output",grades.output,"Net Vol"],["Efficiency",grades.efficiency,"STD%"],
              ["Fallout",grades.fallout,"Fallout%"],["Deal Size",grades.dealSize,"Avg Deal"],
              ["Quality",grades.quality,"NetStk%"]].map(([cat,g,sub])=>(
              <div key={cat} style={{background:"#080c14",borderRadius:8,padding:"8px 6px",textAlign:"center",border:`1px solid ${g.color}22`}}>
                <div style={{fontSize:22,fontWeight:900,color:g.color,lineHeight:1}}>{g.grade}</div>
                <div style={{fontSize:10,color:"#94a3b8",marginTop:2,fontWeight:600}}>{cat}</div>
                <div style={{fontSize:9,color:"#334155",marginTop:1}}>{sub}</div>
              </div>
            ))}
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          {/* Bar charts */}
          <div style={{background:"#080c14",borderRadius:8,padding:12}}>
            <div style={{fontSize:10,color:"#334155",letterSpacing:".07em",marginBottom:8}}>VS TEAM AVERAGE</div>
            <MiniBar value={r.net_vol} teamAvg={teamAvgs.net_vol} max={teamAvgs.net_vol*3} color="#38bdf8" label="Net Volume" fmt={f$}/>
            <MiniBar value={r.std_pct} teamAvg={teamAvgs.std_pct} max={1} color="#6366f1" label="STD%" fmt={fP}/>
            <MiniBar value={r.avg_deal} teamAvg={teamAvgs.avg_deal} max={teamAvgs.avg_deal*2.5} color="#f59e0b" label="Avg Deal" fmt={f$}/>
            <MiniBar value={r.net_issue_rate} teamAvg={teamAvgs.net_issue_rate} max={1} color="#4ade80" label="NetStk% (closes→net)" fmt={fP}/>
            <MiniBar value={1-r.fallout_rate} teamAvg={1-teamAvgs.fallout_rate} max={1} color="#a78bfa" label="Clean Rate (wtd fallout)" fmt={fP}/>
          </div>
          {/* Donuts */}
          <div style={{background:"#080c14",borderRadius:8,padding:12}}>
            <div style={{fontSize:10,color:"#334155",letterSpacing:".07em",marginBottom:8}}>KEY RATES</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
              <Donut value={r.std_pct} max={.8} color="#6366f1" label="STD%"/>
              <Donut value={r.otd_pct} max={.7} color="#38bdf8" label="OTD%"/>
              <Donut value={r.net_issue_rate} max={1} color="#4ade80" label="NetStk%"/>
              <Donut value={r.cancel_rate} max={.5} color="#ef4444" label="Cancel%"/>
              <Donut value={r.hold_rate} max={.5} color="#f97316" label="Hold%"/>
              <Donut value={r.crdecl_rate} max={.3} color="#f59e0b" label="CrDecl%"/>
            </div>
          </div>
        </div>

        {/* R30 vs YTD Trends */}
        {r30R&&ytdR&&(
          <div style={{background:"#080c14",borderRadius:8,padding:12,marginBottom:10}}>
            <div style={{fontSize:10,color:"#334155",letterSpacing:".07em",marginBottom:8}}>R30 vs YTD TREND</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
              <TrendRow r30Val={r30R.net_vol} ytdVal={ytdR.net_vol} higherBetter={true} fmt={f$} label="Net Volume"/>
              <TrendRow r30Val={r30R.std_pct} ytdVal={ytdR.std_pct} higherBetter={true} fmt={fP} label="STD%"/>
              <TrendRow r30Val={r30R.otd_pct} ytdVal={ytdR.otd_pct} higherBetter={true} fmt={fP} label="OTD%"/>
              <TrendRow r30Val={r30R.avg_deal} ytdVal={ytdR.avg_deal} higherBetter={true} fmt={f$} label="Avg Deal"/>
              <TrendRow r30Val={r30R.fallout_rate} ytdVal={ytdR.fallout_rate} higherBetter={false} fmt={fP} label="Fallout%"/>
              <TrendRow r30Val={r30R.net_issue_rate} ytdVal={ytdR.net_issue_rate} higherBetter={true} fmt={fP} label="NetStk%"/>
              <TrendRow r30Val={gapPts(r30R)} ytdVal={gapPts(ytdR)} higherBetter={false} fmt={v=>`${v}pp`} label="OTD↔STD Gap"/>
              <TrendRow r30Val={r30R.score} ytdVal={ytdR.score} higherBetter={true} fmt={v=>v?.toFixed(4)} label="Overall Score"/>
            </div>
          </div>
        )}

        {/* Historical sparklines */}
        {repHistory.length>=2&&(
          <div style={{background:"#080c14",borderRadius:10,padding:14,marginBottom:16}}>
            <div style={{fontSize:10,color:"#334155",letterSpacing:".07em",marginBottom:10}}>
              HISTORICAL TREND — {repHistory.length} snapshots
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
              {[
                {label:"STD%",key:"std_pct",fmt:fP,color:"#6366f1"},
                {label:"Net Vol",key:"net_vol",fmt:fK,color:"#38bdf8"},
                {label:"Fallout%",key:"fallout_rate",fmt:fP,color:"#f97316"},
                {label:"Avg Deal",key:"avg_deal",fmt:fK,color:"#f59e0b"},
              ].map(m=>{
                const pts=repHistory.map(h=>({date:h.date,v:h.rep[m.key]??0}));
                const first=pts[0].v,last=pts[pts.length-1].v;
                const up=last>=first;
                return(
                  <div key={m.key} style={{background:"#0d1120",borderRadius:7,padding:"10px 12px",border:"1px solid #1e2a3a"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <span style={{fontSize:10,color:"#64748b"}}>{m.label}</span>
                      <span style={{fontSize:11,color:up?"#4ade80":"#f87171",fontWeight:700}}>
                        {m.fmt(last)} {up?"↑":"↓"}
                      </span>
                    </div>
                    <Sparkline points={pts} color={m.color} width={140} height={30}/>
                    <div style={{fontSize:9,color:"#334155",marginTop:3}}>
                      {repHistory[0].date} → {repHistory[repHistory.length-1].date}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Tier line chart */}
        <TierLineChart rep={r} r30Data={r30Data} ytdData={ytdData}/>

        {/* Full stats */}
        <div style={{marginTop:10}}>
          <div style={{fontSize:10,color:"#334155",letterSpacing:".07em",marginBottom:6}}>FULL STATS ({r30R?"R30":"YTD"})</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:5}}>
            {[["Demos Sat",fN(r.demo)],["Gross Iss",fN(r.gross_iss)],["OTD Closes",fN(r.otd_cnt)],
              ["Net Closes",fN(r.num_net)],["NetStk%",fP(r.net_issue_rate)],["Close Vol",f$(r.close_vol)],
              ["Net Vol",f$(r.net_vol)],["Avg Deal",f$(r.avg_deal)],["NSLI/NCP",f$(r.nsli)],
              ["Cancels",fN(r.cancel_cnt)],["Holds",fN(r.hold_cnt)],["Cr Declines",fN(r.crdecline_cnt)],
              ["Working",fN(r.working_cnt)]].map(([l,v])=>(
              <div key={l} style={{background:"#080c14",borderRadius:6,padding:"6px 9px",border:"1px solid #1e2a3a"}}>
                <div style={{fontSize:9,color:"#334155",marginBottom:1}}>{l}</div>
                <div style={{fontWeight:700,color:"#e2e8f0",fontSize:12}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── TRENDS TAB ──────────────────────────────────────────────────────────────
function TrendsTab({r30Data,ytdData,history,onOpenScorecard}){
  const [sortTrend,setSortTrend]=useState({f:"composite",d:"desc"});

  // Build trend rows — compare R30 vs YTD for each rep
  const trendRows=useMemo(()=>{
    if(!r30Data||!ytdData)return[];
    const rows=[];
    for(const r30R of r30Data.reps.filter(r=>r.tier!=="⛔ Excluded"&&r.demo>=3)){
      const ytdR=ytdData.reps.find(x=>x.rep===r30R.rep);
      if(!ytdR)continue;
      const sigs={};
      let composite=0;
      for(const m of SIGNAL_METRICS){
        const r30v=m.key==="_gap"?gapPts(r30R):r30R[m.key];
        const ytdv=m.key==="_gap"?gapPts(ytdR):ytdR[m.key];
        const sig=signal(r30v,ytdv,m.higherBetter);
        sigs[m.key]={...sig,r30:r30v,ytd:ytdv};
        composite+=sig.s;
      }
      const rankDelta=(ytdR.rank==="-"||r30R.rank==="-")?null:ytdR.rank-r30R.rank;
      rows.push({rep:r30R.rep,tier:r30R.tier,r30R,ytdR,sigs,composite,rankDelta});
    }
    rows.sort((a,b)=>b.composite-a.composite);
    return rows;
  },[r30Data,ytdData]);

  // Historical trend across snapshots
  const historyRows=useMemo(()=>{
    const r30Snaps=history.filter(h=>h.win==="r30").sort((a,b)=>new Date(a.sdate||a.updated)-new Date(b.sdate||b.updated));
    if(r30Snaps.length<2)return[];
    const repNames=new Set(r30Snaps.flatMap(s=>s.reps?.map(r=>r.rep)||[]));
    const rows=[];
    for(const name of repNames){
      const pts=r30Snaps.map(s=>{
        const r=s.reps?.find(x=>x.rep===name);
        return r?{date:s.sdate||s.updated,std:r.std_pct,net_vol:r.net_vol,score:r.score,fallout:r.fallout_rate}:null;
      }).filter(Boolean);
      if(pts.length<2)continue;
      const first=pts[0],last=pts[pts.length-1];
      const stdDelta=last.std-first.std;
      const volDelta=last.net_vol-first.net_vol;
      rows.push({rep:name,pts,first,last,stdDelta,volDelta,snapCount:pts.length});
    }
    rows.sort((a,b)=>b.stdDelta-a.stdDelta);
    return rows;
  },[history]);

  const compositeLabel=c=>{
    if(c>=8) return{text:"🔥 On Fire",    color:"#4ade80"};
    if(c>=4) return{text:"📈 Heating Up", color:"#86efac"};
    if(c>=1) return{text:"↗ Improving",   color:"#94a3b8"};
    if(c===0)return{text:"➡ Stable",      color:"#64748b"};
    if(c>=-3)return{text:"↘ Softening",   color:"#f97316"};
    if(c>=-6)return{text:"📉 Slipping",   color:"#fb923c"};
    return{label:"❄ Cooling Off",color:"#38bdf8"};
  };

  const top5=trendRows.slice(0,5);
  const bot5=[...trendRows].reverse().slice(0,5);

  if(!r30Data||!ytdData){
    return(
      <div style={{padding:"20px",color:"#334155",fontSize:13}}>
        Upload both R30 and YTD data to see trend analysis.
      </div>
    );
  }

  return(
    <div style={{padding:"16px 20px"}}>
      {/* Biggest Movers */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:24}}>
        {/* Heating Up */}
        <div style={{background:"#0d1120",border:"1px solid #1e2a3a",borderRadius:10,padding:16}}>
          <div style={{fontWeight:700,fontSize:13,color:"#4ade80",marginBottom:12}}>🔥 HEATING UP — Top 5</div>
          {top5.map((r,i)=>{
            const cl=compositeLabel(r.composite);
            return(
              <div key={r.rep} onClick={()=>onOpenScorecard(r.rep)}
                style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",
                  borderRadius:7,cursor:"pointer",marginBottom:5,
                  background:i%2===0?"#080c14":"#0a0f1a"}}>
                <span style={{fontSize:18,minWidth:24}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":"  "}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13,color:"#f1f5f9"}}>{r.rep}</div>
                  <div style={{fontSize:11,color:TC[r.tier]??"#64748b"}}>{r.tier}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:cl.color,fontWeight:700,fontSize:12}}>{cl.text}</div>
                  <div style={{fontSize:10,color:"#334155"}}>Score: {r.composite>0?"+":""}{r.composite}</div>
                </div>
                {r.rankDelta!=null&&(
                  <div style={{color:r.rankDelta>0?"#4ade80":r.rankDelta<0?"#f87171":"#64748b",
                    fontWeight:700,fontSize:12,minWidth:36,textAlign:"right"}}>
                    {r.rankDelta>0?`▲${r.rankDelta}`:r.rankDelta<0?`▼${Math.abs(r.rankDelta)}`:"—"}
                  </div>
                )}
              </div>
            );
          })}
        </div>
        {/* Cooling Off */}
        <div style={{background:"#0d1120",border:"1px solid #1e2a3a",borderRadius:10,padding:16}}>
          <div style={{fontWeight:700,fontSize:13,color:"#38bdf8",marginBottom:12}}>❄ COOLING OFF — Bottom 5</div>
          {bot5.map((r,i)=>{
            const cl=compositeLabel(r.composite);
            return(
              <div key={r.rep} onClick={()=>onOpenScorecard(r.rep)}
                style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",
                  borderRadius:7,cursor:"pointer",marginBottom:5,
                  background:i%2===0?"#080c14":"#0a0f1a"}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:13,color:"#f1f5f9"}}>{r.rep}</div>
                  <div style={{fontSize:11,color:TC[r.tier]??"#64748b"}}>{r.tier}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:cl.color,fontWeight:700,fontSize:12}}>{cl.text}</div>
                  <div style={{fontSize:10,color:"#334155"}}>Score: {r.composite>0?"+":""}{r.composite}</div>
                </div>
                {r.rankDelta!=null&&(
                  <div style={{color:r.rankDelta>0?"#4ade80":r.rankDelta<0?"#f87171":"#64748b",
                    fontWeight:700,fontSize:12,minWidth:36,textAlign:"right"}}>
                    {r.rankDelta>0?`▲${r.rankDelta}`:r.rankDelta<0?`▼${Math.abs(r.rankDelta)}`:"—"}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* Historical sparklines (only if 2+ snapshots) */}
      {historyRows.length>0&&(
        <div style={{marginBottom:24}}>
          <div style={{fontWeight:700,fontSize:13,color:"#a78bfa",marginBottom:12}}>
            📈 HISTORICAL TRAJECTORY — {history.filter(h=>h.win==="r30").length} R30 Snapshots
          </div>
          <div style={{overflowX:"auto",borderRadius:10,border:"1px solid #1e2a3a"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead>
                <tr style={{background:"#0d1120"}}>
                  {["Rep","Tier","STD% Trend","Net Vol Trend","Score Trend","Snapshots","STD% Δ","Net Vol Δ"].map(l=>(
                    <th key={l} style={thS}>{l}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {historyRows.slice(0,20).map((r,i)=>(
                  <tr key={r.rep} onClick={()=>onOpenScorecard(r.rep)}
                    style={{background:i%2===0?"#080c14":"#0a0f1a",cursor:"pointer"}}>
                    <td style={{...tdS,fontWeight:600,color:"#f1f5f9",whiteSpace:"nowrap"}}>{r.rep}</td>
                    <td style={tdS}>
                      <span style={{fontSize:10,fontWeight:600,color:TC[r30Data.reps.find(x=>x.rep===r.rep)?.tier]??"#64748b"}}>
                        {r30Data.reps.find(x=>x.rep===r.rep)?.tier??"—"}
                      </span>
                    </td>
                    <td style={tdS}><Sparkline points={r.pts.map(p=>({v:p.std}))} color="#6366f1" width={100}/></td>
                    <td style={tdS}><Sparkline points={r.pts.map(p=>({v:p.net_vol}))} color="#38bdf8" width={100}/></td>
                    <td style={tdS}><Sparkline points={r.pts.map(p=>({v:p.score}))} color="#f59e0b" width={100}/></td>
                    <td style={{...tdS,textAlign:"center"}}>{r.snapCount}</td>
                    <td style={{...tdS,color:r.stdDelta>0?"#4ade80":"#f87171",fontWeight:700}}>
                      {r.stdDelta>0?"+":""}{(r.stdDelta*100).toFixed(1)}pp
                    </td>
                    <td style={{...tdS,color:r.volDelta>0?"#4ade80":"#f87171",fontWeight:700}}>
                      {r.volDelta>0?"+":""}{f$(r.volDelta)}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Full trend table */}
      <div>
        <div style={{fontWeight:700,fontSize:13,color:"#e2e8f0",marginBottom:12}}>
          📊 FULL TREND TABLE — {trendRows.length} reps · Sorted hottest → coldest · Click rep for scorecard
        </div>
        <div style={{overflowX:"auto",borderRadius:10,border:"1px solid #1e2a3a"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{background:"#0d1120"}}>
                <th style={thS}>Rep</th>
                <th style={thS}>Tier</th>
                <th style={{...thS,color:"#94a3b8"}}>Momentum</th>
                <th style={{...thS,color:"#94a3b8"}}>Score</th>
                <th style={{...thS,color:"#6366f1"}}>STD%</th>
                <th style={{...thS,color:"#38bdf8"}}>OTD%</th>
                <th style={{...thS,color:"#4ade80"}}>Net Vol</th>
                <th style={{...thS,color:"#f59e0b"}}>Avg Deal</th>
                <th style={{...thS,color:"#86efac"}}>NetStk%</th>
                <th style={{...thS,color:"#f97316"}}>Fallout%</th>
                <th style={{...thS,color:"#facc15"}}>OTD↔STD</th>
                <th style={{...thS,color:"#94a3b8"}}>Rank Δ</th>
              </tr>
            </thead>
            <tbody>
              {trendRows.map((row,i)=>{
                const cl=compositeLabel(row.composite);
                const SigCell=({mKey,fmt})=>{
                  const s=row.sigs[mKey];
                  if(!s)return<td style={tdS}>—</td>;
                  return(
                    <td style={tdS}>
                      <div style={{color:s.color,fontSize:11}}>
                        <span style={{opacity:.6,fontSize:10}}>{fmt?fmt(s.ytd):s.ytd} </span>
                        <span style={{fontWeight:700}}>{s.icon} {fmt?fmt(s.r30):s.r30}</span>
                      </div>
                    </td>
                  );
                };
                return(
                  <tr key={row.rep} onClick={()=>onOpenScorecard(row.rep)}
                    style={{background:i%2===0?"#080c14":"#0a0f1a",cursor:"pointer"}}>
                    <td style={{...tdS,fontWeight:600,color:"#f1f5f9",whiteSpace:"nowrap"}}>{row.rep}</td>
                    <td style={tdS}><span style={{color:TC[row.tier]??"#64748b",fontSize:10,fontWeight:600}}>{row.tier}</span></td>
                    <td style={tdS}><span style={{color:cl.color,fontWeight:700,fontSize:11}}>{cl.text}</span></td>
                    <td style={tdS}>
                      <div style={{fontSize:10}}>
                        <span style={{color:"#334155"}}>{row.ytdR.score?.toFixed(3)} </span>
                        <span style={{color:row.sigs.std_pct?.s>=0?"#4ade80":"#f87171",fontWeight:700}}>
                          → {row.r30R.score?.toFixed(3)}
                        </span>
                      </div>
                    </td>
                    <SigCell mKey="std_pct" fmt={fP}/>
                    <SigCell mKey="otd_pct" fmt={fP}/>
                    <SigCell mKey="net_vol" fmt={fK}/>
                    <SigCell mKey="avg_deal" fmt={fK}/>
                    <SigCell mKey="net_issue_rate" fmt={fP}/>
                    <SigCell mKey="fallout_rate" fmt={fP}/>
                    <SigCell mKey="_gap" fmt={v=>`${v}pp`}/>
                    <td style={tdS}>
                      {row.rankDelta!=null?(
                        <span style={{color:row.rankDelta>0?"#4ade80":row.rankDelta<0?"#f87171":"#64748b",fontWeight:700}}>
                          {row.rankDelta>0?`▲${row.rankDelta}`:row.rankDelta<0?`▼${Math.abs(row.rankDelta)}`:"—"}
                        </span>
                      ):"—"}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}



// ─── COMPARISON TOOL ─────────────────────────────────────────────────────────
function ComparisonTool({r30Data,ytdData,markets,marketList}){
  const [mode,setMode]=useState("rep"); // "rep" | "market"
  const [selectedReps,setSelectedReps]=useState([]);
  const [selectedMarkets,setSelectedMarkets]=useState([]);
  const [dataWin,setDataWin]=useState("r30");

  const srcData=dataWin==="r30"?r30Data:ytdData;
  const activeReps=useMemo(()=>
    (srcData?.reps||[]).filter(r=>r.tier!=="⛔ Excluded"&&markets[r.rep]!=="⛔ Terminated")
  ,[srcData,markets]);

  // Build market aggregates with volume-normalization
  const marketData=useMemo(()=>{
    if(!srcData||!marketList.length)return{};
    const result={};
    for(const mkt of marketList){
      const reps=activeReps.filter(r=>markets[r.rep]===mkt);
      if(!reps.length)continue;
      const sum=f=>reps.reduce((a,r)=>a+(r[f]??0),0);
      const avg=f=>sum(f)/reps.length;
      const totalGross=sum("gross_iss");
      const totalCloses=sum("otd_cnt");
      const totalNetVol=sum("net_vol");
      const totalCloseVol=sum("close_vol");
      const totalNetCloses=sum("num_net");
      const totalCancel=sum("cancel_cnt");
      const totalHold=sum("hold_cnt");
      const totalCrDecl=sum("crdecline_cnt");
      const totalNsli=sum("nsli");
      // Volume-normalized rates (per 100 gross issued — scales any market to same base)
      const per100=f=>totalGross>0?(sum(f)/totalGross)*100:0;
      result[mkt]={
        name:mkt, repCount:reps.length,
        // Totals
        totalGross, totalCloses, totalNetVol, totalCloseVol, totalNetCloses,
        totalCancel, totalHold, totalCrDecl, totalNsli,
        // Team rates (volume-weighted avg)
        otd_pct: totalGross>0?totalCloses/totalGross:0,
        std_pct: sum("demo")>0?totalCloses/sum("demo"):0,
        netstk_pct: totalCloses>0?totalNetCloses/totalCloses:0,
        fallout_rate: totalCloses>0?(totalCancel*0.65+totalHold*0.25+totalCrDecl*0.10)/totalCloses:0,
        avg_deal: totalCloses>0?totalCloseVol/totalCloses:0,
        avg_net_vol_per_rep: totalNetVol/reps.length,
        nsli_per_close: totalCloses>0?totalNsli/totalCloses:0,
        // Normalized per 100 gross issued (apples-to-apples scale)
        norm_net_vol: per100("net_vol"),
        norm_closes: totalGross>0?(totalCloses/totalGross)*100:0,
        norm_nsli: per100("nsli"),
        // Avg score
        avg_score: avg("score"),
        elite_pct: reps.filter(r=>r.tier==="🥇 Elite").length/reps.length,
        reps,
      };
    }
    return result;
  },[srcData,activeReps,markets,marketList]);

  const toggleRep=rep=>{
    setSelectedReps(prev=>
      prev.includes(rep)?prev.filter(r=>r!==rep):
      prev.length<4?[...prev,rep]:prev
    );
  };
  const toggleMarket=m=>{
    setSelectedMarkets(prev=>
      prev.includes(m)?prev.filter(x=>x!==m):
      prev.length<4?[...prev,m]:prev
    );
  };

  // Rep metrics to compare
  const REP_METRICS=[
    {key:"nsli",       label:"NSLI/NCP $",  fmt:v=>"$"+Math.round(v).toLocaleString(),  get:r=>r.nsli,         higherBetter:true},
    {key:"otd_pct",    label:"OTD%",         fmt:v=>(v*100).toFixed(1)+"%",               get:r=>r.otd_pct,      higherBetter:true},
    {key:"std_pct",    label:"STD%",         fmt:v=>(v*100).toFixed(1)+"%",               get:r=>r.std_pct,      higherBetter:true},
    {key:"net_issue_rate",label:"NetStk%",   fmt:v=>(v*100).toFixed(1)+"%",               get:r=>r.net_issue_rate,higherBetter:true, breakdown:true},
    {key:"net_vol",    label:"Net Volume",   fmt:v=>"$"+Math.round(v).toLocaleString(),   get:r=>r.net_vol,      higherBetter:true},
    {key:"avg_deal",   label:"Avg Deal",     fmt:v=>"$"+Math.round(v).toLocaleString(),   get:r=>r.avg_deal,     higherBetter:true},
    {key:"fallout_rate",label:"Wtd Fallout%",fmt:v=>(v*100).toFixed(1)+"%",              get:r=>r.fallout_rate, higherBetter:false},
    {key:"score",      label:"Overall Score",fmt:v=>v?.toFixed(4),                        get:r=>r.score,        higherBetter:true},
  ];

  // Market metrics to compare
  const MKT_METRICS=[
    {key:"totalNetVol",     label:"Total Net Vol",       fmt:v=>"$"+Math.round(v).toLocaleString(),   higherBetter:true},
    {key:"norm_net_vol",    label:"Net Vol per 100 Appts",fmt:v=>"$"+Math.round(v).toLocaleString(),  higherBetter:true,
      note:"Normalized — what this market would produce scaled to 100 gross issued appointments"},
    {key:"netstk_pct",      label:"NetStk%",              fmt:v=>(v*100).toFixed(1)+"%",              higherBetter:true,
      breakdown:true},
    {key:"otd_pct",         label:"OTD%",                 fmt:v=>(v*100).toFixed(1)+"%",              higherBetter:true},
    {key:"std_pct",         label:"STD%",                 fmt:v=>(v*100).toFixed(1)+"%",              higherBetter:true},
    {key:"fallout_rate",    label:"Wtd Fallout%",         fmt:v=>(v*100).toFixed(1)+"%",              higherBetter:false},
    {key:"avg_deal",        label:"Avg Deal Size",        fmt:v=>"$"+Math.round(v).toLocaleString(),  higherBetter:true},
    {key:"totalNsli",       label:"Total NSLI/NCP",       fmt:v=>"$"+Math.round(v).toLocaleString(),  higherBetter:true},
    {key:"nsli_per_close",  label:"NSLI per Close",       fmt:v=>"$"+Math.round(v).toLocaleString(),  higherBetter:true},
    {key:"avg_score",       label:"Avg Rep Score",        fmt:v=>v?.toFixed(4),                       higherBetter:true},
    {key:"elite_pct",       label:"Elite Rep %",          fmt:v=>(v*100).toFixed(0)+"%",              higherBetter:true},
    {key:"repCount",        label:"Active Reps",          fmt:v=>v,                                   higherBetter:false},
    {key:"totalGross",      label:"Total Gross Issued",   fmt:v=>v,                                   higherBetter:false,
      note:"Raw lead volume — context for all other metrics"},
  ];

  const COLORS=["#38bdf8","#f59e0b","#4ade80","#f87171"];

  const selectedItems=mode==="rep"?selectedReps:selectedMarkets;
  const metrics=mode==="rep"?REP_METRICS:MKT_METRICS;
  const getData=item=>mode==="rep"
    ?activeReps.find(r=>r.rep===item)
    :marketData[item];

  // Bar chart comparison component
  const CompBar=({values,fmt,higherBetter,label,note,breakdowns})=>{
    const nums=values.map(v=>typeof v==="number"?v:0);
    const maxV=Math.max(...nums,0.001);
    const best=higherBetter?Math.max(...nums):Math.min(...nums.filter(v=>v>0));
    return(
      <div style={{marginBottom:14,padding:"10px 14px",background:"#080c14",borderRadius:8}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
          <span style={{fontSize:12,color:"#94a3b8",fontWeight:600}}>{label}</span>
          {note&&<span style={{fontSize:9,color:"#334155",maxWidth:200,textAlign:"right"}}>{note}</span>}
        </div>
        {values.map((v,i)=>{
          if(v==null)return null;
          const pct=maxV>0?Math.max(4,(v/maxV)*100):4;
          const isBest=v===best&&v>0;
          const bd=breakdowns?.[i];
          return(
            <div key={i} style={{marginTop:5}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:COLORS[i],flexShrink:0}}/>
                <div style={{flex:1,height:18,background:"#1e2a3a",borderRadius:3,overflow:"hidden",position:"relative"}}>
                  <div style={{position:"absolute",left:0,top:0,height:"100%",
                    width:`${pct}%`,background:COLORS[i],opacity:.8,borderRadius:3,
                    transition:"width .5s ease"}}/>
                </div>
                <span style={{fontSize:12,color:isBest?COLORS[i]:"#94a3b8",
                  fontWeight:isBest?800:400,minWidth:90,textAlign:"right"}}>
                  {fmt?fmt(v):v}{isBest&&" ★"}
                </span>
              </div>
              {bd&&(
                <div style={{marginLeft:16,marginTop:3,display:"flex",gap:10,flexWrap:"wrap"}}>
                  {bd.cancel!=null&&<span style={{fontSize:9,color:"#ef4444"}}>
                    ⛔ Cxl {(bd.cancel*100).toFixed(1)}%
                  </span>}
                  {bd.hold!=null&&<span style={{fontSize:9,color:"#facc15"}}>
                    ⏸ Hold {(bd.hold*100).toFixed(1)}%
                  </span>}
                  {bd.crdecl!=null&&<span style={{fontSize:9,color:"#a78bfa"}}>
                    ❌ Decl {(bd.crdecl*100).toFixed(1)}%
                  </span>}
                  {bd.working!=null&&bd.working>0&&<span style={{fontSize:9,color:"#64748b"}}>
                    ⏳ Wkg {(bd.working*100).toFixed(1)}%
                  </span>}
                </div>
              )}
            </div>
          );
        })}
      </div>
    );
  };

  return(
    <div style={{padding:"16px 20px"}}>
      {/* Header */}
      <div style={{marginBottom:18}}>
        <div style={{fontWeight:700,fontSize:15,color:"#e2e8f0",marginBottom:4}}>⚖ Comparison Tool</div>
        <div style={{fontSize:12,color:"#64748b"}}>Select up to 4 reps or markets for side-by-side analysis</div>
      </div>

      {/* Mode + Window toggles */}
      <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",gap:6}}>
          {[["rep","👤 Rep vs Rep"],["market","🗺 Market vs Market"]].map(([m,l])=>(
            <button key={m} onClick={()=>{setMode(m);setSelectedReps([]);setSelectedMarkets([]);}}
              style={{padding:"8px 16px",borderRadius:7,fontFamily:"inherit",
                border:`1.5px solid ${mode===m?"#38bdf8":"#1e2a3a"}`,
                background:mode===m?"rgba(56,189,248,.08)":"transparent",
                color:mode===m?"#38bdf8":"#64748b",cursor:"pointer",fontWeight:mode===m?700:400,fontSize:12}}>
              {l}
            </button>
          ))}
        </div>
        <div style={{display:"flex",gap:6,marginLeft:"auto"}}>
          {["r30","ytd"].map(w=>(
            <button key={w} onClick={()=>setDataWin(w)}
              style={{padding:"6px 12px",borderRadius:6,fontFamily:"inherit",
                border:`1.5px solid ${dataWin===w?"#6366f1":"#1e2a3a"}`,
                background:dataWin===w?"rgba(99,102,241,.08)":"transparent",
                color:dataWin===w?"#6366f1":"#64748b",cursor:"pointer",fontSize:11,fontWeight:600}}>
              {w==="r30"?"R30":"YTD"}
            </button>
          ))}
        </div>
      </div>

      {/* Selector */}
      <div style={{background:"#0d1120",border:"1px solid #1e2a3a",borderRadius:10,padding:14,marginBottom:18}}>
        <div style={{fontSize:10,color:"#334155",letterSpacing:".07em",marginBottom:10}}>
          {mode==="rep"?`SELECT REPS (${selectedReps.length}/4)`:`SELECT MARKETS (${selectedMarkets.length}/4)`}
        </div>
        {mode==="rep"?(
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {activeReps.sort((a,b)=>a.rep.localeCompare(b.rep)).map(r=>{
              const sel=selectedReps.includes(r.rep);
              const idx=selectedReps.indexOf(r.rep);
              return(
                <button key={r.rep} onClick={()=>toggleRep(r.rep)}
                  disabled={!sel&&selectedReps.length>=4}
                  style={{padding:"5px 10px",borderRadius:6,fontFamily:"inherit",cursor:"pointer",
                    border:`1.5px solid ${sel?COLORS[idx]:"#1e2a3a"}`,
                    background:sel?`${COLORS[idx]}18`:"transparent",
                    color:sel?COLORS[idx]:"#64748b",fontSize:11,
                    opacity:(!sel&&selectedReps.length>=4)?.4:1}}>
                  {sel&&<span style={{marginRight:4,fontWeight:800}}>#{idx+1}</span>}
                  {r.rep}
                  <span style={{marginLeft:5,fontSize:9,color:TC[r.tier]??"#64748b"}}>{r.tier?.split(" ")[0]}</span>
                </button>
              );
            })}
          </div>
        ):(
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {marketList.filter(m=>marketData[m]).map(m=>{
              const sel=selectedMarkets.includes(m);
              const idx=selectedMarkets.indexOf(m);
              const md=marketData[m];
              return(
                <button key={m} onClick={()=>toggleMarket(m)}
                  disabled={!sel&&selectedMarkets.length>=4}
                  style={{padding:"8px 14px",borderRadius:8,fontFamily:"inherit",cursor:"pointer",
                    border:`1.5px solid ${sel?COLORS[idx]:"#1e2a3a"}`,
                    background:sel?`${COLORS[idx]}18`:"transparent",
                    color:sel?COLORS[idx]:"#64748b",fontSize:12,textAlign:"left",
                    opacity:(!sel&&selectedMarkets.length>=4)?.4:1}}>
                  {sel&&<span style={{marginRight:4,fontWeight:800}}>#{idx+1}</span>}
                  <span style={{fontWeight:600}}>{m}</span>
                  {md&&<span style={{marginLeft:8,fontSize:10,color:"#334155"}}>{md.repCount} reps · {md.totalGross} appts</span>}
                </button>
              );
            })}
            {!marketList.length&&<div style={{color:"#334155",fontSize:12}}>No markets assigned yet — set up markets first.</div>}
          </div>
        )}
      </div>

      {/* Legend */}
      {selectedItems.length>0&&(
        <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
          {selectedItems.map((item,i)=>{
            const d=getData(item);
            return(
              <div key={item} style={{display:"flex",alignItems:"center",gap:8,
                background:"#0d1120",border:`1px solid ${COLORS[i]}44`,borderRadius:8,padding:"8px 14px"}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:COLORS[i]}}/>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:COLORS[i]}}>{item}</div>
                  {mode==="rep"&&d&&(
                    <div style={{fontSize:10,color:"#64748b"}}>{d.tier} · Rank #{d.rank} · Score {d.score?.toFixed(3)}</div>
                  )}
                  {mode==="market"&&d&&(
                    <div style={{fontSize:10,color:"#64748b"}}>{d.repCount} reps · {d.totalGross} gross issued</div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Context note for market comparison */}
      {mode==="market"&&selectedItems.length>=2&&(
        <div style={{background:"rgba(56,189,248,.05)",border:"1px solid rgba(56,189,248,.15)",
          borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:12,color:"#38bdf8",lineHeight:1.6}}>
          <strong>Volume context:</strong> Markets with more gross issued appointments will naturally produce higher raw totals.
          The <strong>Net Vol per 100 Appts</strong> metric normalizes for this — it shows what each market would produce
          if scaled to the same lead volume. Use this alongside raw totals for a fair comparison.
        </div>
      )}

      {/* Comparison bars */}
      {selectedItems.length>=2?(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:12}}>
          {metrics.map(m=>{
            const values=selectedItems.map(item=>{
              const d=getData(item);
              return d?m.get?m.get(d):d[m.key]:null;
            });
            if(values.every(v=>!v&&v!==0))return null;
            // Build breakdown data for NetStk% metric
            let breakdowns=null;
            if(m.breakdown){
              breakdowns=selectedItems.map(item=>{
                const d=getData(item);
                if(!d) return null;
                if(mode==="rep"){
                  // Rep breakdown: rates per close
                  return{
                    cancel: d.cancel_rate,
                    hold:   d.hold_rate,
                    crdecl: d.crdecl_rate,
                    working: d.working_cnt>0&&d.otd_cnt>0?d.working_cnt/d.otd_cnt:null,
                  };
                } else {
                  // Market breakdown: weighted avg rates
                  return{
                    cancel: d.totalCloses>0?d.totalCancel/d.totalCloses:0,
                    hold:   d.totalCloses>0?d.totalHold/d.totalCloses:0,
                    crdecl: d.totalCloses>0?d.totalCrDecl/d.totalCloses:0,
                    working:null,
                  };
                }
              });
            }
            return(
              <CompBar key={m.key} values={values} fmt={m.fmt}
                higherBetter={m.higherBetter!==false} label={m.label} note={m.note}
                breakdowns={breakdowns}/>
            );
          })}
        </div>
      ):(
        <div style={{textAlign:"center",color:"#334155",padding:"40px 0",fontSize:13}}>
          {selectedItems.length===0?"Select at least 2 items above to compare":"Select one more to start comparing"}
        </div>
      )}

      {/* Rep volume-normalized breakdown */}
      {mode==="rep"&&selectedItems.length>=2&&(()=>{
        const maxGross=Math.max(...selectedItems.map(rep=>{
          const d=activeReps.find(r=>r.rep===rep);
          return d?.gross_iss||0;
        }));
        const maxDemos=Math.max(...selectedItems.map(rep=>{
          const d=activeReps.find(r=>r.rep===rep);
          return d?.demo||0;
        }));
        return(
          <div style={{marginTop:20}}>
            {/* Context banner */}
            <div style={{background:"rgba(56,189,248,.05)",border:"1px solid rgba(56,189,248,.15)",
              borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:12,color:"#38bdf8",lineHeight:1.6}}>
              <strong>Volume context:</strong> Reps with more gross issued appointments will naturally produce higher raw totals.
              The normalized metrics below scale each rep to the same appointment volume so you can compare
              pure efficiency regardless of how many leads they ran.
            </div>

            {/* Normalized bar charts */}
            <div style={{background:"#0d1120",border:"1px solid #1e2a3a",borderRadius:10,padding:16,marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:13,color:"#e2e8f0",marginBottom:4}}>
                📐 Volume-Normalized Metrics — per 100 gross issued appointments
              </div>
              <div style={{fontSize:11,color:"#64748b",marginBottom:14}}>
                What each rep would produce if everyone ran the same {maxGross} appointment volume
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:10}}>
                {[
                  {label:"Net Vol per 100 Appts",   key:"norm_net_vol",    fmt:v=>"$"+Math.round(v).toLocaleString(), higherBetter:true},
                  {label:"Closes per 100 Appts",    key:"norm_closes",     fmt:v=>v.toFixed(1),                       higherBetter:true},
                  {label:"NSLI per 100 Appts",      key:"norm_nsli",       fmt:v=>"$"+Math.round(v).toLocaleString(), higherBetter:true},
                  {label:"Net Closes per 100 Appts",key:"norm_net_closes", fmt:v=>v.toFixed(1),                       higherBetter:true},
                ].map(m=>{
                  const values=selectedItems.map(rep=>{
                    const d=activeReps.find(r=>r.rep===rep);
                    if(!d||!d.gross_iss)return null;
                    const per100=f=>(d[f]/d.gross_iss)*100;
                    if(m.key==="norm_net_vol")    return per100("net_vol");
                    if(m.key==="norm_closes")     return per100("otd_cnt");
                    if(m.key==="norm_nsli")       return per100("nsli");
                    if(m.key==="norm_net_closes") return per100("num_net");
                    return null;
                  });
                  const maxV=Math.max(...values.filter(v=>v!=null),0.001);
                  const best=Math.max(...values.filter(v=>v!=null));
                  return(
                    <div key={m.key} style={{background:"#080c14",borderRadius:8,padding:"10px 14px"}}>
                      <div style={{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:8}}>{m.label}</div>
                      {values.map((v,i)=>{
                        if(v==null)return null;
                        const pct=Math.max(4,(v/maxV)*100);
                        const isBest=v===best&&v>0;
                        const rep=selectedItems[i];
                        return(
                          <div key={i} style={{marginBottom:6}}>
                            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:3}}>
                              <span style={{color:COLORS[i]}}>{rep.split(",")[0]}</span>
                              <span style={{color:isBest?COLORS[i]:"#64748b",fontWeight:isBest?800:400}}>
                                {m.fmt(v)}{isBest?" ★":""}
                              </span>
                            </div>
                            <div style={{height:7,background:"#1e2a3a",borderRadius:3,overflow:"hidden"}}>
                              <div style={{height:"100%",width:`${pct}%`,background:COLORS[i],opacity:.8,borderRadius:3}}/>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Projected scale table */}
            <div style={{background:"#0d1120",border:"1px solid #1e2a3a",borderRadius:10,padding:16}}>
              <div style={{fontWeight:700,fontSize:13,color:"#e2e8f0",marginBottom:4}}>
                📐 Projected Scale — If all reps ran {maxGross} gross issued appointments
              </div>
              <div style={{fontSize:11,color:"#64748b",marginBottom:14}}>
                Projects each rep's raw output to match the highest-volume rep in this comparison.
                Rates (OTD%, STD%, NetStk%) stay the same — only volumes scale.
              </div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr style={{background:"#080c14"}}>
                      {["Rep","Tier","Actual Gross","Demos","Scale Factor","Proj Net Vol","Proj Closes","Proj Net Closes","Proj NSLI","OTD%","STD%","NetStk%","Wtd Fallout%"].map(l=>(
                        <th key={l} style={thS}>{l}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {selectedItems.map((rep,i)=>{
                      const d=activeReps.find(r=>r.rep===rep);
                      if(!d)return null;
                      const scale=d.gross_iss>0?maxGross/d.gross_iss:1;
                      return(
                        <tr key={rep} style={{background:i%2===0?"#080c14":"#0a0f1a"}}>
                          <td style={{...tdS,fontWeight:700,color:COLORS[i],whiteSpace:"nowrap"}}>{rep}</td>
                          <td style={tdS}><span style={{color:TC[d.tier]??"#64748b",fontSize:10,fontWeight:600}}>{d.tier}</span></td>
                          <td style={tdS}>{d.gross_iss}</td>
                          <td style={tdS}>{d.demo}</td>
                          <td style={{...tdS,color:scale>1.5?"#f59e0b":scale<0.67?"#38bdf8":"#94a3b8",fontWeight:700}}>
                            {scale.toFixed(2)}×
                          </td>
                          <td style={{...tdS,color:"#4ade80",fontWeight:700}}>${Math.round(d.net_vol*scale).toLocaleString()}</td>
                          <td style={tdS}>{Math.round(d.otd_cnt*scale)}</td>
                          <td style={tdS}>{Math.round(d.num_net*scale)}</td>
                          <td style={tdS}>${Math.round(d.nsli*scale).toLocaleString()}</td>
                          <td style={{...tdS,color:d.otd_pct>(activeReps.reduce((a,r)=>a+r.otd_pct,0)/activeReps.length)?"#4ade80":"#f87171"}}>
                            {(d.otd_pct*100).toFixed(1)}%
                          </td>
                          <td style={{...tdS,color:d.std_pct>(activeReps.reduce((a,r)=>a+r.std_pct,0)/activeReps.length)?"#4ade80":"#f87171"}}>
                            {(d.std_pct*100).toFixed(1)}%
                          </td>
                          <td style={{...tdS,color:d.net_issue_rate>(activeReps.reduce((a,r)=>a+r.net_issue_rate,0)/activeReps.length)?"#4ade80":"#f87171"}}>
                            {(d.net_issue_rate*100).toFixed(1)}%
                          </td>
                          <td style={{...tdS,color:d.fallout_rate<(activeReps.reduce((a,r)=>a+r.fallout_rate,0)/activeReps.length)?"#4ade80":"#f87171"}}>
                            {(d.fallout_rate*100).toFixed(1)}%
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Projected scale table for market comparison */}
      {mode==="market"&&selectedItems.length>=2&&(()=>{
        const maxGross=Math.max(...selectedItems.map(m=>marketData[m]?.totalGross||0));
        return(
          <div style={{marginTop:20,background:"#0d1120",border:"1px solid #1e2a3a",borderRadius:10,padding:16}}>
            <div style={{fontWeight:700,fontSize:13,color:"#e2e8f0",marginBottom:4}}>
              📐 Projected Scale — If all markets ran {maxGross} gross issued appointments
            </div>
            <div style={{fontSize:11,color:"#64748b",marginBottom:14}}>
              Scales each market's production to match the highest-volume market. Shows expected output at equal lead volume.
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr style={{background:"#080c14"}}>
                    <th style={thS}>Market</th>
                    <th style={thS}>Actual Gross</th>
                    <th style={thS}>Scale Factor</th>
                    <th style={thS}>Projected Net Vol</th>
                    <th style={thS}>Projected Closes</th>
                    <th style={thS}>Actual NetStk%</th>
                    <th style={thS}>Actual STD%</th>
                    <th style={thS}>Actual Fallout%</th>
                  </tr>
                </thead>
                <tbody>
                  {selectedItems.map((m,i)=>{
                    const d=marketData[m];
                    if(!d)return null;
                    const scale=maxGross/d.totalGross;
                    const projNetVol=Math.round(d.totalNetVol*scale);
                    const projCloses=Math.round(d.totalCloses*scale);
                    return(
                      <tr key={m} style={{background:i%2===0?"#080c14":"#0a0f1a"}}>
                        <td style={{...tdS,fontWeight:700,color:COLORS[i]}}>{m}</td>
                        <td style={tdS}>{d.totalGross}</td>
                        <td style={{...tdS,color:scale>1.5?"#f59e0b":"#94a3b8"}}>{scale.toFixed(2)}×</td>
                        <td style={{...tdS,color:"#4ade80",fontWeight:700}}>${projNetVol.toLocaleString()}</td>
                        <td style={tdS}>{projCloses}</td>
                        <td style={tdS}>{(d.netstk_pct*100).toFixed(1)}%</td>
                        <td style={tdS}>{(d.std_pct*100).toFixed(1)}%</td>
                        <td style={{...tdS,color:d.fallout_rate<.2?"#4ade80":"#f87171"}}>{(d.fallout_rate*100).toFixed(1)}%</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ─── MARKET MANAGER ──────────────────────────────────────────────────────────
function MarketManager({r30Data,ytdData,markets,marketList,onSave}){
  const [assignments,setAssignments]=useState({...markets});
  const [list,setList]=useState([...marketList]);
  const [newMarket,setNewMarket]=useState("");
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);

  // Get all known reps
  const allReps=useMemo(()=>{
    const seen=new Set();const reps=[];
    for(const r of [...(r30Data?.reps||[]),...(ytdData?.reps||[])].filter(x=>x.tier!=="⛔ Excluded")){
      if(!seen.has(r.rep)){seen.add(r.rep);reps.push(r.rep);}
    }
    return reps.sort();
  },[r30Data,ytdData]);

  const RESERVED=["⛔ Terminated"];
  const addMarket=()=>{
    const m=newMarket.trim();
    if(!m||list.includes(m))return;
    setList(prev=>[...prev,m].sort());
    setNewMarket("");
  };
  const toggleTerminated=(rep)=>{
    setAssignments(prev=>{
      const next={...prev};
      if(next[rep]==="⛔ Terminated") delete next[rep];
      else next[rep]="⛔ Terminated";
      return next;
    });
  };

  const removeMarket=m=>{
    setList(prev=>prev.filter(x=>x!==m));
    setAssignments(prev=>{
      const next={...prev};
      Object.keys(next).forEach(k=>{if(next[k]===m)delete next[k];});
      return next;
    });
  };

  const assign=(rep,market)=>{
    setAssignments(prev=>({...prev,[rep]:market||undefined}));
  };

  const save=async()=>{
    setSaving(true);
    await db.set("markets",{assignments,list});
    onSave(assignments,list);
    setSaving(false);setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  };

  // Group reps by market
  const byMarket={};
  list.forEach(m=>{byMarket[m]=[];});
  byMarket["Unassigned"]=[];
  byMarket["⛔ Terminated"]=[];
  allReps.forEach(rep=>{
    const m=assignments[rep];
    if(m==="⛔ Terminated") byMarket["⛔ Terminated"].push(rep);
    else if(m&&byMarket[m]) byMarket[m].push(rep);
    else byMarket["Unassigned"].push(rep);
  });

  return(
    <div style={{padding:"16px 20px"}}>
      <div style={{marginBottom:20}}>
        <div style={{fontWeight:700,fontSize:15,color:"#f59e0b",marginBottom:4}}>🗺 Market Manager</div>
        <div style={{fontSize:12,color:"#64748b",lineHeight:1.6,maxWidth:620}}>
          Assign each rep to their market. This powers market-level filtering and will drive
          the "who gets the next lead" feature. Changes save for everyone instantly.
        </div>
      </div>

      {/* Add market */}
      <div style={{display:"flex",gap:8,marginBottom:20,alignItems:"center"}}>
        <input value={newMarket} onChange={e=>setNewMarket(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&addMarket()}
          placeholder="Add new market name..."
          style={{background:"#0d1120",border:"1px solid #1e2a3a",borderRadius:6,
            padding:"8px 12px",color:"#e2e8f0",fontSize:13,fontFamily:"inherit",
            outline:"none",width:220}}/>
        <button onClick={addMarket} style={{
          background:"linear-gradient(135deg,#f59e0b,#d97706)",border:"none",borderRadius:6,
          padding:"8px 16px",color:"#000",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"
        }}>+ Add Market</button>
        <button onClick={save} disabled={saving} style={{
          background:saved?"#4ade80":"linear-gradient(135deg,#0ea5e9,#6366f1)",border:"none",
          borderRadius:6,padding:"8px 16px",color:saved?"#000":"#fff",
          fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit",marginLeft:"auto"
        }}>{saving?"Saving...":saved?"✓ Saved":"Save Changes"}</button>
      </div>

      {/* Market pills */}
      {list.length>0&&(
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>
          {list.map(m=>(
            <div key={m} style={{display:"flex",alignItems:"center",gap:6,
              background:"#0d1120",border:"1px solid #f59e0b44",borderRadius:20,
              padding:"5px 12px",fontSize:12}}>
              <span style={{color:"#f59e0b",fontWeight:600}}>{m}</span>
              <span style={{color:"#64748b",fontSize:11}}>({byMarket[m]?.length||0} reps)</span>
              <button onClick={()=>removeMarket(m)} style={{background:"none",border:"none",
                color:"#334155",cursor:"pointer",fontSize:14,padding:"0 0 0 4px",lineHeight:1}}>×</button>
            </div>
          ))}
        </div>
      )}

      {/* Rep assignment table */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:12}}>
        {/* Unassigned first */}
        {byMarket["Unassigned"]?.length>0&&(
          <div style={{background:"#0d1120",border:"1px solid #1e2a3a",borderRadius:10,padding:14,gridColumn:"1/-1"}}>
            <div style={{fontSize:11,color:"#64748b",letterSpacing:".07em",marginBottom:10}}>
              UNASSIGNED ({byMarket["Unassigned"].length} reps)
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:6}}>
              {byMarket["Unassigned"].map(rep=>(
                <div key={rep} style={{display:"flex",alignItems:"center",gap:8,
                  padding:"7px 10px",background:"#080c14",borderRadius:7}}>
                  <span style={{flex:1,fontSize:13,color:"#94a3b8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{rep}</span>
                  <select value={assignments[rep]||""} onChange={e=>assign(rep,e.target.value)}
                    style={{background:"#1e2a3a",border:"1px solid #334155",borderRadius:5,
                      padding:"4px 8px",color:"#e2e8f0",fontSize:11,fontFamily:"inherit",cursor:"pointer"}}>
                    <option value="">— assign —</option>
                    {list.map(m=><option key={m} value={m}>{m}</option>)}
                  </select>
                  <button onClick={()=>toggleTerminated(rep)} title="Mark as Terminated"
                    style={{background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.3)",
                      borderRadius:5,padding:"4px 7px",color:"#ef4444",cursor:"pointer",
                      fontSize:10,fontWeight:700,fontFamily:"inherit"}}>⛔</button>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Markets with assigned reps */}
        {list.map(m=>(
          byMarket[m]?.length>0&&(
            <div key={m} style={{background:"#0d1120",border:"1px solid #f59e0b33",borderRadius:10,padding:14}}>
              <div style={{fontSize:11,color:"#f59e0b",letterSpacing:".07em",marginBottom:10,fontWeight:700}}>
                {m.toUpperCase()} ({byMarket[m].length} reps)
              </div>
              {byMarket[m].map(rep=>{
                const repData=(r30Data?.reps||ytdData?.reps||[]).find(x=>x.rep===rep);
                return(
                  <div key={rep} style={{display:"flex",alignItems:"center",gap:6,
                    padding:"7px 10px",background:"#080c14",borderRadius:7,marginBottom:5}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,color:"#f1f5f9",fontWeight:600}}>{rep}</div>
                      {repData&&<div style={{fontSize:10,color:TC[repData.tier]??"#64748b"}}>{repData.tier} · Rank #{repData.rank}</div>}
                    </div>
                    <select value={assignments[rep]||""} onChange={e=>assign(rep,e.target.value)}
                      style={{background:"#1e2a3a",border:"1px solid #334155",borderRadius:5,
                        padding:"4px 8px",color:"#e2e8f0",fontSize:11,fontFamily:"inherit",cursor:"pointer"}}>
                      <option value="">— unassign —</option>
                      {list.map(mk=><option key={mk} value={mk}>{mk}</option>)}
                    </select>
                    <button onClick={()=>toggleTerminated(rep)} title="Mark as Terminated"
                      style={{background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.3)",
                        borderRadius:5,padding:"4px 7px",color:"#ef4444",cursor:"pointer",
                        fontSize:10,fontWeight:700,fontFamily:"inherit"}}>⛔</button>
                  </div>
                );
              })}
            </div>
          )
        ))}
      </div>

      {/* Terminated reps section */}
      {byMarket["⛔ Terminated"]?.length>0&&(
        <div style={{background:"#0d1120",border:"1px solid rgba(239,68,68,.2)",borderRadius:10,padding:14,marginTop:4}}>
          <div style={{fontSize:11,color:"#ef4444",letterSpacing:".07em",marginBottom:10,fontWeight:700}}>
            ⛔ TERMINATED ({byMarket["⛔ Terminated"].length} reps) — excluded from all rankings and metrics
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {byMarket["⛔ Terminated"].map(rep=>(
              <div key={rep} style={{display:"flex",alignItems:"center",gap:6,
                background:"rgba(239,68,68,.07)",border:"1px solid rgba(239,68,68,.2)",
                borderRadius:6,padding:"5px 10px"}}>
                <span style={{fontSize:12,color:"#94a3b8",textDecoration:"line-through"}}>{rep}</span>
                <button onClick={()=>toggleTerminated(rep)} title="Restore rep"
                  style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",
                    fontSize:11,fontFamily:"inherit"}}>↩ restore</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {allReps.length===0&&(
        <div style={{color:"#334155",fontSize:13,textAlign:"center",padding:40}}>
          Upload R30 or YTD data first to see reps.
        </div>
      )}
    </div>
  );
}

// ─── REP MAP TAB ─────────────────────────────────────────────────────────────
function RepMapTab({allReps,markets}){
  const mapRef=useRef(null);
  const leafletMap=useRef(null);
  const markersRef=useRef([]);
  const routeLayerRef=useRef(null);

  const [repData,setRepData]=useState([]); // [{rep,address,lat,lng,destinations:[]}]
  const [activeRep,setActiveRep]=useState(null);
  const [search,setSearch]=useState("");
  const [orsKey,setOrsKey]=useState(()=>localStorage.getItem("ors_api_key")||"");
  const [orsKeyInput,setOrsKeyInput]=useState(()=>localStorage.getItem("ors_api_key")||"");
  const [panel,setPanel]=useState("reps"); // "reps"|"route"|"settings"
  const [addrInput,setAddrInput]=useState("");
  const [destInputs,setDestInputs]=useState(["","",""]);
  const [routeResults,setRouteResults]=useState({});
  const [geocoding,setGeocoding]=useState(false);
  const [calcingRoutes,setCalcingRoutes]=useState(false);
  const [qFrom,setQFrom]=useState("");
  const [qTo,setQTo]=useState("");
  const [qResult,setQResult]=useState(null);
  const [qLoading,setQLoading]=useState(false);
  const [saving,setSaving]=useState(false);
  const [toast,setToast]=useState(null);
  const toastTimer=useRef(null);
