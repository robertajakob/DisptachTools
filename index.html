      <div style={{marginBottom:10}}><span style={lbl}>Home Type</span><BtnGroup fieldKey="homeType" opts={[{val:"SFH",label:"SFH",sub:"Single Family"},{val:"TH",label:"TH",sub:"TownHome"},{val:"Condo",label:"Condo"},{val:"Villa",label:"Villa"}]}/></div>
      <div style={{marginBottom:10}}><span style={lbl}>Residence Type</span><BtnGroup fieldKey="residenceType" opts={[{val:"PR",label:"PR",sub:"Primary Res."},{val:"IP",label:"IP",sub:"Investment"}]}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
        <div><span style={lbl}>Windows</span><input value={form.windows} onChange={e=>set("windows",e.target.value)} placeholder="0" style={inp}/></div>
        <div><span style={lbl}>Doors</span><input value={form.doors} onChange={e=>set("doors",e.target.value)} placeholder="0" style={inp}/></div>
        <div><span style={lbl}>Sliders</span><input value={form.sliders} onChange={e=>set("sliders",e.target.value)} placeholder="0" style={inp}/></div>
      </div>
      <div style={{marginBottom:10}}><span style={lbl}>Original Windows</span><BtnGroup fieldKey="originalWindows" opts={[{val:"Yes",label:"Yes"},{val:"No",label:"No"}]}/></div>
      <div style={{marginBottom:10}}><span style={lbl}>Main Structure</span><BtnGroup fieldKey="mainStructure" opts={[{val:"Yes",label:"Yes"},{val:"No",label:"No"}]}/></div>
      <div style={{marginBottom:10}}><span style={lbl}>No Resize</span><BtnGroup fieldKey="noResize" opts={[{val:"Yes",label:"Yes"},{val:"No",label:"No"}]}/></div>
      <div style={{marginBottom:10}}><span style={lbl}>Marital Status</span><BtnGroup fieldKey="maritalStatus" opts={["Single","Married","Partners","Siblings","Family/Friends"].map(s=>({val:s,label:s}))}/></div>
      <div style={{marginBottom:10}}><span style={lbl}>Gate Code</span><input value={form.gateCode} onChange={e=>set("gateCode",e.target.value)} placeholder="If applicable" style={inp}/></div>
      <div style={{marginBottom:12}}><span style={lbl}>Notes</span><textarea value={form.notes} onChange={e=>set("notes",e.target.value)} placeholder="Additional notes..." style={{...inp,minHeight:60,resize:"vertical"}}/></div>
      <button onClick={()=>onSubmit(form)} className="btn-primary" style={{width:"100%",padding:"10px 0",fontSize:13}}>Submit Log Entry</button>
    </div>
  );
}

function TrackerTab({allReps,markets}){
  const [dispatcher,setDispatcher]=useState(()=>localStorage.getItem("tracker_dispatcher")||null);
  const [interactionType,setInteractionType]=useState(null);
  const [selectedRep,setSelectedRep]=useState("");
  const [repSearch,setRepSearch]=useState("");
  const [dispatchSubtype,setDispatchSubtype]=useState("");
  const [dispatchNote,setDispatchNote]=useState("");
  const [otherNote,setOtherNote]=useState("");
  const [log,setLog]=useState([]);
  const [filterDispatcher,setFilterDispatcher]=useState("All");
  const [trackerView,setTrackerView]=useState("intake");
  const now=useNow();

  useEffect(()=>{const load=async()=>{const d=await db.get("tracker_log");if(d&&Array.isArray(d))setLog(d);};load();const iv=setInterval(load,10000);return()=>clearInterval(iv);},[]);
  const saveLog=async(newLog)=>{setLog(newLog);await db.set("tracker_log",newLog.slice(-200));};
  const selectDispatcher=(id)=>{setDispatcher(id);localStorage.setItem("tracker_dispatcher",id);};
  const resetFlow=()=>{setInteractionType(null);setSelectedRep("");setRepSearch("");setDispatchSubtype("");setDispatchNote("");setOtherNote("");};
  const activeReps=useMemo(()=>{const seen=new Set();const list=[];for(const r of allReps.filter(x=>x.tier!=="⛔ Excluded"&&markets[x.rep]!=="⛔ Terminated")){if(!seen.has(r.rep)){seen.add(r.rep);list.push(r.rep);}}return list.sort();},[allReps,markets]);
  const submitEntry=(formData)=>{
    const ts=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    let autoNote=null;
    if(interactionType==="Dispatch"&&selectedRep&&dispatchSubtype){
      const nameParts=selectedRep.includes(",")?selectedRep.split(",").map(p=>p.trim()):null;
      const fmtName=nameParts?`${nameParts[1]} ${nameParts[0]}`:selectedRep;
      autoNote=`Rep ${fmtName} called in ${ts} stating ${dispatchSubtype}${dispatchNote.trim()?" - "+dispatchNote.trim():""}`;
    }
    const entry={id:Date.now()+"_"+Math.random().toString(36).slice(2,7),dispatcher,type:interactionType,rep:selectedRep||null,subtype:dispatchSubtype||null,note:interactionType==="Other"?(otherNote||null):autoNote,dispatchNote:dispatchNote||null,form:formData||null,timestamp:Date.now(),status:"active",completedAt:null};
    saveLog([entry,...log]);resetFlow();
  };
  const markComplete=(id)=>{saveLog(log.map(e=>e.id===id?{...e,status:"done",completedAt:Date.now()}:e));};
  const urgent=log.filter(e=>e.status==="active"&&(now-e.timestamp)>=URGENT_MS);
  const active=log.filter(e=>e.status==="active"&&(now-e.timestamp)<URGENT_MS);
  const done=log.filter(e=>e.status==="done");
  const filteredLog=[...urgent,...active,...done].filter(e=>filterDispatcher==="All"||e.dispatcher===filterDispatcher);
  const dispColor=id=>DISPATCHERS.find(d=>d.id===id)?.color??"#64748b";
  const typeColor=t=>t==="Dispatch"?"#38bdf8":t==="Setting"?"#34d399":t==="Confirming"?"#fbbf24":t==="Other"?"#a78bfa":"#64748b";

  const LogEntry=({entry})=>{
    const elapsed=entry.status==="done"?entry.completedAt-entry.timestamp:now-entry.timestamp;
    const isUrgent=entry.status==="active"&&elapsed>=URGENT_MS;
    const isDone=entry.status==="done";
    const dc=dispColor(entry.dispatcher),tc=typeColor(entry.type);
    const [copied,setCopied]=useState(false);
    const copyNote=()=>{if(!entry.note)return;navigator.clipboard.writeText(entry.note).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});};
    return(
      <div style={{background:isDone?"var(--bg-base)":isUrgent?"rgba(248,113,113,.05)":"var(--bg-surface)",border:`1px solid ${isDone?"var(--border)":isUrgent?"rgba(248,113,113,.35)":"var(--border)"}`,borderRadius:"var(--radius)",padding:"10px 14px",marginBottom:7,opacity:isDone?.6:1,transition:"opacity .2s"}}>
        <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
          {isUrgent&&<span style={{fontSize:10,fontWeight:800,color:"#f87171",background:"rgba(248,113,113,.12)",padding:"2px 7px",borderRadius:4,animation:"pulse 1.5s infinite"}}>🚨 URGENT</span>}
          {isDone&&<span style={{fontSize:10,color:"#34d399",fontWeight:700}}>✓ DONE</span>}
          <span style={{fontSize:12,fontWeight:700,color:dc,background:`${dc}18`,padding:"2px 8px",borderRadius:4}}>{entry.dispatcher}</span>
          <span style={{fontSize:12,fontWeight:600,color:tc}}>{entry.type}</span>
          {entry.rep&&<span style={{fontSize:11,color:"var(--text-secondary)"}}>→ {entry.rep}</span>}
          {entry.subtype&&<span style={{fontSize:11,color:"var(--text-muted)",background:"var(--bg-elevated)",padding:"1px 6px",borderRadius:3}}>{entry.subtype}</span>}
          {entry.form?.customerName&&<span style={{fontSize:10,color:"var(--text-muted)"}}>👤 {entry.form.customerName}</span>}
          {entry.form&&(entry.type==="Setting"||entry.type==="Confirming")&&<span style={{fontSize:10,color:"var(--text-muted)"}}>{entry.form.apptDate} @ {entry.form.apptTime} · {entry.form.homeType}</span>}
          <div style={{flex:1}}/>
          <span style={{fontSize:11,color:isDone?"#34d399":isUrgent?"#f87171":"var(--text-muted)",fontWeight:isUrgent?700:400,fontFamily:"var(--font-mono)"}}>{fmtElapsed(elapsed)}{isDone?" total":""}</span>
          <span style={{fontSize:10,color:"var(--text-faint)"}}>{new Date(entry.timestamp).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</span>
          {!isDone&&<button onClick={()=>markComplete(entry.id)} style={{background:"rgba(52,211,153,.1)",border:"1px solid rgba(52,211,153,.3)",borderRadius:4,padding:"3px 10px",color:"#34d399",cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>✓ Done</button>}
        </div>
        {entry.note&&(
          <div style={{marginTop:8,display:"flex",alignItems:"flex-start",gap:8}}>
            <div style={{flex:1,fontSize:11,color:"var(--text-secondary)",fontStyle:"italic",background:"rgba(255,255,255,.03)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"7px 10px",lineHeight:1.6,wordBreak:"break-word"}}>{entry.note}</div>
            <button onClick={copyNote} style={{flexShrink:0,background:copied?"rgba(52,211,153,.1)":"rgba(255,255,255,.03)",border:`1px solid ${copied?"rgba(52,211,153,.3)":"var(--border)"}`,borderRadius:4,padding:"6px 10px",color:copied?"#34d399":"var(--text-muted)",cursor:"pointer",fontSize:11,fontFamily:"inherit",whiteSpace:"nowrap"}}>{copied?"✓ Copied":"📋 Copy"}</button>
          </div>
        )}
        {entry.form&&(entry.type==="Setting"||entry.type==="Confirming")&&(
          <div style={{marginTop:6,display:"flex",flexWrap:"wrap",gap:8,fontSize:10,color:"var(--text-muted)"}}>
            {entry.form.phone&&<span>📞 {entry.form.phone}</span>}
            {entry.form.address&&<span>📍 {entry.form.address}</span>}
            {entry.form.windows&&<span>🪟 {entry.form.windows}win</span>}
            {entry.form.doors&&<span>🚪 {entry.form.doors}dr</span>}
            {entry.form.sliders&&<span>🔲 {entry.form.sliders}sl</span>}
            {entry.form.maritalStatus&&<span>👥 {entry.form.maritalStatus}</span>}
          </div>
        )}
      </div>
    );
  };

  return(
    <div style={{height:"calc(100vh - 100px)",overflow:"hidden",display:"flex",flexDirection:"column"}}>
      <div style={{background:"var(--bg-surface)",borderBottom:"1px solid var(--border)",padding:"10px 20px",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <div className="seg-control">
          {[["intake","📋 Intake"],["log","📄 Log"]].map(([v,label])=>(
            <button key={v} className={`seg-btn${trackerView===v?" active":""}`} onClick={()=>setTrackerView(v)}>{label}</button>
          ))}
        </div>
        {trackerView==="log"&&(
          <div style={{display:"flex",gap:5,marginLeft:"auto"}}>
            {["All","RJ","BR","JF"].map(d=>(
              <button key={d} onClick={()=>setFilterDispatcher(d)} style={{padding:"5px 12px",borderRadius:"var(--radius-sm)",fontFamily:"inherit",fontSize:11,cursor:"pointer",border:`1.5px solid ${filterDispatcher===d?(dispColor(d)==="#64748b"?"var(--text-secondary)":dispColor(d)):"var(--border)"}`,background:filterDispatcher===d?"rgba(255,255,255,.04)":"transparent",color:filterDispatcher===d?(dispColor(d)==="#64748b"?"var(--text-secondary)":dispColor(d)):"var(--text-muted)",fontWeight:filterDispatcher===d?700:400}}>{d}</button>
            ))}
          </div>
        )}
      </div>

      {trackerView==="intake"&&(
        <div style={{flex:1,overflowY:"auto",maxWidth:480,width:"100%",padding:20,alignSelf:"center"}}>
          <div style={{marginBottom:20}}>
            <div style={{fontSize:10,color:"var(--text-muted)",letterSpacing:".08em",marginBottom:10,textTransform:"uppercase",fontWeight:700}}>Who are you?</div>
            <div style={{display:"flex",gap:8}}>
              {DISPATCHERS.map(d=>(
                <div key={d.id} onClick={()=>selectDispatcher(d.id)} style={{flex:1,padding:"14px 8px",borderRadius:"var(--radius)",textAlign:"center",cursor:"pointer",border:`2px solid ${dispatcher===d.id?d.color:"var(--border)"}`,background:dispatcher===d.id?d.bg:"var(--bg-surface)",transition:"all .15s"}}>
                  <div style={{fontSize:22,fontWeight:900,color:dispatcher===d.id?d.color:"var(--text-muted)",lineHeight:1,fontFamily:"var(--font-display)"}}>{d.id}</div>
                </div>
              ))}
            </div>
          </div>
          {!dispatcher&&<div style={{textAlign:"center",color:"var(--text-muted)",padding:"40px 0",fontSize:13}}>Select your name above to begin logging</div>}
          {dispatcher&&(
            <>
              {!interactionType&&(
                <div>
                  <div style={{fontSize:10,color:"var(--text-muted)",letterSpacing:".08em",marginBottom:10,textTransform:"uppercase",fontWeight:700}}>Interaction Type</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {INTERACTION_TYPES.map(t=>(
                      <div key={t} onClick={()=>setInteractionType(t)} style={{padding:"18px 10px",borderRadius:"var(--radius)",textAlign:"center",cursor:"pointer",border:`1.5px solid ${typeColor(t)}22`,background:`${typeColor(t)}0a`,color:typeColor(t),fontWeight:700,fontSize:13,fontFamily:"var(--font-display)",transition:"all .15s"}}
                        onMouseEnter={e=>{e.currentTarget.style.borderColor=typeColor(t)+"66";}}
                        onMouseLeave={e=>{e.currentTarget.style.borderColor=typeColor(t)+"22";}}>
                        {t}
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {interactionType&&(
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                    <div style={{fontSize:13,fontWeight:700,color:typeColor(interactionType),fontFamily:"var(--font-display)"}}>{interactionType}</div>
                    <button onClick={resetFlow} style={{background:"none",border:"none",color:"var(--text-muted)",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>✕ Reset</button>
                  </div>
                  {interactionType==="Dispatch"&&(
                    <div>
                      <div style={{marginBottom:12,position:"relative"}}>
                        <div style={{fontSize:10,color:"var(--text-muted)",letterSpacing:".06em",marginBottom:6,textTransform:"uppercase",fontWeight:700}}>Rep</div>
                        <input value={repSearch} onChange={e=>{setRepSearch(e.target.value);setSelectedRep("");}} placeholder="Type first or last name..."
                          style={{background:"var(--bg-elevated)",border:`1px solid ${selectedRep?"#38bdf8":"var(--border)"}`,borderRadius:"var(--radius-sm)",padding:"7px 10px",color:"var(--text-primary)",fontSize:12,fontFamily:"inherit",outline:"none",width:"100%"}}/>
                        {repSearch&&!selectedRep&&(()=>{
                          const filtered=activeReps.filter(r=>r.toLowerCase().includes(repSearch.toLowerCase()));
                          return filtered.length>0?(
                            <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:20,background:"var(--bg-surface)",border:"1px solid var(--border-strong)",borderRadius:"var(--radius-sm)",maxHeight:160,overflowY:"auto",marginTop:2,boxShadow:"0 8px 24px rgba(0,0,0,.4)"}}>
                              {filtered.map(r=>(
                                <div key={r} onMouseDown={()=>{setSelectedRep(r);setRepSearch(r);}} style={{padding:"8px 12px",cursor:"pointer",fontSize:12,color:"var(--text-secondary)",borderBottom:"1px solid var(--border)"}}
                                  onMouseEnter={e=>e.currentTarget.style.background="rgba(56,189,248,.08)"}

                      <div style={{marginBottom:12}}>

                      <div style={{marginBottom:14}}>
                        <div style={{fontSize:10,color:"var(--text-muted)",letterSpacing:".06em",marginBottom:5,textTransform:"uppercase",fontWeight:700}}>Note (optional)</div>
                        <textarea value={dispatchNote} onChange={e=>setDispatchNote(e.target.value)} placeholder="Additional detail..." style={{background:"var(--bg-elevated)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",padding:"8px 10px",color:"var(--text-primary)",fontSize:12,fontFamily:"inherit",outline:"none",width:"100%",minHeight:60,resize:"vertical"}}/>
                        {selectedRep&&dispatchSubtype&&(
                          <div style={{marginTop:6,padding:"7px 10px",background:"rgba(56,189,248,.05)",border:"1px solid rgba(56,189,248,.15)",borderRadius:"var(--radius-sm)",fontSize:10,color:"var(--text-muted)",lineHeight:1.6,fontStyle:"italic"}}>
                            📋 Preview: <span style={{color:"var(--text-secondary)"}}>Rep {(()=>{const p=selectedRep.includes(",")?selectedRep.split(",").map(s=>s.trim()):null;return p?`${p[1]} ${p[0]}`:selectedRep;})()}, called in [time] stating {dispatchSubtype}{dispatchNote.trim()?" - "+dispatchNote.trim():""}</span>
                          </div>
                        )}
                      </div>
                      <button onClick={()=>{if(!selectedRep||!dispatchSubtype)return;submitEntry(null);}} disabled={!selectedRep||!dispatchSubtype} className="btn-primary" style={{width:"100%",padding:"10px 0",fontSize:13,opacity:(!selectedRep||!dispatchSubtype)?.45:1,cursor:(!selectedRep||!dispatchSubtype)?"not-allowed":"pointer"}}>Log Entry</button>
                    </div>
                  )}
                  {(interactionType==="Setting"||interactionType==="Confirming")&&<ConfirmingForm onSubmit={submitEntry}/>}
                  {interactionType==="Other"&&(
                    <div>
                      <div style={{marginBottom:12}}>

                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,maxHeight:160,overflowY:"auto"}}>
                          <div onClick={()=>setSelectedRep("")} style={{padding:"7px 10px",borderRadius:"var(--radius-sm)",cursor:"pointer",fontSize:11,border:`1.5px solid ${selectedRep===""?"#a78bfa":"var(--border)"}`,background:selectedRep===""?"rgba(167,139,250,.1)":"var(--bg-elevated)",color:selectedRep===""?"var(--text-primary)":"var(--text-muted)",textAlign:"center",fontStyle:"italic"}}>— none —</div>
                          {activeReps.map(r=>(
                            <div key={r} onClick={()=>setSelectedRep(r)} style={{padding:"7px 10px",borderRadius:"var(--radius-sm)",cursor:"pointer",fontSize:11,fontWeight:selectedRep===r?700:400,border:`1.5px solid ${selectedRep===r?"#a78bfa":"var(--border)"}`,background:selectedRep===r?"rgba(167,139,250,.1)":"var(--bg-elevated)",color:selectedRep===r?"var(--text-primary)":"var(--text-muted)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r}</div>

                    </div>
                  )}
                </div>
              )}
            </>
          )}
        </div>
      )}

      {trackerView==="log"&&(
        <div style={{flex:1,overflowY:"auto",padding:20}}>
          {urgent.filter(e=>filterDispatcher==="All"||e.dispatcher===filterDispatcher).length>0&&(
            <div style={{marginBottom:18,background:"rgba(248,113,113,.04)",border:"1px solid rgba(248,113,113,.2)",borderRadius:"var(--radius-lg)",padding:14}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <span style={{fontSize:13,fontWeight:800,color:"#f87171",fontFamily:"var(--font-display)"}}>🚨 URGENT</span>
                <span style={{fontSize:11,color:"#f87171",opacity:.6}}>— tasks over 5 minutes</span>
                <span style={{marginLeft:"auto",fontSize:11,fontWeight:700,color:"#f87171",background:"rgba(248,113,113,.12)",padding:"2px 8px",borderRadius:12}}>{urgent.filter(e=>filterDispatcher==="All"||e.dispatcher===filterDispatcher).length}</span>
              </div>
              {urgent.filter(e=>filterDispatcher==="All"||e.dispatcher===filterDispatcher).map(e=><LogEntry key={e.id} entry={e}/>)}
            </div>
          )}
          {active.filter(e=>filterDispatcher==="All"||e.dispatcher===filterDispatcher).map(e=><LogEntry key={e.id} entry={e}/>)}
          {done.filter(e=>filterDispatcher==="All"||e.dispatcher===filterDispatcher).length>0&&(
            <div style={{marginTop:18}}>
              <div style={{fontSize:10,color:"var(--text-faint)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:8,paddingTop:8,borderTop:"1px solid var(--border)"}}>Completed</div>
              {done.filter(e=>filterDispatcher==="All"||e.dispatcher===filterDispatcher).map(e=><LogEntry key={e.id} entry={e}/>)}
            </div>
          )}
          {filteredLog.length===0&&<div style={{textAlign:"center",color:"var(--text-faint)",padding:"60px 0",fontSize:13}}>No activity logged yet</div>}
        </div>
      )}
    </div>
  );
}

// ─── DASHBOARD TAB ───────────────────────────────────────────────────────────
function DashboardTab({r30Data,ytdData,history,markets,marketList,onOpenScorecard}){
  const [expandedInsight, setExpandedInsight] = useState(null);
  const activeReps=useMemo(()=>{
    const src=r30Data||ytdData;
    return(src?.reps||[]).filter(r=>r.tier!=="⛔ Excluded"&&markets[r.rep]!=="⛔ Terminated");
  },[r30Data,ytdData,markets]);

  // ── derive team averages ──
  const teamAvg=useMemo(()=>{
    if(!activeReps.length)return{};
    const avg=f=>activeReps.map(r=>r[f]??0).reduce((a,b)=>a+b,0)/activeReps.length;
    return{net_vol:avg("net_vol"),std_pct:avg("std_pct"),fallout_rate:avg("fallout_rate"),net_issue_rate:avg("net_issue_rate"),avg_deal:avg("avg_deal")};
  },[activeReps]);

  // ── top performers: ranked by score, tier Elite/Strong, decent sample ──
  const topPerformers=useMemo(()=>{
    return [...activeReps]
      .filter(r=>r.rank!=="-"&&r.demo>=5)
      .sort((a,b)=>a.rank-b.rank)
      .slice(0,5);
  },[activeReps]);

  // ── needs attention: declining trend OR high fallout OR low confidence ──
  const needsAttention=useMemo(()=>{
    if(!r30Data||!ytdData)return[];
    return activeReps
      .filter(r=>{
        const ytdR=ytdData.reps?.find(x=>x.rep===r.rep);
        if(!ytdR)return false;
        const falloutHigh=r.fallout_rate>(teamAvg.fallout_rate*1.3);
        const stdDropping=(r.std_pct-ytdR.std_pct)<-0.04;
        const volDropping=(r.net_vol-ytdR.net_vol)<-(teamAvg.net_vol*0.15);
        const lowSample=r.demo<8&&r.rank!=="-";
        return falloutHigh||stdDropping||volDropping||lowSample;
      })
      .sort((a,b)=>b.fallout_rate-a.fallout_rate)
      .slice(0,5);
  },[activeReps,r30Data,ytdData,teamAvg]);

  // ── momentum rows: compare r30 vs ytd ──
  const momentumRows=useMemo(()=>{
    if(!r30Data||!ytdData)return{heating:[],cooling:[]};
    const rows=[];
    for(const r30R of (r30Data.reps||[]).filter(r=>r.tier!=="⛔ Excluded"&&r.demo>=5)){
      const ytdR=ytdData.reps?.find(x=>x.rep===r30R.rep);
      if(!ytdR)continue;
      let composite=0;
      for(const m of SIGNAL_METRICS){
        const r30v=m.key==="_gap"?gapPts(r30R):r30R[m.key];
        const ytdv=m.key==="_gap"?gapPts(ytdR):ytdR[m.key];
        composite+=signal(r30v,ytdv,m.higherBetter).s;
      }
      rows.push({rep:r30R.rep,tier:r30R.tier,composite,r30R,ytdR});
    }
    rows.sort((a,b)=>b.composite-a.composite);
    return{heating:rows.slice(0,4),cooling:[...rows].reverse().slice(0,4)};
  },[r30Data,ytdData]);

  // ── market signals ──
  const marketSignals=useMemo(()=>{
    if(!marketList.length||!activeReps.length)return[];
    return marketList.map(mkt=>{
      const reps=activeReps.filter(r=>markets[r.rep]===mkt);
      if(!reps.length)return null;
      const sum=f=>reps.reduce((a,r)=>a+(r[f]??0),0);
      const totalGross=sum("gross_iss");
      const normNetVol=totalGross>0?(sum("net_vol")/totalGross)*100:0;
      const avgScore=reps.reduce((a,r)=>a+r.score,0)/reps.length;
      const avgFallout=sum("fallout_rate")/reps.length;
      return{name:mkt,repCount:reps.length,normNetVol,avgScore,avgFallout,totalNetVol:sum("net_vol")};
    }).filter(Boolean).sort((a,b)=>b.normNetVol-a.normNetVol);
  },[activeReps,markets,marketList]);

  // ── system insights ──
  const systemInsights=useMemo(()=>{
    if(!activeReps.length)return[];
    const insights=[];
    const topTier=activeReps.filter(r=>r.tier==="🥇 Elite"||r.tier==="🥈 Strong");
    const highFallout=activeReps.filter(r=>r.fallout_rate>teamAvg.fallout_rate*1.3);
    const lowStick=activeReps.filter(r=>r.net_issue_rate<0.6&&r.demo>=8);
    const hotReps=momentumRows.heating.filter(r=>r.composite>=4);
    const coldReps=momentumRows.cooling.filter(r=>r.composite<=-4);

    if(topTier.length>0){
      const avgStd=topTier.reduce((a,r)=>a+r.std_pct,0)/topTier.length;
      insights.push({icon:"🏆",type:"good",text:`${topTier.length} top-tier reps averaging ${(avgStd*100).toFixed(0)}% close rate — the ceiling is strong.`,reps:topTier});
    }
    if(highFallout.length>=3){
      insights.push({icon:"⚠️",type:"warn",text:`${highFallout.length} reps have above-average fallout — closed revenue isn't all sticking.`,reps:highFallout});
    }
    if(lowStick.length>=2){
      insights.push({icon:"📉",type:"warn",text:`${lowStick.length} reps with low stick rates — closes are happening but not netting to revenue.`,reps:lowStick});
    }
    if(hotReps.length>0){
      insights.push({icon:"🔥",type:"good",text:`${hotReps.length} rep${hotReps.length>1?"s are":"is"} on a hot streak over the last 30 days — momentum is building.`,reps:hotReps});
    }
    if(coldReps.length>0){
      insights.push({icon:"❄️",type:"caution",text:`${coldReps.length} rep${coldReps.length>1?"s are":"is"} trending down vs YTD baseline — worth a conversation.`,reps:coldReps});
    }
    if(marketSignals.length>=2){
      const best=marketSignals[0],worst=marketSignals[marketSignals.length-1];
      if(best.normNetVol>worst.normNetVol*1.4){
        insights.push({icon:"🗺",type:"info",text:`${best.name} is significantly outperforming ${worst.name} per appointment — look at what's driving the gap.`,reps:[]});
      }
    }
    return insights.slice(0,5);
  },[activeReps,teamAvg,momentumRows,marketSignals]);

  // ── rep one-liner ──
  const repOneLiner=(r,ytdR)=>{
    if(r.demo<8)return"Low sample — monitor before drawing conclusions";
    if(r.tier==="🥇 Elite"&&r.net_issue_rate>=.80)return"Elite closer with clean, durable deals";
    if(r.tier==="🥇 Elite")return"Elite volume producer — check stick rate for deal quality";
    if(r.fallout_rate>teamAvg.fallout_rate*1.3&&r.std_pct>=.30)return"Strong closer but deals are falling through after the sale";
    if(r.net_issue_rate<.60&&r.demo>=8)return"Closes are happening but not converting to real revenue";
    if(ytdR&&r.std_pct-ytdR.std_pct>=.05)return"Close rate improving over last 30 days";
    if(ytdR&&r.std_pct-ytdR.std_pct<=-0.05)return"Close rate slipping vs year-to-date baseline";
    if(r.std_pct<.22)return"Below-floor close rate — demo conversion needs focus";
    if(r.fallout_rate<teamAvg.fallout_rate*.7)return"Deal quality is excellent — closes are clean and stick";
    return"Consistent performer across key metrics";
  };

  const momentumLabel=c=>{
    if(c>=8)return{text:"🔥 On Fire",color:"#34d399"};
    if(c>=4)return{text:"📈 Heating",color:"#86efac"};
    if(c>=1)return{text:"↗ Rising",color:"#94a3b8"};
    if(c===0)return{text:"➡ Stable",color:"#64748b"};
    if(c>=-3)return{text:"↘ Softening",color:"#fb923c"};
    return{text:"❄ Cooling",color:"#38bdf8"};
  };

  const noData=!r30Data&&!ytdData;
  const hasTrends=!!(r30Data&&ytdData);

  if(noData){
    return(
      <div className="empty-state" style={{height:"calc(100vh - 52px)"}}>

        <div className="empty-title">No data uploaded yet</div>
        <div className="empty-sub">Upload a Rolling 30 or YTD CSV to see your dashboard</div>
      </div>

      {/* ── DATE CONTEXT ── */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:22}}>
        <div>
          <div style={{fontWeight:800,fontSize:20,color:"var(--text-primary)",fontFamily:"var(--font-display)",letterSpacing:"-.01em"}}>Performance Overview</div>
          <div style={{fontSize:12,color:"var(--text-muted)",marginTop:3}}>
            {(r30Data||ytdData)?.date_range&&<span style={{fontFamily:"var(--font-mono)"}}>{(r30Data||ytdData).date_range}</span>}

          {[["net_vol",f$(Math.round(activeReps.reduce((a,r)=>a+r.net_vol,0))),"Total Net Vol","#34d399"],

              <div style={{fontSize:16,fontWeight:800,color:c,fontFamily:"var(--font-mono)"}}>{v}</div>

                  <div style={{fontSize:10,color:tc,fontWeight:700,fontFamily:"var(--font-mono)"}}>{(r.score*100).toFixed(0)}</div>
                </div>
              </div>
            );
          })}
        </div>

        {/* NEEDS ATTENTION */}
        <div style={{background:"var(--bg-surface)",border:"1px solid rgba(248,113,113,.18)",borderRadius:"var(--radius-lg)",padding:18}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
            <span style={{fontSize:15}}>⚠️</span>
            <div>
              <div style={{fontWeight:800,fontSize:13,color:"var(--text-primary)",fontFamily:"var(--font-display)"}}>Needs Attention</div>
              <div style={{fontSize:10,color:"var(--text-muted)"}}>Declining trend, high fallout, or low confidence</div>
            </div>
          </div>
          {needsAttention.length===0&&(
            <div style={{color:"#34d399",fontSize:12,padding:"20px 0",textAlign:"center"}}>
              ✓ No reps flagged right now
            </div>
          )}
          {needsAttention.map((r,i)=>{
            const ytdR=ytdData?.reps?.find(x=>x.rep===r.rep);
            const falloutHigh=r.fallout_rate>(teamAvg.fallout_rate*1.3);
            const stdDrop=ytdR&&(r.std_pct-ytdR.std_pct)<-0.04;
            const lowSample=r.demo<8;
            const flags=[];
            if(falloutHigh)flags.push({label:"High fallout",color:"#f87171"});
            if(stdDrop)flags.push({label:`STD% ↓${((ytdR.std_pct-r.std_pct)*100).toFixed(1)}pp`,color:"#fb923c"});
            if(lowSample)flags.push({label:"Low sample",color:"#fbbf24"});
            if(!falloutHigh&&!stdDrop&&!lowSample)flags.push({label:"Vol dropping",color:"#fb923c"});
            return(
              <div key={r.rep} onClick={()=>onOpenScorecard(r.rep)}
                style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:"var(--radius)",marginBottom:7,cursor:"pointer",background:"rgba(248,113,113,.04)",border:"1px solid rgba(248,113,113,.12)",transition:"all .15s"}}
                className="fade-up"
                onMouseEnter={e=>{e.currentTarget.style.background="rgba(248,113,113,.08)";e.currentTarget.style.borderColor="rgba(248,113,113,.25)";}}
                onMouseLeave={e=>{e.currentTarget.style.background="rgba(248,113,113,.04)";e.currentTarget.style.borderColor="rgba(248,113,113,.12)";}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,color:"var(--text-primary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.rep}</div>
                  <div style={{fontSize:10,color:"var(--text-muted)",marginTop:2}}>{repOneLiner(r,ytdR)}</div>
                </div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"flex-end",flexShrink:0,maxWidth:140}}>
                  {flags.slice(0,2).map(f=>(
                    <span key={f.label} style={{fontSize:9,fontWeight:700,color:f.color,background:`${f.color}18`,padding:"2px 6px",borderRadius:3,border:`1px solid ${f.color}30`,whiteSpace:"nowrap"}}>{f.label}</span>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── ROW 2: MOMENTUM ── */}
      {hasTrends&&(
        <div style={{background:"var(--bg-surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",padding:18,marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
            <span style={{fontSize:15}}>📈</span>
            <div>
              <div style={{fontWeight:800,fontSize:13,color:"var(--text-primary)",fontFamily:"var(--font-display)"}}>Trend Movement</div>
              <div style={{fontSize:10,color:"var(--text-muted)"}}>R30 vs YTD baseline — who's moving and in which direction</div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {/* HEATING */}
            <div>
              <div style={{fontSize:10,color:"#34d399",fontWeight:700,letterSpacing:".07em",textTransform:"uppercase",marginBottom:8}}>🔥 Heating Up</div>
              {momentumRows.heating.map((r,i)=>{
                const cl=momentumLabel(r.composite);
                const stdDelta=r.r30R.std_pct-r.ytdR.std_pct;
                return(
                  <div key={r.rep} onClick={()=>onOpenScorecard(r.rep)}
                    style={{display:"flex",alignItems:"center",gap:8,padding:"8px 11px",borderRadius:"var(--radius-sm)",marginBottom:5,cursor:"pointer",background:"var(--bg-elevated)",border:"1px solid var(--border)",transition:"all .15s"}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(52,211,153,.3)";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:12,color:"var(--text-primary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.rep}</div>
                      <div style={{fontSize:10,color:"var(--text-muted)"}}>{TC[r.tier]&&<span style={{color:TC[r.tier]}}>{r.tier}</span>}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{color:cl.color,fontWeight:700,fontSize:11}}>{cl.text}</div>
                      {stdDelta>0.02&&<div style={{fontSize:9,color:"#34d399",fontFamily:"var(--font-mono)"}}>STD +{(stdDelta*100).toFixed(1)}pp</div>}
                    </div>
                  </div>
                );
              })}
              {momentumRows.heating.length===0&&<div style={{fontSize:11,color:"var(--text-muted)",padding:"12px 0"}}>No reps heating up right now</div>}
            </div>
            {/* COOLING */}
            <div>
              <div style={{fontSize:10,color:"#38bdf8",fontWeight:700,letterSpacing:".07em",textTransform:"uppercase",marginBottom:8}}>❄️ Cooling Off</div>
              {momentumRows.cooling.map((r,i)=>{
                const cl=momentumLabel(r.composite);
                const stdDelta=r.r30R.std_pct-r.ytdR.std_pct;
                return(
                  <div key={r.rep} onClick={()=>onOpenScorecard(r.rep)}
                    style={{display:"flex",alignItems:"center",gap:8,padding:"8px 11px",borderRadius:"var(--radius-sm)",marginBottom:5,cursor:"pointer",background:"var(--bg-elevated)",border:"1px solid var(--border)",transition:"all .15s"}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(56,189,248,.3)";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border)";}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:12,color:"var(--text-primary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.rep}</div>
                      <div style={{fontSize:10,color:"var(--text-muted)"}}>{TC[r.tier]&&<span style={{color:TC[r.tier]}}>{r.tier}</span>}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{color:cl.color,fontWeight:700,fontSize:11}}>{cl.text}</div>
                      {stdDelta<-0.02&&<div style={{fontSize:9,color:"#fb923c",fontFamily:"var(--font-mono)"}}>STD {(stdDelta*100).toFixed(1)}pp</div>}

                );
              })}
              {momentumRows.cooling.length===0&&<div style={{fontSize:11,color:"var(--text-muted)",padding:"12px 0"}}>No reps cooling off right now</div>}
            </div>
          </div>
        </div>
      )}

      {/* ── ROW 3: MARKET SIGNALS + SYSTEM INSIGHTS ── */}
      <div style={{display:"grid",gridTemplateColumns:`${marketSignals.length?"1fr ":""}1fr`,gap:16}}>

        {/* MARKET SIGNALS */}
        {marketSignals.length>0&&(
          <div style={{background:"var(--bg-surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",padding:18}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>

                <div style={{fontWeight:800,fontSize:13,color:"var(--text-primary)",fontFamily:"var(--font-display)"}}>Market Signals</div>
                <div style={{fontSize:10,color:"var(--text-muted)"}}>Net vol per appointment — normalized for fair comparison</div>

            {(()=>{

<div style={{background:"var(--bg-surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",padding:18}}>

      </div>

      {expandedInsight === i && ins.reps?.length > 0 && (
        <div style={{marginTop:6,fontSize:11,color:"var(--text-muted)"}}>
          {ins.reps.map(r => r.rep).join(", ")}
        </div>
      )}
    </div>
  ))}
</div>
      </div>
    </div>
  );
}

function App(){

  const [search,setSearch]=useState("");

  useEffect(()=>{
    (async()=>{
      const r=await db.get("r30");if(r)setR30(r);
      const y=await db.get("ytd");if(y)setYtd(y);
      const h=await db.get("history");if(h)setHistory(Array.isArray(h)?h:[]);
      const m=await db.get("markets");if(m){setMarkets(m.assignments||{});setMarketList(m.list||[]);}
    })();
    const iv=setInterval(async()=>{
      const r=await db.get("r30");if(r)setR30(r);
      const y=await db.get("ytd");if(y)setYtd(y);
      const h=await db.get("history");if(h)setHistory(Array.isArray(h)?h:[]);
      const m=await db.get("markets");if(m){setMarkets(m.assignments||{});setMarketList(m.list||[]);}
    },30000);
    return()=>clearInterval(iv);
  },[]);

  const curForTable=salesSub==="ytd"?ytd:r30;
  const teamAvgs=useMemo(()=>{
    const src=curForTable?.reps?.filter(r=>r.tier!=="⛔ Excluded")||[];
    const avg=f=>{const v=src.map(r=>r[f]??0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;};
    return{net_vol:avg("net_vol"),std_pct:avg("std_pct"),otd_pct:avg("otd_pct"),avg_deal:avg("avg_deal"),net_issue_rate:avg("net_issue_rate"),fallout_rate:avg("fallout_rate")};
  },[curForTable]);

  const upload=useCallback(async e=>{
    const file=e.target.files[0];if(!file)return;
    setUploading(true);setMsg("Reading CSV...");
    try{
      const text=await new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=rej;fr.readAsText(file);});
      setMsg("Parsing...");
      const out=processCSV(text,uploadWin);
      setMsg("Saving...");
      await db.set(uploadWin,out);
      uploadWin==="r30"?setR30(out):setYtd(out);
      if(uploadWin==="r30"){
        const h=await db.get("history")||[];
        const hist=Array.isArray(h)?h:[];
        const existing=hist.findIndex(x=>x.sdate===out.sdate&&x.edate===out.edate);
        const snapshot={win:uploadWin,sdate:out.sdate,edate:out.edate,updated:out.updated,date_range:out.date_range,reps:out.reps.map(r=>({rep:r.rep,tier:r.tier,rank:r.rank,score:r.score,std_pct:r.std_pct,otd_pct:r.otd_pct,net_vol:r.net_vol,avg_deal:r.avg_deal,net_issue_rate:r.net_issue_rate,fallout_rate:r.fallout_rate,demo:r.demo}))};
        if(existing>=0)hist[existing]=snapshot;else hist.push(snapshot);
        const trimmed=hist.slice(-52);
        await db.set("history",trimmed);setHistory(trimmed);
      }
      setSalesSub(uploadWin);setMainTab("dashboard");setModal(false);setMsg("");
    }catch(err){setMsg("Error: "+err.message);}
    finally{setUploading(false);if(fileRef.current)fileRef.current.value="";}
  },[uploadWin]);

  const tgSort=f=>setSort(s=>s.f===f?{f,d:s.d==="asc"?"desc":"asc"}:{f,d:f==="rank"?"asc":"desc"});
  const active=curForTable?.reps?.filter(r=>r.tier!=="⛔ Excluded").length??0;

  const tableRows=useMemo(()=>{
    const src=salesSub==="ytd"?ytd:r30;
    if(!src?.reps)return[];
    let list=[...src.reps];
    if(search)list=list.filter(r=>r.rep?.toLowerCase().includes(search.toLowerCase()));
    if(marketFilter==="__unassigned__")list=list.filter(r=>!markets[r.rep]||markets[r.rep]==="");
    else if(marketFilter)list=list.filter(r=>markets[r.rep]===marketFilter);
    list.sort((a,b)=>{
      let av=a[sort.f],bv=b[sort.f];
      if(sort.f==="rank"){av=a.rank==="-"?9999:a.rank;bv=b.rank==="-"?9999:b.rank;}
      if(sort.f==="_gap"){av=gapPts(a)??-999;bv=gapPts(b)??-999;}
      if(typeof av==="string")return sort.d==="asc"?av.localeCompare(bv):bv.localeCompare(av);
      return sort.d==="asc"?(av??0)-(bv??0):(bv??0)-(av??0);
    });
    return list;
  },[salesSub,r30,ytd,search,sort,marketFilter,markets]);

  const deepRows=useMemo(()=>(curForTable?.reps||[]).filter(r=>r.tier!=="⛔ Excluded").sort((a,b)=>b.net_vol-a.net_vol),[curForTable]);
  const allRepsForDispatch=useMemo(()=>(r30?.reps||ytd?.reps||[]),[r30,ytd]);

  const TH=({f,label,c,title})=>(

        </div>

            {label}

        <button onClick={()=>{setModal(true);setMsg("");}} className="btn-primary">+ Upload CSV</button>

      {/* ── UPLOAD MODAL ── */}
      {modal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget&&!uploading)setModal(false);}}>
          <div className="fade-up" style={{background:"var(--bg-surface)",border:"1px solid var(--border-strong)",borderRadius:"var(--radius-lg)",padding:28,width:400,maxWidth:"92vw"}}>
            <div style={{fontWeight:800,fontSize:16,marginBottom:20,fontFamily:"var(--font-display)"}}>Upload CSV Report</div>
            <div style={{fontSize:10,color:"var(--text-muted)",marginBottom:8,letterSpacing:".08em",textTransform:"uppercase",fontWeight:700}}>Target Window</div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              {["r30","ytd"].map(w=>(
                <button key={w} onClick={()=>!uploading&&setUploadWin(w)} style={{flex:1,padding:"9px 0",borderRadius:"var(--radius-sm)",fontFamily:"inherit",border:`1.5px solid ${uploadWin===w?"#38bdf8":"var(--border)"}`,background:uploadWin===w?"rgba(56,189,248,.08)":"transparent",color:uploadWin===w?"#38bdf8":"var(--text-muted)",cursor:uploading?"not-allowed":"pointer",fontSize:12,fontWeight:600,transition:"all .15s"}}>

      {mainTab==="dispatch"&&(
        <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 52px)"}}>
          <div style={{background:"var(--bg-surface)",borderBottom:"1px solid var(--border)",padding:"10px 22px",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            <div className="seg-control">
              {[["tracker","🗂 Tracker"],["compare","⚖ Compare"],["markets","🗺 Markets"],["repmap","📍 Rep Map"]].map(([v,label])=>(
                <button key={v} className={`seg-btn${dispatchSub===v?" active":""}`} onClick={()=>setDispatchSub(v)}>{label}</button>
              ))}
            </div>
          </div>
          <div style={{flex:1,overflowY:dispatchSub==="repmap"||dispatchSub==="tracker"?"hidden":"auto"}}>
            {dispatchSub==="tracker"&&<TrackerTab allReps={allRepsForDispatch} markets={markets}/>}
            {dispatchSub==="compare"&&<ComparisonTool r30Data={r30} ytdData={ytd} markets={markets} marketList={marketList}/>}
            {dispatchSub==="markets"&&<MarketManager r30Data={r30} ytdData={ytd} markets={markets} marketList={marketList} onSave={(a,l)=>{setMarkets(a);setMarketList(l);}}/>}
            {dispatchSub==="repmap"&&<RepMapTab allReps={allRepsForDispatch} markets={markets}/>}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
