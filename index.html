  const REP_COLORS=["#f97316","#38bdf8","#4ade80","#a78bfa","#fb7185","#fbbf24","#34d399","#60a5fa","#e879f9","#f472b6","#84cc16","#22d3ee","#c084fc","#fb923c","#2dd4bf"];
  const repColor=idx=>REP_COLORS[idx%REP_COLORS.length];

  const showToast=(msg,type="")=>{
    clearTimeout(toastTimer.current);
    setToast({msg,type});
    toastTimer.current=setTimeout(()=>setToast(null),2800);
  };

  // Load from Firebase on mount
  useEffect(()=>{
    (async()=>{
      const d=await db.get("repmap");
      if(d&&Array.isArray(d))setRepData(d);
    })();
  },[]);

  // Sync from allReps — add any missing reps (no address yet)
  useEffect(()=>{
    if(!allReps.length)return;
    setRepData(prev=>{
      const existing=new Set(prev.map(r=>r.rep));
      const newOnes=allReps
        .filter(r=>r.tier!=="⛔ Excluded"&&markets[r.rep]!=="⛔ Terminated"&&!existing.has(r.rep))
        .map(r=>({rep:r.rep,address:"",lat:null,lng:null,destinations:["","",""]}));
      if(!newOnes.length)return prev;
      return [...prev,...newOnes];
    });
  },[allReps,markets]);

  // Save to Firebase whenever repData changes (debounced)
  const saveTimer=useRef(null);
  useEffect(()=>{
    if(!repData.length)return;
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      await db.set("repmap",repData);
    },1500);
  },[repData]);

  // Init Leaflet map
  useEffect(()=>{
    if(!mapRef.current||leafletMap.current)return;
    const map=L.map(mapRef.current,{center:[27.8,-81.7],zoom:7,zoomControl:false});
    L.control.zoom({position:"bottomright"}).addTo(map);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
      attribution:"© OpenStreetMap contributors",maxZoom:19
    }).addTo(map);
    routeLayerRef.current=L.layerGroup().addTo(map);
    leafletMap.current=map;
    // Fix Leaflet tile CSS interference with React's scoped styles
    setTimeout(()=>map.invalidateSize(),100);
    return()=>{map.remove();leafletMap.current=null;};
  },[]);

  // Render markers whenever repData or activeRep changes
  useEffect(()=>{
    if(!leafletMap.current)return;
    markersRef.current.forEach(m=>m.remove());
    markersRef.current=[];
    repData.forEach((rep,idx)=>{
      if(rep.lat==null||rep.lng==null)return;
      const color=repColor(idx);
      const isActive=rep.rep===activeRep;
      const initial=(rep.rep.split(",")[1]?.trim()[0]||rep.rep[0]||"?").toUpperCase();
      const div=document.createElement("div");
      div.style.cssText=`width:32px;height:32px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;border:2px solid ${isActive?"#fff":"rgba(255,255,255,0.3)"};box-shadow:0 2px 8px rgba(0,0,0,0.5);cursor:pointer;transform:${isActive?"scale(1.25)":"scale(1)"};transition:transform .15s;font-family:system-ui`;
      div.textContent=initial;
      const icon=L.divIcon({className:"",html:div,iconSize:[32,32],iconAnchor:[16,16],popupAnchor:[0,-20]});
      const marker=L.marker([rep.lat,rep.lng],{icon});
      marker.bindPopup(`<div style="font-family:system-ui;padding:2px"><div style="font-weight:700;font-size:14px;color:#f1f5f9;margin-bottom:4px">${rep.rep}</div><div style="font-size:11px;color:#94a3b8">${rep.address||"No address set"}</div>${markets[rep.rep]?`<div style="font-size:10px;color:#f59e0b;margin-top:3px">📍 ${markets[rep.rep]}</div>`:""}</div>`);
      marker.on("click",()=>{setActiveRep(rep.rep);setPanel("reps");});
      marker.addTo(leafletMap.current);
      markersRef.current.push(marker);
    });
  },[repData,activeRep]);

  // Helpers
  const haversine=(lat1,lng1,lat2,lng2)=>{
    const R=3958.8,dL=(lat2-lat1)*Math.PI/180,dl=(lng2-lng1)*Math.PI/180;
    const a=Math.sin(dL/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dl/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  };
  const nominatim=async addr=>{
    const q=addr.toLowerCase().includes("fl")||addr.toLowerCase().includes("florida")?addr:addr+", Florida, USA";
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`,{headers:{"Accept-Language":"en"}});
    const d=await r.json();
    return d&&d[0]?{lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)}:null;
  };
  const fmtTime=mins=>{const h=Math.floor(mins/60),m=mins%60;return h>0?`${h}h ${m}m`:`${m}m`;};

  const geocodeRep=async()=>{
    if(!addrInput.trim()){showToast("Enter an address first","error");return;}
    setGeocoding(true);showToast("Geocoding…");
    const geo=await nominatim(addrInput.trim());
    if(geo){
      setRepData(prev=>prev.map(r=>r.rep===activeRep?{...r,address:addrInput.trim(),lat:geo.lat,lng:geo.lng}:r));
      showToast("Location found ✓","success");
      if(leafletMap.current)leafletMap.current.flyTo([geo.lat,geo.lng],11,{duration:1});
    }else{showToast("Address not found — try a more specific address","error");}
    setGeocoding(false);
  };

  const calcRoutes=async()=>{
    const rep=repData.find(r=>r.rep===activeRep);
    if(!rep||rep.lat==null){showToast("Locate rep address first","error");return;}
    const active=destInputs.filter(d=>d.trim());
    if(!active.length){showToast("Enter at least one destination","error");return;}
    setRepData(prev=>prev.map(r=>r.rep===activeRep?{...r,destinations:destInputs}:r));
    setCalcingRoutes(true);
    const newResults={};
    for(let i=0;i<destInputs.length;i++){
      const dest=destInputs[i].trim();
      if(!dest)continue;
      newResults[i]={loading:true};
      setRouteResults(r=>({...r,[activeRep]:{...r[activeRep],...newResults}}));
      try{
        const dGeo=await nominatim(dest);
        if(!dGeo){newResults[i]={error:"Destination not found"};continue;}
        if(orsKey){
          const res=await fetch("https://api.openrouteservice.org/v2/directions/driving-car",{
            method:"POST",headers:{"Authorization":orsKey,"Content-Type":"application/json"},
            body:JSON.stringify({coordinates:[[rep.lng,rep.lat],[dGeo.lng,dGeo.lat]]})
          });
          const data=await res.json();
          if(data.routes?.[0]){
            const s=data.routes[0].summary;
            newResults[i]={miles:(s.distance*0.000621371).toFixed(1),time:fmtTime(Math.round(s.duration/60))};
          }else{newResults[i]={error:data.error?.message||"Route not found"};}
        }else{
          const miles=(haversine(rep.lat,rep.lng,dGeo.lat,dGeo.lng)*1.3).toFixed(1);
          newResults[i]={miles:miles+"*",time:fmtTime(Math.round(miles/45*60))+"*"};
        }
        await new Promise(r=>setTimeout(r,600));
      }catch(e){newResults[i]={error:"Network error"};}
    }
    setRouteResults(r=>({...r,[activeRep]:newResults}));
    setCalcingRoutes(false);
    showToast("Done ✓","success");
  };

  const quickRoute=async()=>{
    if(!qFrom.trim()||!qTo.trim()){showToast("Enter both From and To","error");return;}
    setQLoading(true);setQResult(null);
    try{
      const [fGeo,tGeo]=await Promise.all([nominatim(qFrom),nominatim(qTo)]);
      if(!fGeo||!tGeo){setQResult({error:"Could not locate one or both addresses"});setQLoading(false);return;}
      if(orsKey){
        const res=await fetch("https://api.openrouteservice.org/v2/directions/driving-car",{
          method:"POST",headers:{"Authorization":orsKey,"Content-Type":"application/json"},
          body:JSON.stringify({coordinates:[[fGeo.lng,fGeo.lat],[tGeo.lng,tGeo.lat]]})
        });
        const data=await res.json();
        if(data.routes?.[0]){
          const s=data.routes[0].summary;
          setQResult({miles:(s.distance*0.000621371).toFixed(1),time:fmtTime(Math.round(s.duration/60)),from:qFrom,to:qTo});
          routeLayerRef.current?.clearLayers();
          L.polyline([[fGeo.lat,fGeo.lng],[tGeo.lat,tGeo.lng]],{color:"#34d399",weight:3,opacity:.7,dashArray:"6,6"}).addTo(routeLayerRef.current);
          leafletMap.current?.fitBounds([[fGeo.lat,fGeo.lng],[tGeo.lat,tGeo.lng]],{padding:[50,50]});
        }else{setQResult({error:data.error?.message||"Route not found"});}
      }else{
        const miles=(haversine(fGeo.lat,fGeo.lng,tGeo.lat,tGeo.lng)*1.3).toFixed(1);
        setQResult({miles:miles+"*",time:fmtTime(Math.round(miles/45*60))+"*",from:qFrom,to:qTo,est:true});
        routeLayerRef.current?.clearLayers();
        L.polyline([[fGeo.lat,fGeo.lng],[tGeo.lat,tGeo.lng]],{color:"#34d399",weight:3,opacity:.7,dashArray:"6,6"}).addTo(routeLayerRef.current);
        leafletMap.current?.fitBounds([[fGeo.lat,fGeo.lng],[tGeo.lat,tGeo.lng]],{padding:[50,50]});
      }
    }catch(e){setQResult({error:"Network error: "+e.message});}
    setQLoading(false);
  };

  const activeRepData=repData.find(r=>r.rep===activeRep);

  // When switching to a rep, pre-fill inputs
  useEffect(()=>{
    if(!activeRepData)return;
    setAddrInput(activeRepData.address||"");
    setDestInputs(activeRepData.destinations?.length===3?activeRepData.destinations:["","",""]);
    setRouteResults({});
  },[activeRep]);

  const zoomToRep=()=>{
    if(!activeRepData?.lat){showToast("No location set","error");return;}
    leafletMap.current?.flyTo([activeRepData.lat,activeRepData.lng],12,{duration:1});
  };

  const filteredReps=repData.filter(r=>{
    if(markets[r.rep]==="⛔ Terminated")return false;
    return r.rep.toLowerCase().includes(search.toLowerCase())||(markets[r.rep]||"").toLowerCase().includes(search.toLowerCase());
  });
  const mapped=filteredReps.filter(r=>r.lat!=null);
  const unmapped=filteredReps.filter(r=>r.lat==null);

  // Styles matching the existing app
  const panelBg="#0d1120";const border="1px solid #1e2a3a";
  const inp={background:"#111827",border:"1px solid #1e2a3a",borderRadius:6,padding:"7px 11px",color:"#e2e8f0",fontSize:12,fontFamily:"inherit",outline:"none",width:"100%"};
  const btn=(accent)=>({background:accent?"linear-gradient(135deg,#0ea5e9,#6366f1)":"#111827",border:accent?"none":border,borderRadius:6,padding:"7px 14px",color:"#fff",fontWeight:accent?700:400,fontSize:12,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"});
  const sectionLbl={fontSize:10,color:"#334155",letterSpacing:".08em",textTransform:"uppercase",marginBottom:6};
  const card=(active)=>({background:active?"rgba(52,211,153,.06)":"#080c14",border:active?"1px solid #34d399":border,borderRadius:7,padding:"9px 12px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,marginBottom:5,transition:"all .15s"});

  const RouteResultBlock=({repKey})=>{
    const res=routeResults[repKey]||{};
    return(
      <div>
        {destInputs.map((dest,i)=>{
          if(!dest.trim())return null;
          const r=res[i];
          if(!r)return null;
          return(
            <div key={i} style={{background:"#080c14",border,borderRadius:7,marginTop:8,overflow:"hidden"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 11px",background:"rgba(52,211,153,.06)",borderBottom:border}}>
                <span style={{fontSize:11,color:"#34d399",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{dest}</span>
                <span style={{fontSize:10,color:"#334155",marginLeft:8,flexShrink:0}}>#{i+1}</span>
              </div>
              {r.loading?(
                <div style={{padding:"10px 12px",fontSize:11,color:"#64748b",display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:10,height:10,border:"2px solid #1e2a3a",borderTopColor:"#34d399",borderRadius:"50%",animation:"spin .6s linear infinite"}}/>Calculating…
                </div>
              ):r.error?(
                <div style={{padding:"10px 12px",fontSize:11,color:"#ef4444"}}>⚠ {r.error}</div>
              ):(
                <div style={{display:"flex",gap:24,padding:"10px 14px"}}>
                  <div>
                    <div style={{fontSize:18,fontWeight:800,color:"#f1f5f9"}}>{r.miles}</div>
                    <div style={{fontSize:10,color:"#64748b"}}>miles</div>
                  </div>
                  <div>
                    <div style={{fontSize:18,fontWeight:800,color:"#f1f5f9"}}>{r.time}</div>
                    <div style={{fontSize:10,color:"#64748b"}}>drive time</div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
        {!orsKey&&Object.keys(res).some(k=>res[k]&&!res[k].loading&&!res[k].error)&&(

        )}
      </div>
    );
  };

  return(
    <div style={{display:"flex",height:"calc(100vh - 52px)",overflow:"hidden",position:"relative"}}>

      {/* Toast */}
      {toast&&(
        <div style={{position:"absolute",bottom:20,left:"50%",transform:"translateX(-50%)",
          background:"#111827",border:`1px solid ${toast.type==="success"?"#4ade80":toast.type==="error"?"#ef4444":"#1e2a3a"}`,
          color:toast.type==="success"?"#4ade80":toast.type==="error"?"#ef4444":"#e2e8f0",
          borderRadius:8,padding:"9px 18px",fontSize:12,fontFamily:"inherit",zIndex:999,whiteSpace:"nowrap",
          boxShadow:"0 4px 20px rgba(0,0,0,.5)"}}>
          {toast.msg}
        </div>

      {/* Map */}
      <div style={{flex:1,position:"relative"}}>
        <div ref={mapRef} style={{width:"100%",height:"100%"}}/>
        {/* Leaflet dark tile overlay */}
        <style>{`.leaflet-tile{filter:brightness(0.6) saturate(0.7) hue-rotate(195deg);}.leaflet-container{background:#0d1a2e!important;}.leaflet-popup-content-wrapper{background:#0d1120!important;border:1px solid #1e2a3a!important;border-radius:8px!important;box-shadow:0 4px 20px rgba(0,0,0,.6)!important;color:#e2e8f0!important;}.leaflet-popup-tip{background:#0d1120!important;}.leaflet-popup-content{margin:10px 14px!important;}`}</style>

              </div>

              <div style={{marginBottom:12}}>
                <div style={sectionLbl}>Drive Distance Check — up to 3 destinations</div>

                  <div key={i} style={{display:"flex",gap:6,marginBottom:6,alignItems:"center"}}>
                    <span style={{fontSize:10,color:"#334155",width:14,flexShrink:0,fontFamily:"monospace"}}>{i+1}</span>
                    <input value={d} onChange={e=>setDestInputs(prev=>prev.map((v,j)=>j===i?e.target.value:v))}
                      onKeyDown={e=>e.key==="Enter"&&calcRoutes()}
                      placeholder="City or address in Florida" style={inp}/>
                  </div>
                ))}
                <button onClick={calcRoutes} disabled={calcingRoutes} style={{...btn(true),width:"100%",marginTop:6}}>
                  {calcingRoutes?"Calculating…":"Calculate Drives"}
                </button>
              </div>

              <RouteResultBlock repKey={activeRep}/>

              <div style={{display:"flex",gap:8,marginTop:14,borderTop:border,paddingTop:14}}>
                <button onClick={zoomToRep} style={{...btn(false),flex:1}}>🔍 Zoom to Rep</button>
              </div>
            </div>
          )}

          {/* ── ROUTE CHECK PANEL ── */}
          {panel==="route"&&(
            <div>
              <div style={{fontWeight:700,fontSize:13,color:"#f1f5f9",marginBottom:14}}>Quick Route Check</div>
              <div style={{marginBottom:10}}>
                <div style={sectionLbl}>From</div>
                <input value={qFrom} onChange={e=>setQFrom(e.target.value)} placeholder="City or address" style={inp}/>
              </div>
              <div style={{marginBottom:12}}>
                <div style={sectionLbl}>To</div>
                <input value={qTo} onChange={e=>setQTo(e.target.value)} onKeyDown={e=>e.key==="Enter"&&quickRoute()} placeholder="City or address" style={inp}/>
              </div>
              <button onClick={quickRoute} disabled={qLoading} style={{...btn(true),width:"100%"}}>
                {qLoading?"Calculating…":"Calculate"}
              </button>
              {qResult&&(
                <div style={{background:"#080c14",border,borderRadius:8,marginTop:14,overflow:"hidden"}}>
                  {qResult.error?(
                    <div style={{padding:"12px 14px",fontSize:12,color:"#ef4444"}}>⚠ {qResult.error}</div>
                  ):(
                    <>
                      <div style={{padding:"8px 12px",background:"rgba(52,211,153,.06)",borderBottom:border,fontSize:11,color:"#34d399",fontWeight:600}}>
                        {qResult.from} → {qResult.to}
                      </div>
                      <div style={{display:"flex",gap:24,padding:"12px 16px"}}>
                        <div><div style={{fontSize:22,fontWeight:800,color:"#f1f5f9"}}>{qResult.miles}</div><div style={{fontSize:10,color:"#64748b"}}>miles</div></div>
                        <div><div style={{fontSize:22,fontWeight:800,color:"#f1f5f9"}}>{qResult.time}</div><div style={{fontSize:10,color:"#64748b"}}>drive time</div></div>
                      </div>
                      {qResult.est&&<div style={{padding:"0 14px 10px",fontSize:10,color:"#334155"}}>* Estimated — add ORS key in Settings for accurate routing.</div>}
                    </>
                  )}
                </div>
              )}
            </div>
          )}

          {/* ── SETTINGS PANEL ── */}
          {panel==="settings"&&(
            <div>
              <div style={{fontWeight:700,fontSize:13,color:"#f1f5f9",marginBottom:14}}>Settings</div>

              <div style={{marginBottom:20}}>
                <div style={sectionLbl}>OpenRouteService API Key</div>
                <div style={{fontSize:11,color:"#64748b",marginBottom:8,lineHeight:1.6}}>
                  Free routing API — 2,000 req/day. Get your key at{" "}
                  <a href="https://openrouteservice.org/dev/#/signup" target="_blank"
                    style={{color:"#38bdf8",textDecoration:"none"}}>openrouteservice.org</a>.
                  Without it, distances are straight-line estimates.
                </div>
                <div style={{display:"flex",gap:6}}>
                  <input type="password" value={orsKeyInput} onChange={e=>setOrsKeyInput(e.target.value)}
                    placeholder="Paste ORS key here" style={{...inp,flex:1,fontFamily:"monospace"}}/>
                  <button onClick={()=>{setOrsKey(orsKeyInput);localStorage.setItem("ors_api_key",orsKeyInput);showToast("Key saved ✓","success");}}
                    style={{...btn(true),flexShrink:0}}>Save</button>
                </div>
                {orsKey&&<div style={{fontSize:10,color:"#4ade80",marginTop:5}}>✓ ORS key active — real road routing enabled</div>}
              </div>

              <div style={{borderTop:border,paddingTop:16}}>
                <div style={sectionLbl}>About</div>
                <div style={{fontSize:11,color:"#64748b",lineHeight:1.7}}>
                  Rep locations and addresses are stored in Firebase and shared across all dispatchers.<br/><br/>
                  Geocoding via OpenStreetMap Nominatim (free, Florida-biased).<br/><br/>
                  Reps are auto-populated from uploaded R30/YTD data. Terminated reps are hidden automatically.
                </div>
              </div>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

function useNow(){
  const [now,setNow]=useState(Date.now());
  useEffect(()=>{const iv=setInterval(()=>setNow(Date.now()),1000);return()=>clearInterval(iv);},[]);
  return now;
}

function fmtElapsed(ms){
  const s=Math.floor(ms/1000);
  const m=Math.floor(s/60),sec=s%60;
  if(m>=60){const h=Math.floor(m/60),rm=m%60;return`${h}h ${rm}m`;}
  return`${m}m ${sec}s`;
}

        <BtnGroup fieldKey="mainStructure" opts={[{val:"Yes",label:"Yes"},{val:"No",label:"No"}]}/>
      </div>

      {/* No Resize */}
      <div style={{marginBottom:10}}>
        <span style={lbl}>No Resize</span>
        <BtnGroup fieldKey="noResize" opts={[{val:"Yes",label:"Yes"},{val:"No",label:"No"}]}/>
      </div>

      {/* Marital Status */}
      <div style={{marginBottom:10}}>
        <span style={lbl}>Marital Status</span>
        <BtnGroup fieldKey="maritalStatus" opts={[
          {val:"Single",label:"Single"},{val:"Married",label:"Married"},
          {val:"Partners",label:"Partners"},{val:"Siblings",label:"Siblings"},
          {val:"Family/Friends",label:"Family/Friends"}
        ]}/>
      </div>

      {/* Gate Code */}
      <div style={{marginBottom:10}}>
        <span style={lbl}>Gate Code</span>
        <input value={form.gateCode} onChange={e=>set("gateCode",e.target.value)}
          placeholder="If applicable" style={inp}/>
      </div>

      {/* Notes */}
      <div style={{marginBottom:12}}>
        <span style={lbl}>Notes</span>
        <textarea value={form.notes} onChange={e=>set("notes",e.target.value)}
          placeholder="Additional notes..."
          style={{...inp,minHeight:60,resize:"vertical"}}/>
      </div>

      <button onClick={()=>onSubmit(form)} style={{
        width:"100%",padding:"10px 0",background:"linear-gradient(135deg,#0ea5e9,#6366f1)",
        border:"none",borderRadius:7,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"
      }}>Submit Log Entry</button>
    </div>
  );
}

function TrackerTab({allReps,markets}){
  const [dispatcher,setDispatcher]=useState(()=>localStorage.getItem("tracker_dispatcher")||null);
  const [slide,setSlide]=useState(1); // 1=type, 2=details
  const [interactionType,setInteractionType]=useState(null);
  const [selectedRep,setSelectedRep]=useState("");
  const [repSearch,setRepSearch]=useState("");
  const [dispatchSubtype,setDispatchSubtype]=useState("");
  const [dispatchNote,setDispatchNote]=useState("");
  const [otherNote,setOtherNote]=useState("");
  const [log,setLog]=useState([]);
  const [filterDispatcher,setFilterDispatcher]=useState("All");
  const now=useNow();

  // Load log from Firebase on mount + poll every 10s for real-time
  useEffect(()=>{
    const load=async()=>{
      const d=await db.get("tracker_log");
      if(d&&Array.isArray(d))setLog(d);
    };
    load();
    const iv=setInterval(load,10000);
    return()=>clearInterval(iv);
  },[]);

  const saveLog=async(newLog)=>{
    setLog(newLog);
    await db.set("tracker_log",newLog.slice(-200)); // keep last 200 entries
  };

  const selectDispatcher=(id)=>{
    setDispatcher(id);
    localStorage.setItem("tracker_dispatcher",id);
  };

  const resetFlow=()=>{setSlide(1);setInteractionType(null);setSelectedRep("");setRepSearch("");setDispatchSubtype("");setDispatchNote("");setOtherNote("");};

  const activeReps=useMemo(()=>{
    const seen=new Set();const list=[];
    for(const r of allReps.filter(x=>x.tier!=="⛔ Excluded"&&markets[x.rep]!=="⛔ Terminated")){
      if(!seen.has(r.rep)){seen.add(r.rep);list.push(r.rep);}
    }
    return list.sort();
  },[allReps,markets]);

  const submitEntry=(formData)=>{
    const ts=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    let autoNote=null;
    if(interactionType==="Dispatch"&&selectedRep&&dispatchSubtype){
      autoNote=`Representative ${selectedRep}, called in ${ts} stating ${dispatchSubtype}${dispatchNote.trim()?" - "+dispatchNote.trim():""}`;
    }
    const entry={
      id:Date.now()+"_"+Math.random().toString(36).slice(2,7),
      dispatcher,
      type:interactionType,
      rep:selectedRep||null,
      subtype:dispatchSubtype||null,
      note:interactionType==="Other"?(otherNote||null):autoNote,
      dispatchNote:dispatchNote||null,
      form:formData||null,
      timestamp:Date.now(),
      status:"active",
      completedAt:null,
    };
    const newLog=[entry,...log];
    saveLog(newLog);
    resetFlow();
  };

  const submitDispatch=()=>{
    if(!selectedRep||!dispatchSubtype)return;
    submitEntry(null);
  };

  const markComplete=(id)=>{
    const newLog=log.map(e=>e.id===id?{...e,status:"done",completedAt:Date.now()}:e);
    saveLog(newLog);
  };

  const urgent=log.filter(e=>e.status==="active"&&(now-e.timestamp)>=URGENT_MS);
  const active=log.filter(e=>e.status==="active"&&(now-e.timestamp)<URGENT_MS);
  const done=log.filter(e=>e.status==="done");

  const filteredLog=[...urgent,...active,...done].filter(e=>
    filterDispatcher==="All"||e.dispatcher===filterDispatcher
  );

  const dispColor=id=>DISPATCHERS.find(d=>d.id===id)?.color??"#64748b";
  const typeColor=t=>t==="Dispatch"?"#38bdf8":t==="Setting"?"#4ade80":t==="Confirming"?"#f59e0b":t==="Other"?"#a78bfa":"#64748b";

  const LogEntry=({entry})=>{
    const elapsed=entry.status==="done"
      ?entry.completedAt-entry.timestamp
      :now-entry.timestamp;
    const isUrgent=entry.status==="active"&&elapsed>=URGENT_MS;
    const isDone=entry.status==="done";
    const dc=dispColor(entry.dispatcher);
    const tc=typeColor(entry.type);
    return(
      <div style={{
        background:isDone?"#080c14":isUrgent?"rgba(239,68,68,.06)":"#0d1120",
        border:`1px solid ${isDone?"#1e2a3a":isUrgent?"rgba(239,68,68,.4)":"#1e2a3a"}`,
        borderRadius:8,padding:"10px 14px",marginBottom:6,
        opacity:isDone?.65:1,
        transition:"all .3s"
      }}>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          {isUrgent&&<span style={{fontSize:10,fontWeight:800,color:"#ef4444",
            background:"rgba(239,68,68,.15)",padding:"2px 7px",borderRadius:4,animation:"pulse 1.5s infinite"}}>
            🚨 URGENT
          </span>}
          {isDone&&<span style={{fontSize:10,color:"#4ade80",fontWeight:700}}>✓ DONE</span>}
          <span style={{fontSize:12,fontWeight:700,color:dc,background:`${dc}18`,
            padding:"2px 8px",borderRadius:4}}>{entry.dispatcher}</span>
          <span style={{fontSize:12,fontWeight:600,color:tc}}>{entry.type}</span>
          {entry.rep&&<span style={{fontSize:11,color:"#94a3b8"}}>→ {entry.rep}</span>}
          {entry.subtype&&<span style={{fontSize:11,color:"#64748b",background:"#1e2a3a",
            padding:"1px 6px",borderRadius:3}}>{entry.subtype}</span>}
          {entry.note&&<span style={{fontSize:11,color:"#64748b",fontStyle:"italic",maxWidth:300,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>"{entry.note}"</span>}
          {entry.form&&entry.form.customerName&&
            <span style={{fontSize:10,color:"#64748b"}}>👤 {entry.form.customerName}</span>}
          {entry.form&&entry.form.promoter&&
            <span style={{fontSize:10,color:"#64748b"}}>📢 {entry.form.promoter}</span>}
          {entry.form&&(entry.type==="Setting"||entry.type==="Confirming")&&(
            <span style={{fontSize:10,color:"#64748b"}}>
              {entry.form.apptDate} @ {entry.form.apptTime} · {entry.form.homeType}
            </span>
          )}
          <div style={{flex:1}}/>
          <span style={{fontSize:11,color:isDone?"#4ade80":isUrgent?"#ef4444":"#64748b",fontWeight:isUrgent?700:400,fontFamily:"monospace"}}>
            {fmtElapsed(elapsed)}{isDone?" total":""}
          </span>
          <span style={{fontSize:10,color:"#334155"}}>
            {new Date(entry.timestamp).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}
          </span>
          {!isDone&&(
            <button onClick={()=>markComplete(entry.id)} style={{
              background:"rgba(74,222,128,.12)",border:"1px solid rgba(74,222,128,.3)",
              borderRadius:5,padding:"3px 10px",color:"#4ade80",cursor:"pointer",
              fontSize:11,fontWeight:700,fontFamily:"inherit"
            }}>✓ Done</button>
          )}
        </div>
        {entry.form&&(entry.type==="Setting"||entry.type==="Confirming")&&(
          <div style={{marginTop:6,display:"flex",flexWrap:"wrap",gap:8,fontSize:10,color:"#475569"}}>
            {entry.form.phone&&<span>📞 {entry.form.phone}</span>}
            {entry.form.address&&<span>📍 {entry.form.address}</span>}
            {entry.form.windows&&<span>🪟 {entry.form.windows}win</span>}
            {entry.form.doors&&<span>🚪 {entry.form.doors}dr</span>}
            {entry.form.sliders&&<span>🔲 {entry.form.sliders}sl</span>}
            {entry.form.maritalStatus&&<span>👥 {entry.form.maritalStatus}</span>}
            {entry.form.gateCode&&<span>🔑 {entry.form.gateCode}</span>}
          </div>
        )}
      </div>
    );
  };

  const sel={background:"#080c14",border:"1px solid #1e2a3a",borderRadius:6,
    padding:"7px 10px",color:"#e2e8f0",fontSize:12,fontFamily:"inherit",outline:"none"};

  return(
    <div style={{display:"grid",gridTemplateColumns:"380px 1fr",height:"calc(100vh - 52px)",overflow:"hidden"}}>

      {/* LEFT PANEL — Input Flow */}
      <div style={{background:"#0d1120",borderRight:"1px solid #1e2a3a",overflowY:"auto",padding:20}}>

        {/* Dispatcher selector — always visible */}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:10,color:"#334155",letterSpacing:".08em",marginBottom:10,textTransform:"uppercase"}}>
            Who are you?
          </div>
          <div style={{display:"flex",gap:8}}>
            {DISPATCHERS.map(d=>(
              <div key={d.id} onClick={()=>selectDispatcher(d.id)} style={{
                flex:1,padding:"14px 8px",borderRadius:8,textAlign:"center",cursor:"pointer",
                border:`2px solid ${dispatcher===d.id?d.color:"#1e2a3a"}`,
                background:dispatcher===d.id?d.bg:"#080c14",
                transition:"all .15s"
              }}>
                <div style={{fontSize:22,fontWeight:900,color:dispatcher===d.id?d.color:"#334155",lineHeight:1}}>{d.id}</div>
              </div>
            ))}
          </div>
        </div>

        {!dispatcher&&(
          <div style={{textAlign:"center",color:"#334155",padding:"40px 0",fontSize:13}}>
            Select your name above to begin logging
          </div>
        )}

        {dispatcher&&(
          <>
            {/* Slide 1 — Interaction Type */}
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,color:"#334155",letterSpacing:".08em",marginBottom:10,textTransform:"uppercase"}}>
                Interaction Type
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {INTERACTION_TYPES.map(t=>(
                  <div key={t} onClick={()=>{setInteractionType(t);setSlide(2);setSelectedRep("");setDispatchSubtype("");}}
                    style={{
                      padding:"12px 8px",borderRadius:8,textAlign:"center",cursor:"pointer",
                      border:`1.5px solid ${interactionType===t?typeColor(t):"#1e2a3a"}`,
                      background:interactionType===t?`${typeColor(t)}12`:"#080c14",
                      color:interactionType===t?typeColor(t):"#64748b",
                      fontWeight:interactionType===t?700:400,fontSize:13,
                      transition:"all .15s"
                    }}>{t}</div>
                ))}
              </div>
            </div>

            {/* Slide 2 — Details */}
            {interactionType&&(
              <div style={{borderTop:"1px solid #1e2a3a",paddingTop:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:typeColor(interactionType)}}>{interactionType}</div>
                  <button onClick={resetFlow} style={{background:"none",border:"none",color:"#334155",cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>✕ Reset</button>
                </div>

                {/* DISPATCH */}
                {interactionType==="Dispatch"&&(
                  <div>
                    <div style={{marginBottom:12,position:"relative"}}>
                      <div style={{fontSize:10,color:"#334155",letterSpacing:".06em",marginBottom:6,textTransform:"uppercase"}}>Rep</div>
                      <input
                        value={repSearch}
                        onChange={e=>{setRepSearch(e.target.value);setSelectedRep("");}}
                        placeholder="Type first or last name..."
                        style={{background:"#080c14",border:`1px solid ${selectedRep?"#38bdf8":"#1e2a3a"}`,borderRadius:6,
                          padding:"7px 10px",color:"#e2e8f0",fontSize:12,fontFamily:"inherit",outline:"none",width:"100%"}}
                      />
                      {repSearch&&!selectedRep&&(()=>{
                        const filtered=activeReps.filter(r=>r.toLowerCase().includes(repSearch.toLowerCase()));
                        return filtered.length>0?(
                          <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:20,
                            background:"#0d1120",border:"1px solid #1e2a3a",borderRadius:6,
                            maxHeight:160,overflowY:"auto",marginTop:2}}>
                            {filtered.map(r=>(
                              <div key={r} onMouseDown={()=>{setSelectedRep(r);setRepSearch(r);}} style={{
                                padding:"8px 10px",cursor:"pointer",fontSize:12,color:"#94a3b8",
                                borderBottom:"1px solid #1e2a3a",
                                transition:"background .1s"
                              }}
                              onMouseEnter={e=>e.currentTarget.style.background="rgba(56,189,248,.08)"}
                              onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                              >{r}</div>
                            ))}
                          </div>
                        ):repSearch.length>0?(
                          <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:20,
                            background:"#0d1120",border:"1px solid #1e2a3a",borderRadius:6,
                            padding:"10px",fontSize:11,color:"#334155",marginTop:2}}>No reps found</div>
                        ):null;
                      })()}
                      {selectedRep&&(
                        <div style={{marginTop:5,fontSize:11,color:"#38bdf8",fontWeight:700}}>
                          ✓ {selectedRep}
                          <span onClick={()=>{setSelectedRep("");setRepSearch("");}} style={{
                            marginLeft:8,color:"#334155",cursor:"pointer",fontWeight:400}}>✕</span>
                        </div>
                      )}
                    </div>
                    <div style={{marginBottom:12}}>
                      <div style={{fontSize:10,color:"#334155",letterSpacing:".06em",marginBottom:8,textTransform:"uppercase"}}>Interaction</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                        {DISPATCH_SUBTYPES.map(s=>(
                          <div key={s} onClick={()=>setDispatchSubtype(s)} style={{
                            padding:"8px 10px",borderRadius:6,cursor:"pointer",textAlign:"center",fontSize:11,
                            border:`1.5px solid ${dispatchSubtype===s?"#38bdf8":"#1e2a3a"}`,
                            background:dispatchSubtype===s?"rgba(56,189,248,.1)":"#080c14",
                            color:dispatchSubtype===s?"#38bdf8":"#64748b",
                            transition:"all .15s"
                          }}>{s}</div>
                        ))}
                      </div>
                    </div>
                    <div style={{marginBottom:14}}>
                      <div style={{fontSize:10,color:"#334155",letterSpacing:".06em",marginBottom:5,textTransform:"uppercase"}}>Note (optional)</div>
                      <textarea value={dispatchNote} onChange={e=>setDispatchNote(e.target.value)}
                        placeholder="Additional detail about this dispatch..."
                        style={{background:"#080c14",border:"1px solid #1e2a3a",borderRadius:6,
                          padding:"8px 10px",color:"#e2e8f0",fontSize:12,fontFamily:"inherit",
                          outline:"none",width:"100%",minHeight:60,resize:"vertical"}}/>
                      {selectedRep&&dispatchSubtype&&(
                        <div style={{marginTop:6,padding:"7px 10px",background:"rgba(56,189,248,.05)",
                          border:"1px solid rgba(56,189,248,.15)",borderRadius:6,fontSize:10,color:"#64748b",
                          lineHeight:1.6,fontStyle:"italic"}}>
                          📋 Preview: <span style={{color:"#94a3b8"}}>Representative {selectedRep}, called in [time] stating {dispatchSubtype}{dispatchNote.trim()?" - "+dispatchNote.trim():""}</span>
                        </div>
                      )}
                    </div>
                    <button onClick={submitDispatch}
                      disabled={!selectedRep||!dispatchSubtype}
                      style={{width:"100%",padding:"10px 0",
                        background:(!selectedRep||!dispatchSubtype)?"#1e2a3a":"linear-gradient(135deg,#0ea5e9,#6366f1)",
                        border:"none",borderRadius:7,color:(!selectedRep||!dispatchSubtype)?"#334155":"#fff",
                        fontWeight:700,fontSize:13,cursor:(!selectedRep||!dispatchSubtype)?"not-allowed":"pointer",fontFamily:"inherit"
                      }}>Log Entry</button>
                  </div>
                )}

                {/* SETTING */}
                {interactionType==="Setting"&&(
                  <div>
                    <ConfirmingForm onSubmit={submitEntry} showSetter={false}/>
                  </div>
                )}

                {/* CONFIRMING */}
                {interactionType==="Confirming"&&(
                  <div>
                    <ConfirmingForm onSubmit={submitEntry} showSetter={true}/>
                  </div>
                )}

                {/* OTHER */}
                {interactionType==="Other"&&(
                  <div>
                    <div style={{marginBottom:12}}>
                      <div style={{fontSize:10,color:"#334155",letterSpacing:".06em",marginBottom:8,textTransform:"uppercase"}}>Rep (optional)</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,maxHeight:160,overflowY:"auto"}}>
                        <div onClick={()=>setSelectedRep("")} style={{
                          padding:"7px 10px",borderRadius:6,cursor:"pointer",fontSize:11,
                          border:`1.5px solid ${selectedRep===""?"#a78bfa":"#1e2a3a"}`,
                          background:selectedRep===""?"rgba(167,139,250,.12)":"#080c14",
                          color:selectedRep===""?"#e2e8f0":"#64748b",
                          transition:"all .12s",textAlign:"center",fontStyle:"italic"
                        }}>— none —</div>
                        {activeReps.map(r=>(
                          <div key={r} onClick={()=>setSelectedRep(r)} style={{
                            padding:"7px 10px",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:selectedRep===r?700:400,
                            border:`1.5px solid ${selectedRep===r?"#a78bfa":"#1e2a3a"}`,
                            background:selectedRep===r?"rgba(167,139,250,.12)":"#080c14",
                            color:selectedRep===r?"#e2e8f0":"#64748b",
                            transition:"all .12s",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"
                          }}>{r}</div>
                        ))}
                      </div>
                    </div>
                    <div style={{marginBottom:12}}>
                      <div style={{fontSize:10,color:"#334155",letterSpacing:".06em",marginBottom:5,textTransform:"uppercase"}}>Note</div>
                      <textarea value={otherNote} onChange={e=>setOtherNote(e.target.value)}
                        placeholder="What happened?"
                        style={{background:"#080c14",border:"1px solid #1e2a3a",borderRadius:6,
                          padding:"8px 10px",color:"#e2e8f0",fontSize:12,fontFamily:"inherit",
                          outline:"none",width:"100%",minHeight:80,resize:"vertical"}}/>
                    </div>
                    <button onClick={()=>submitEntry(null)} disabled={!otherNote.trim()}
                      style={{width:"100%",padding:"10px 0",
                        background:!otherNote.trim()?"#1e2a3a":"linear-gradient(135deg,#a78bfa,#6366f1)",
                        border:"none",borderRadius:7,color:!otherNote.trim()?"#334155":"#fff",
                        fontWeight:700,fontSize:13,cursor:!otherNote.trim()?"not-allowed":"pointer",fontFamily:"inherit"
                      }}>Log Entry</button>
                  </div>
                )}
              </div>
            )}
          </>
        )}
      </div>

      {/* RIGHT PANEL — Log */}
      <div style={{overflowY:"auto",padding:20,background:"#080c14"}}>

        {/* Urgent bucket */}
        {urgent.filter(e=>filterDispatcher==="All"||e.dispatcher===filterDispatcher).length>0&&(
          <div style={{marginBottom:20,background:"rgba(239,68,68,.04)",border:"1px solid rgba(239,68,68,.25)",borderRadius:10,padding:14}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <span style={{fontSize:13,fontWeight:800,color:"#ef4444"}}>🚨 URGENT</span>
              <span style={{fontSize:11,color:"#ef4444",opacity:.7}}>— tasks over 5 minutes</span>
              <span style={{marginLeft:"auto",fontSize:11,fontWeight:700,color:"#ef4444",
                background:"rgba(239,68,68,.15)",padding:"2px 8px",borderRadius:12}}>
                {urgent.filter(e=>filterDispatcher==="All"||e.dispatcher===filterDispatcher).length}
              </span>
            </div>
            {urgent.filter(e=>filterDispatcher==="All"||e.dispatcher===filterDispatcher).map(e=><LogEntry key={e.id} entry={e}/>)}
          </div>
        )}

        {/* Filter + header */}
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
          <div style={{fontWeight:700,fontSize:13,color:"#e2e8f0",flex:1}}>
            Activity Log
            <span style={{marginLeft:8,fontSize:11,color:"#334155",fontWeight:400}}>
              {log.length} entries · updates every 10s
            </span>
          </div>
          <div style={{display:"flex",gap:6}}>
            {["All","RJ","BR","JF"].map(d=>(
              <button key={d} onClick={()=>setFilterDispatcher(d)}
                style={{padding:"5px 12px",borderRadius:6,fontFamily:"inherit",fontSize:11,cursor:"pointer",
                  border:`1.5px solid ${filterDispatcher===d?(dispColor(d)==="#64748b"?"#e2e8f0":dispColor(d)):"#1e2a3a"}`,
                  background:filterDispatcher===d?"rgba(255,255,255,.05)":"transparent",
                  color:filterDispatcher===d?(dispColor(d)==="#64748b"?"#e2e8f0":dispColor(d)):"#64748b",
                  fontWeight:filterDispatcher===d?700:400}}>
                {d}
              </button>
            ))}
          </div>
        </div>

        {/* Active (non-urgent) */}
        {active.filter(e=>filterDispatcher==="All"||e.dispatcher===filterDispatcher).map(e=><LogEntry key={e.id} entry={e}/>)}

        {/* Done */}
        {done.filter(e=>filterDispatcher==="All"||e.dispatcher===filterDispatcher).length>0&&(
          <div style={{marginTop:16}}>
            <div style={{fontSize:10,color:"#1e2a3a",letterSpacing:".08em",textTransform:"uppercase",marginBottom:8,paddingTop:8,borderTop:"1px solid #1e2a3a"}}>
              Completed
            </div>
            {done.filter(e=>filterDispatcher==="All"||e.dispatcher===filterDispatcher).map(e=><LogEntry key={e.id} entry={e}/>)}
          </div>
        )}

        {filteredLog.length===0&&(
          <div style={{textAlign:"center",color:"#1e2a3a",padding:"60px 0",fontSize:13}}>
            No activity logged yet
          </div>
        )}
      </div>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("r30");
  const [r30,setR30]=useState(null);
  const [ytd,setYtd]=useState(null);
  const [history,setHistory]=useState([]);
  const [uploading,setUploading]=useState(false);
  const [uploadWin,setUploadWin]=useState("r30");
  const [msg,setMsg]=useState("");
  const [search,setSearch]=useState("");
  const [marketFilter,setMarketFilter]=useState(""); // "" = all markets
  const [sort,setSort]=useState({f:"rank",d:"asc"});
  const [scorecard,setScorecard]=useState(null);
  const [modal,setModal]=useState(false);
  const [markets,setMarkets]=useState({});   // { repName: marketName }
  const [marketList,setMarketList]=useState([]); // unique market names
  const fileRef=useRef();

  useEffect(()=>{
    (async()=>{
      const r=await db.get("r30");if(r)setR30(r);
      const y=await db.get("ytd");if(y)setYtd(y);
      const h=await db.get("history");if(h)setHistory(Array.isArray(h)?h:[]);
      const m=await db.get("markets");
      if(m){setMarkets(m.assignments||{});setMarketList(m.list||[]);}
    })();
    const iv=setInterval(async()=>{
      const r=await db.get("r30");if(r)setR30(r);
      const y=await db.get("ytd");if(y)setYtd(y);
      const h=await db.get("history");if(h)setHistory(Array.isArray(h)?h:[]);
      const m=await db.get("markets");if(m){setMarkets(m.assignments||{});setMarketList(m.list||[]);}
    },30000);
    return()=>clearInterval(iv);
  },[]);

  const cur=tab==="r30"?r30:tab==="ytd"?ytd:r30;

  const teamAvgs=useMemo(()=>{
    const src=cur?.reps?.filter(r=>r.tier!=="⛔ Excluded")||[];
    const avg=f=>{const v=src.map(r=>r[f]??0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;};
    return{net_vol:avg("net_vol"),std_pct:avg("std_pct"),otd_pct:avg("otd_pct"),
      avg_deal:avg("avg_deal"),net_issue_rate:avg("net_issue_rate"),fallout_rate:avg("fallout_rate")};
  },[cur]);

  const upload=useCallback(async e=>{
    const file=e.target.files[0];if(!file)return;
    setUploading(true);setMsg("Reading CSV...");
    try{
      const text=await new Promise((res,rej)=>{
        const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=rej;fr.readAsText(file);
      });
      setMsg("Parsing...");
      const out=processCSV(text,uploadWin);
      setMsg("Saving to Firebase...");
      await db.set(uploadWin,out);
      uploadWin==="r30"?setR30(out):setYtd(out);

      // Save to history (R30 only — builds the time series)
      if(uploadWin==="r30"){
        const h=await db.get("history")||[];
        const hist=Array.isArray(h)?h:[];
        // Avoid duplicate — check by date range
        const existing=hist.findIndex(x=>x.sdate===out.sdate&&x.edate===out.edate);
        const snapshot={
          win:uploadWin,sdate:out.sdate,edate:out.edate,
          updated:out.updated,date_range:out.date_range,
          reps:out.reps.map(r=>({
            rep:r.rep,tier:r.tier,rank:r.rank,score:r.score,
            std_pct:r.std_pct,otd_pct:r.otd_pct,net_vol:r.net_vol,
            avg_deal:r.avg_deal,net_issue_rate:r.net_issue_rate,
            fallout_rate:r.fallout_rate,demo:r.demo,
          }))
        };
        if(existing>=0)hist[existing]=snapshot;
        else hist.push(snapshot);
        // Keep last 52 snapshots
        const trimmed=hist.slice(-52);
        await db.set("history",trimmed);
        setHistory(trimmed);
      }
      setTab(uploadWin);setModal(false);setMsg("");
    }catch(err){setMsg("Error: "+err.message);}
    finally{setUploading(false);if(fileRef.current)fileRef.current.value="";}
  },[uploadWin]);

  const tgSort=f=>setSort(s=>s.f===f?{f,d:s.d==="asc"?"desc":"asc"}:{f,d:f==="rank"?"asc":"desc"});
  const TH=({f,label,c,title})=>(
    <th title={title} onClick={()=>tgSort(f)} style={{...thS,color:c||"#64748b"}}>
      {label}{sort.f===f?(sort.d==="asc"?" ↑":" ↓"):""}
    </th>
  );

  const active=cur?.reps?.filter(r=>r.tier!=="⛔ Excluded").length??0;

  const rows=useMemo(()=>{
    if(tab==="watch"){
      return(r30?.reps||[]).map(rr=>{
        const ytdR=ytd?.reps?.find(x=>x.rep===rr.rep);
        return{...rr,_gap:gapPts(rr),_ytdGap:ytdR?gapPts(ytdR):null};
      }).filter(r=>(r._gap??0)>=6||(r._ytdGap??0)>=6)
        .sort((a,b)=>Math.max(b._gap??0,b._ytdGap??0)-Math.max(a._gap??0,a._ytdGap??0));
    }
    if(tab==="deep"){
      return(cur?.reps||[]).filter(r=>r.tier!=="⛔ Excluded").sort((a,b)=>b.net_vol-a.net_vol);
    }
    if(tab==="trends"||tab==="r30"&&!cur||tab==="ytd"&&!cur)return[];
    if(!cur?.reps)return[];
    let list=[...cur.reps];
    if(search)list=list.filter(r=>r.rep?.toLowerCase().includes(search.toLowerCase()));
    if(marketFilter==="__unassigned__") list=list.filter(r=>!markets[r.rep]||markets[r.rep]==="");
    else if(marketFilter) list=list.filter(r=>markets[r.rep]===marketFilter);
    list.sort((a,b)=>{
      let av=a[sort.f],bv=b[sort.f];
      if(sort.f==="rank"){av=a.rank==="-"?9999:a.rank;bv=b.rank==="-"?9999:b.rank;}
      if(sort.f==="_gap"){av=gapPts(a)??-999;bv=gapPts(b)??-999;}
      if(typeof av==="string")return sort.d==="asc"?av.localeCompare(bv):bv.localeCompare(av);
      return sort.d==="asc"?(av??0)-(bv??0):(bv??0)-(av??0);
    });
    return list;
  },[tab,cur,r30,ytd,search,sort]);

  const navItems=[
    {k:"r30",label:"ROLLING 30"},
    {k:"ytd",label:"YEAR TO DATE"},
    {k:"trends",label:"📈 TRENDS"},
    {k:"watch",label:"⚠ WATCH LIST"},
    {k:"deep",label:"DEEP STATS"},
    {k:"markets",label:"🗺 MARKETS"},
    {k:"compare",label:"⚖ COMPARE"},
    {k:"repmap",label:"📍 REP MAP"},
    {k:"tracker",label:"🗂 TRACKER"},
  ];

            background:"none",border:"none",padding:"0 11px",height:52,fontFamily:"inherit",

                fontFamily:"inherit",cursor:"pointer",outline:"none",minWidth:160}}>
              <option value="">🗺 All Markets</option>
              {marketList.map(m=>(
                <option key={m} value={m}>{m}</option>

                ✕ Clear

            {marketFilter&&(
              <span style={{fontSize:12,color:"#64748b"}}>

                  <TH f="net_vol" label="Net Vol"/>

                  <TH f="net_issue_rate" label="NetStk%" title="NetStk% — Stick Rate: closes that net issued"/>
                  <TH f="fallout_rate" label="Fallout%" title="Weighted: Cancel 65% · Hold 25% · CrDecl 10%"/>
                </tr>

              <tbody>

                  return(
                    <tr key={r.rep} onClick={()=>!excl&&setScorecard(r.rep)}
                      style={{background:i%2===0?"#080c14":"#0a0f1a",cursor:excl?"default":"pointer",opacity:excl?.45:1}}>
                      <td style={tdS}>{r.rank}</td>

                      <td style={{...tdS,fontWeight:pts>=6?700:400}}>

                      </td>

                      <td style={{...tdS,color:r.net_issue_rate>teamAvgs.net_issue_rate?"#4ade80":"#f87171"}}>{fP(r.net_issue_rate)}</td>
                      <td style={{...tdS,color:r.fallout_rate<teamAvgs.fallout_rate?"#4ade80":"#f87171"}}>{fP(r.fallout_rate)}</td>
                    </tr>

          </div>
        </div>
      )}

      {/* WATCH LIST */}
      {tab==="watch"&&(
        <div style={{padding:"16px 20px"}}>
          <div style={{marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:14,color:"#f97316",marginBottom:4}}>⚠ OTD vs STD Watch List</div>
            <div style={{fontSize:12,color:"#64748b",lineHeight:1.6,maxWidth:680}}>
              Large OTD↔STD gap = rep may be aborting appointments at the door.
              {" "}<span style={{color:"#ef4444"}}>🚨 ≥20pp</span> · <span style={{color:"#f97316"}}>⚠ 12–19pp</span> · <span style={{color:"#facc15"}}>👀 6–11pp</span>
            </div>
          </div>
          {!r30&&!ytd?<div style={{color:"#334155"}}>Upload data first.</div>:(
            <div style={{overflowX:"auto",borderRadius:10,border:"1px solid #1e2a3a"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr style={{background:"#0d1120"}}>

                    <th style={{...thS,color:"#f97316"}}>JSC4</th>
                    <th style={{...thS,color:"#ef4444"}}>JSC5</th>
                    <th style={{...thS,color:"#94a3b8"}}>JSC6</th>
                    <th style={{...thS,borderLeft:"1px solid #1e2a3a",color:"#ef4444"}}>Cancel Cnt</th>
                    <th style={{...thS,color:"#ef4444"}}>Cancel Vol</th>
                    <th style={{...thS,color:"#facc15"}}>Hold Cnt</th>
                    <th style={{...thS,color:"#facc15"}}>Hold Vol</th>
                    <th style={{...thS,color:"#a78bfa"}}>CrDecl Cnt</th>
                    <th style={{...thS,color:"#a78bfa"}}>CrDecl Vol</th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map((r,i)=>{
                    const nsliPct=r.net_vol>0?r.nsli/r.net_vol:0;
                    const emptyJsc={cnt:0,vol:0};
                    const jsc=r.jsc||[emptyJsc,emptyJsc,emptyJsc,emptyJsc,emptyJsc,emptyJsc];
                    return(
                      <tr key={r.rep} onClick={()=>setScorecard(r.rep)}
                        style={{background:i%2===0?"#080c14":"#0a0f1a",cursor:"pointer"}}>
                        <td style={{...tdS,fontWeight:600,color:"#f1f5f9",whiteSpace:"nowrap"}}>{r.rep}</td>
                        <td style={tdS}><span style={{color:TC[r.tier]??"#64748b",fontSize:10,fontWeight:600}}>{r.tier}</span></td>
                        <td style={{...tdS,color:"#4ade80",fontWeight:700}}>{f$(r.net_vol)}</td>
                        <td style={tdS}>{f$(r.nsli)}</td>
                        <td style={{...tdS,color:nsliPct>.1?"#f59e0b":"#64748b"}}>{fP(nsliPct)}</td>
                        {jsc.map((j,idx)=>(
                          <td key={idx} style={tdS}>
                            {j.cnt>0?<span>{j.cnt}<span style={{fontSize:10,color:"#334155"}}> {f$(j.vol)}</span></span>:"—"}
                          </td>
                        ))}
                        <td style={{...tdS,borderLeft:"1px solid #1e2a3a",color:r.cancel_cnt>0?"#ef4444":"#334155"}}>{fN(r.cancel_cnt)}</td>
                        <td style={tdS}>{r.cancel_vol>0?f$(r.cancel_vol):"—"}</td>
                        <td style={{...tdS,color:r.hold_cnt>0?"#facc15":"#334155"}}>{fN(r.hold_cnt)}</td>
                        <td style={tdS}>{r.hold_vol>0?f$(r.hold_vol):"—"}</td>
                        <td style={{...tdS,color:r.crdecline_cnt>0?"#a78bfa":"#334155"}}>{fN(r.crdecline_cnt)}</td>
                        <td style={tdS}>{r.crdecline_vol>0?f$(r.crdecline_vol):"—"}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

const thS={padding:"10px 12px",textAlign:"left",fontSize:11,fontWeight:600,color:"#64748b",
  letterSpacing:".06em",cursor:"pointer",userSelect:"none",whiteSpace:"nowrap",borderBottom:"1px solid #1e2a3a"};
const tdS={padding:"9px 12px",borderTop:"1px solid #0f172a",color:"#94a3b8"};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
